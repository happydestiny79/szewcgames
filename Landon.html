<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Landon - First Person Street Fighter</title>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
  <style>
    body { margin:0; background:#000; display:flex; justify-content:center; align-items:center; height:100vh; font-family:monospace; color:#0ff; }
    canvas { border:4px solid #0ff; box-shadow:0 0 20px #0ff; }
    .hud { position:absolute; top:12px; left:12px; background:rgba(0,0,0,0.75); padding:8px 14px; border:2px solid #0ff; font-size:13px; }
    .shop { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.95); border:3px solid #0ff; padding:18px; display:none; text-align:center; z-index:100; }
    button { background:#0ff; color:#000; border:none; padding:7px 14px; margin:5px; font-family:monospace; cursor:pointer; }
    button:hover { background:#fff; }
  </style>
</head>
<body>
  <div class="hud">
    <div><strong>LANDON - FIRST PERSON</strong></div>
    <div>Level: <span id="lvl">1</span></div>
    <div>Money: $<span id="cash">0</span></div>
    <div>Health: <span id="hp">100</span></div>
    <div style="font-size:10px; margin-top:6px; opacity:0.75;">↑ Closer &nbsp; ↓ Run Away &nbsp; Z Sword &nbsp; X Laser &nbsp; D Draw &nbsp; S Shop</div>
  </div>

  <div id="shop" class="shop">
    <h3 style="margin:0 0 8px;">🛒 SHOP</h3>
    <button onclick="buy('health')">Health Pack ($40)</button><br>
    <button onclick="buy('damage')">Damage Up ($60)</button><br>
    <button onclick="buy('summon')">Summon Power ($35)</button><br>
    <button onclick="closeShop()" style="background:#f55;color:white;margin-top:8px;">Close</button>
  </div>

  <script>
    let enemies = [];
    let summons = [];
    let particles = [];
    let projectiles = [];
    let cityLights = [];
    let level = 1;
    let health = 100;
    let money = 0;
    let damage = 1;
    let summonPower = 1;
    let gameOver = false;
    let drawMode = false;
    let drawPoints = [];
    let screenShake = 0;
    let lastAttack = 0;

    function setup() {
      createCanvas(1100, 620);
      for (let i = 0; i < 26; i++) {
        cityLights.push({
          x: random(40, width-40),
          y: random(20, 160),
          w: random(6, 15),
          h: random(28, 80),
          lit: random() > 0.3
        });
      }
      spawnWave();
    }

    function spawnWave() {
      enemies = [];
      let count = 5 + floor(level * 1.6);
      for (let i = 0; i < count; i++) {
        enemies.push({
          depth: random(60, 380),   // distance from player (higher = farther)
          lane: random(-120, 120),  // horizontal position
          health: 40 + level * 10,
          type: random() < 0.4 ? 'rusher' : 'shooter',
          shootTimer: random(40, 85)
        });
      }
    }

    function draw() {
      background(5, 5, 22);

      // Screen shake
      if (screenShake > 0) {
        translate(random(-screenShake, screenShake), random(-screenShake, screenShake));
        screenShake *= 0.8;
      }

      // Night sky + buildings
      fill(10, 10, 35);
      rect(0, 0, width, 180);
      for (let b of cityLights) {
        fill(b.lit ? '#ffeb99' : '#222244');
        rect(b.x, b.y, b.w, b.h);
      }

      // Road perspective
      fill(25, 25, 38);
      quad(0, 180, width, 180, width, height, 0, height);

      // Road lines (perspective)
      stroke(255, 220, 50);
      strokeWeight(2);
      for (let i = 1; i < 7; i++) {
        let y = 200 + i * 55;
        let spread = i * 35;
        line(width/2 - spread, y, width/2 + spread, y);
      }
      noStroke();

      // Draw enemies (first person - they get bigger when closer)
      for (let e of enemies) {
        let size = map(e.depth, 380, 20, 18, 95);
        let x = width/2 + e.lane * map(e.depth, 380, 20, 0.3, 1.0);
        let y = 220 + map(e.depth, 380, 20, 0, 140);

        // Simple Dr. Swzec shape
        fill('#c41e3a');
        ellipse(x, y, size, size * 1.15);
        fill('#3d2b1f');
        for (let k = 0; k < 5; k++) {
          ellipse(x - size*0.35 + k * (size*0.18), y - size*0.55, size*0.22, size*0.32);
        }
        fill('#ffdbac');
        ellipse(x, y - size*0.15, size*0.65, size*0.55);

        // Health bar
        fill(180, 0, 0);
        rect(x - size*0.5, y - size*0.85, size, 5);
        fill(0, 255, 80);
        rect(x - size*0.5, y - size*0.85, map(e.health, 0, 60, 0, size), 5);
      }

      // Enemy projectiles
      for (let p of projectiles) {
        fill('#ffaa00');
        ellipse(p.x, p.y, 8, 8);
      }

      // Summons (drawn helpers)
      for (let s of summons) {
        fill(s.col);
        ellipse(s.x, s.y, s.sz, s.sz);
        if (s.kind === 'star') { fill(255); textSize(11); text('✦', s.x-4, s.y+3); }
        if (s.kind === 'drone') { fill(255); textSize(10); text('◉', s.x-4, s.y+3); }
      }

      // Particles
      for (let p of particles) {
        fill(p.c);
        ellipse(p.x, p.y, p.s, p.s);
      }

      // Crosshair (first person feel)
      stroke(0, 255, 255, 160);
      strokeWeight(1.5);
      line(width/2 - 18, height/2, width/2 + 18, height/2);
      line(width/2, height/2 - 18, width/2, height/2 + 18);
      noStroke();

      // HUD
      fill(0, 255, 255);
      textSize(14);
      text(`LEVEL ${level}   |   $${money}   |   HP: ${max(0, health)}`, 16, 26);

      if (gameOver) {
        fill(255, 40, 40);
        textSize(38);
        textAlign(CENTER);
        text("GAME OVER", width/2, height/2 - 10);
        textSize(15);
        text("Press SPACE to restart", width/2, height/2 + 30);
        textAlign(LEFT);
      }

      if (!gameOver) updateGame();
    }

    function updateGame() {
      // Move enemies closer (first person depth)
      for (let e of enemies) {
        e.depth -= (e.type === 'rusher' ? 2.8 : 1.6);

        // Enemy attacks
        if (e.type === 'shooter') {
          e.shootTimer--;
          if (e.shootTimer <= 0) {
            let ex = width/2 + e.lane * map(e.depth, 380, 20, 0.3, 1.0);
            let ey = 220 + map(e.depth, 380, 20, 0, 140);
            projectiles.push({ x: ex, y: ey, vx: random(-3.5, -1.5), vy: random(-1.2, 1.2) });
            e.shootTimer = random(55, 95);
          }
        }
      }

      // Projectiles
      for (let p of projectiles) {
        p.x += p.vx;
        p.y += p.vy;
        if (dist(p.x, p.y, width/2, height/2) < 25) {
          health -= 7;
          screenShake = 6;
          createParticles(p.x, p.y, 5, '#ffaa00');
          p.dead = true;
        }
      }
      projectiles = projectiles.filter(p => !p.dead && p.x > 40);

      // Summons move and attack
      for (let s of summons) {
        s.x += s.vx;
        s.y += s.vy;
        for (let e of enemies) {
          let ex = width/2 + e.lane * map(e.depth, 380, 20, 0.3, 1.0);
          let ey = 220 + map(e.depth, 380, 20, 0, 140);
          if (dist(s.x, s.y, ex, ey) < 35) {
            e.health -= (s.dmg || 12) * summonPower;
            createParticles(s.x, s.y, 4, '#88ff44');
            s.life = 0;
          }
        }
      }

      // Remove dead enemies + reward
      enemies = enemies.filter(e => {
        if (e.health <= 0 || e.depth < 15) {
          if (e.health <= 0) {
            money += floor(22 + level * 3);
            createParticles(width/2 + e.lane * map(e.depth, 380, 20, 0.3, 1.0), 220 + map(e.depth, 380, 20, 0, 140), 10, '#ff5555');
            screenShake = 4;
          }
          return false;
        }
        return true;
      });

      summons = summons.filter(s => s.life > 0);
      particles = particles.filter(p => { p.life--; p.x += p.vx; p.y += p.vy; p.s *= 0.94; return p.life > 0; });

      // Next wave
      if (enemies.length === 0 && !gameOver) {
        level++;
        document.getElementById('lvl').innerText = level;
        if (level % 2 === 0) money += 50;
        spawnWave();
      }

      if (health <= 0) gameOver = true;

      document.getElementById('cash').innerText = money;
      document.getElementById('hp').innerText = max(0, health);
    }

    function createParticles(x, y, count, col) {
      for (let i = 0; i < count; i++) {
        particles.push({
          x: x, y: y,
          vx: random(-2, 2),
          vy: random(-2, 2),
          s: random(3, 6.5),
          c: col,
          life: random(14, 28)
        });
      }
    }

    function keyPressed() {
      if (gameOver && key === ' ') {
        health = 100; money = 0; level = 1; damage = 1; summonPower = 1; gameOver = false;
        document.getElementById('lvl').innerText = 1;
        document.getElementById('cash').innerText = 0;
        document.getElementById('hp').innerText = 100;
        spawnWave();
        return;
      }

      // First person depth controls
      if (keyCode === UP_ARROW) {
        for (let e of enemies) e.depth = max(15, e.depth - 22);
      }
      if (keyCode === DOWN_ARROW) {
        for (let e of enemies) e.depth = min(420, e.depth + 22);
      }

      let now = millis();
      if ((key === 'z' || key === 'Z') && now - lastAttack > 160) {
        // Sword attack - hits closest enemies
        for (let e of enemies) {
          if (e.depth < 95) {
            e.health -= 24 * damage;
            let ex = width/2 + e.lane * map(e.depth, 380, 20, 0.3, 1.0);
            createParticles(ex, 220 + map(e.depth, 380, 20, 0, 140), 6, '#aaffff');
            screenShake = 3;
          }
        }
        lastAttack = now;
      }

      if ((key === 'x' || key === 'X') && now - lastAttack > 200) {
        // Laser - hits enemies in center
        for (let e of enemies) {
          let ex = width/2 + e.lane * map(e.depth, 380, 20, 0.3, 1.0);
          if (abs(ex - width/2) < 160 && e.depth < 280) {
            e.health -= 13 * damage;
            createParticles(ex, 220 + map(e.depth, 380, 20, 0, 140), 4, '#ff6666');
          }
        }
        screenShake = 2;
        lastAttack = now;
      }

      if (key === 'd' || key === 'D') {
        drawMode = !drawMode;
        drawPoints = [];
      }

      if ((key === 's' || key === 'S') && !gameOver) {
        document.getElementById('shop').style.display = 'block';
      }
    }

    function buy(type) {
      if (type === 'health' && money >= 40) { money -= 40; health = min(100, health + 35); }
      if (type === 'damage' && money >= 60) { money -= 60; damage += 0.35; }
      if (type === 'summon' && money >= 35) { money -= 35; summonPower += 0.3; }
      closeShop();
    }

    function closeShop() {
      document.getElementById('shop').style.display = 'none';
    }

    function mousePressed() {
      if (drawMode) drawPoints.push({x: mouseX, y: mouseY});
    }
    function mouseDragged() {
      if (drawMode) drawPoints.push({x: mouseX, y: mouseY});
    }
    function mouseReleased() {
      if (drawMode && drawPoints.length > 4) {
        let avgX = drawPoints.reduce((a,b) => a + b.x, 0) / drawPoints.length;
        let avgY = drawPoints.reduce((a,b) => a + b.y, 0) / drawPoints.length;
        let w = abs(drawPoints[0].x - drawPoints[drawPoints.length-1].x);

        let kind = w > 50 ? 'drone' : 'star';
        let col = kind === 'drone' ? '#66ffcc' : '#ffdd55';
        let sz = kind === 'drone' ? 14 : 18;

        summons.push({
          x: avgX, y: avgY,
          vx: 3.4, vy: random(-0.8, 0.8),
          life: 85,
          kind: kind,
          col: col,
          sz: sz,
          dmg: kind === 'drone' ? 16 : 10
        });
        createParticles(avgX, avgY, 5, '#ffff88');
      }
      drawPoints = [];
      drawMode = false;
    }
  </script>
</body>
</html>
