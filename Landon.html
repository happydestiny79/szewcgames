<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Samus: Street Fighter - Landon Wade</title>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
  <style>
    body { margin: 0; background: #0a0a1f; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: monospace; color: #0ff; }
    canvas { border: 4px solid #0ff; box-shadow: 0 0 20px #0ff; }
    .info { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7); padding: 10px; border: 1px solid #0ff; }
  </style>
</head>
<body>
  <div class="info">
    <h3>SAMUS vs DR. SWZEC</h3>
    <p>Arrow Keys: Closer / Run Away</p>
    <p>Z: Sword Slash | X: Laser Blast</p>
    <p>D: Draw with Crayon (summon helper)</p>
    <p>Space: Restart after death</p>
    <p>Level: <span id="level">1</span> | Money: $<span id="money">0</span> | Health: <span id="health">100</span></p>
  </div>
  <script>
    let samus = { x: 300, y: 350, depth: 0, health: 100, money: 0 };
    let enemies = [];
    let summons = [];
    let cityLights = [];
    let level = 1;
    let gameOver = false;
    let drawMode = false;
    let drawPoints = [];

    function setup() {
      createCanvas(1000, 600);
      for (let i = 0; i < 25; i++) {
        cityLights.push({
          x: random(50, width - 50),
          y: random(50, 200),
          w: random(8, 20),
          h: random(30, 80),
          lit: random() > 0.3
        });
      }
      spawnWave();
    }

    function spawnWave() {
      enemies = [];
      let count = 5 + level * 2;
      for (let i = 0; i < count; i++) {
        enemies.push({
          x: random(500, 900),
          y: random(280, 420),
          depth: random(-30, 30),
          health: 40 + level * 10,
          type: 'swzec'
        });
      }
    }

    function draw() {
      background(10, 10, 35);
      
      // Night city skyline
      fill(20, 20, 60);
      rect(0, 0, width, 220);
      for (let b of cityLights) {
        fill(b.lit ? color(255, 255, 150) : color(40, 40, 80));
        rect(b.x, b.y, b.w, b.h);
        if (b.lit && frameCount % 40 < 20) {
          fill(255, 220, 100, 80);
          rect(b.x - 2, b.y - 2, b.w + 4, b.h + 4);
        }
      }

      // Ground / road
      fill(40, 40, 50);
      rect(0, 220, width, height - 220);
      
      // Road lines
      stroke(255, 255, 0);
      strokeWeight(3);
      for (let i = 0; i < 8; i++) {
        line(50 + i * 130, 400, 100 + i * 130, 400);
      }
      noStroke();

      // Draw enemies (Dr. Swzec)
      for (let e of enemies) {
        let scale = map(e.depth, -30, 30, 0.7, 1.3);
        push();
        translate(e.x, e.y);
        scale(scale);
        
        // Body - red white blue shirt
        fill(200, 30, 30);
        rect(-18, -40, 36, 50);
        fill(255);
        rect(-18, -25, 36, 12);
        fill(30, 80, 200);
        rect(-18, -40, 12, 50);
        
        // Crazy looped hair
        fill(60, 40, 20);
        for (let i = 0; i < 7; i++) {
          ellipse(-20 + i * 7, -55, 18, 25);
        }
        
        // Big forehead
        fill(255, 220, 180);
        rect(-18, -50, 36, 25);
        
        // Legs in jeans
        fill(40, 60, 140);
        rect(-15, 10, 12, 35);
        rect(3, 10, 12, 35);
        
        // Head
        fill(255, 220, 180);
        ellipse(0, -35, 28, 32);
        
        pop();
        
        // Health bar
        fill(255, 0, 0);
        rect(e.x - 25, e.y - 70, 50, 6);
        fill(0, 255, 0);
        rect(e.x - 25, e.y - 70, map(e.health, 0, 60, 0, 50), 6);
      }

      // Draw Samus (the robot)
      let sScale = map(samus.depth, -40, 40, 0.85, 1.15);
      push();
      translate(samus.x, samus.y);
      scale(sScale);
      
      // Long gray legs with jetpack
      fill(120);
      rect(-22, 5, 18, 70);
      rect(4, 5, 18, 70);
      
      // Jetpack on legs
      fill(80, 80, 100);
      rect(-20, 50, 40, 20);
      fill(255, 100, 0);
      if (frameCount % 8 < 4) rect(-15, 70, 10, 15);
      if (frameCount % 8 > 4) rect(5, 70, 10, 15);
      
      // Black body
      fill(20);
      rect(-25, -45, 50, 55);
      
      // Right arm = sword
      fill(150);
      rect(25, -35, 45, 12);
      fill(200, 200, 220);
      triangle(65, -42, 85, -30, 65, -28);
      
      // Left arm with crayon slot
      fill(30);
      rect(-70, -30, 45, 10);
      
      // Crayon (visible when drawing)
      if (drawMode || frameCount % 60 < 30) {
        fill(255, 80, 80);
        rect(-75, -28, 8, 6);
      }
      
      // Head = laser blaster
      fill(40);
      ellipse(0, -55, 35, 40);
      fill(255, 50, 50);
      ellipse(0, -55, 18, 18);
      
      pop();

      // Summons (things drawn by crayon)
      for (let s of summons) {
        fill(255, 200, 50);
        ellipse(s.x, s.y, 20, 20);
        fill(255);
        textSize(10);
        text("✨", s.x - 5, s.y + 3);
        s.x += s.vx;
        s.y += s.vy;
        s.life--;
      }
      summons = summons.filter(s => s.life > 0 && s.x < width);

      // UI text
      fill(0, 255, 255);
      textSize(18);
      text(`LEVEL ${level}  |  MONEY: $${samus.money}  |  HEALTH: ${samus.health}`, 20, 30);

      if (gameOver) {
        fill(255, 50, 50);
        textSize(48);
        textAlign(CENTER);
        text("GAME OVER - Press SPACE to restart", width/2, height/2);
        textAlign(LEFT);
      }

      // Update logic
      if (!gameOver) {
        updateGame();
      }
    }

    function updateGame() {
      // Move enemies toward player based on depth
      for (let e of enemies) {
        let targetDepth = samus.depth;
        e.x = lerp(e.x, 400 + (e.depth * 3), 0.02);
        e.depth = lerp(e.depth, targetDepth + random(-10,10), 0.05);
        
        // Simple attack
        if (dist(e.x, e.y, samus.x, samus.y) < 80 && random() < 0.03) {
          samus.health -= 8;
          if (samus.health <= 0) gameOver = true;
        }
      }

      // Summon attacks
      for (let s of summons) {
        for (let e of enemies) {
          if (dist(s.x, s.y, e.x, e.y) < 35) {
            e.health -= 12;
            s.life = 0;
          }
        }
      }

      // Remove dead enemies, reward money
      let before = enemies.length;
      enemies = enemies.filter(e => {
        if (e.health <= 0) {
          samus.money += 25;
          return false;
        }
        return true;
      });
      
      if (enemies.length === 0 && before > 0) {
        level++;
        document.getElementById('level').innerText = level;
        spawnWave();
        if (level % 3 === 0) samus.money += 100; // bonus
      }

      // Clean summons
      summons = summons.filter(s => s.life > 0);
    }

    function keyPressed() {
      if (gameOver && key === ' ') {
        samus.health = 100;
        samus.money = 0;
        level = 1;
        gameOver = false;
        spawnWave();
        document.getElementById('level').innerText = level;
        document.getElementById('money').innerText = samus.money;
        return;
      }

      if (keyCode === UP_ARROW) {
        samus.depth = constrain(samus.depth + 12, -40, 40); // closer
      }
      if (keyCode === DOWN_ARROW) {
        samus.depth = constrain(samus.depth - 12, -40, 40); // run away
      }
      
      if (key === 'z' || key === 'Z') {
        // Sword slash - damage nearby enemies
        for (let e of enemies) {
          if (abs(e.x - samus.x) < 90 && abs(e.depth - samus.depth) < 25) {
            e.health -= 25;
          }
        }
      }
      
      if (key === 'x' || key === 'X') {
        // Laser blast
        for (let e of enemies) {
          if (abs(e.x - samus.x) < 180) {
            e.health -= 15;
          }
        }
      }
      
      if (key === 'd' || key === 'D') {
        drawMode = !drawMode;
        drawPoints = [];
      }
    }

    function mousePressed() {
      if (drawMode) {
        drawPoints.push({x: mouseX, y: mouseY});
        if (drawPoints.length > 3) {
          // Summon something cool from the drawing
          let avgX = drawPoints.reduce((a,b)=>a+b.x,0) / drawPoints.length;
          let avgY = drawPoints.reduce((a,b)=>a+b.y,0) / drawPoints.length;
          summons.push({
            x: avgX,
            y: avgY,
            vx: 4,
            vy: random(-1.5, 1.5),
            life: 80
          });
          drawPoints = [];
          drawMode = false;
        }
      }
    }

    function mouseDragged() {
      if (drawMode) {
        drawPoints.push({x: mouseX, y: mouseY});
      }
    }
  </script>
</body>
</html>
