<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cairo - 3D Roblox-Style Game</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: Arial, sans-serif; }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            border-radius: 8px;
            z-index: 100;
        }
        #shop {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 15px;
            border-radius: 8px;
            display: none;
            z-index: 100;
        }
        button {
            margin: 5px;
            padding: 8px 12px;
            cursor: pointer;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 30px;
            pointer-events: none;
            z-index: 50;
        }
        .player-name {
            position: absolute;
            color: white;
            font-size: 14px;
            text-shadow: 1px 1px 2px black;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div><strong>Cairo</strong> - 3D Fighting Game</div>
        <div>Role: <span id="role">Loading...</span></div>
        <div>Location: <span id="location">Home</span></div>
        <div>Health: <span id="health">100</span></div>
        <div>Coins: <span id="coins">100</span></div>
        <div style="margin-top:10px; font-size:12px;">
            WASD = Move | Mouse = Look | Click = Punch | E = Shop | T = Teleport
        </div>
    </div>

    <div id="crosshair">+</div>

    <div id="shop">
        <h3>Shop</h3>
        <button onclick="buyItem('Speed Boost')">Speed Boost (75 coins)</button><br>
        <button onclick="buyItem('Troll Bomb')">Troll Bomb (50 coins)</button><br>
        <button onclick="buyItem('Admin Powers')">Admin Powers (200 coins)</button><br>
        <button onclick="closeShop()">Close</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ==================== THREE.JS SETUP ====================
        let scene, camera, renderer;
        let player, playerVelocity = new THREE.Vector3();
        let keys = {};
        let currentLocation = "Home";
        let role = Math.random() > 0.5 ? "AJ (Good Guy)" : "Caleb (Bad Guy)";
        let health = 100;
        let coins = 100;
        let canPunch = true;

        // Other players (AI characters)
        let otherPlayers = [];

        const locations = {
            "Home": { x: 0, z: 0, color: 0x8B4513 },
            "Boxing Ring": { x: 40, z: 0, color: 0xFF4500 },
            "The Creator": { x: 80, z: 0, color: 0x00CED1 },
            "School": { x: 120, z: 0, color: 0x4169E1 }
        };

        // ==================== CHARACTER CREATION ====================
        function createCharacter(isGoodGuy, name, x, z) {
            const group = new THREE.Group();

            // Body color based on role
            const bodyColor = isGoodGuy ? 0x00aa00 : 0xcc0000;
            const accentColor = isGoodGuy ? 0x00ff00 : 0xff4444;

            // Head
            const head = new THREE.Mesh(
                new THREE.BoxGeometry(1.2, 1.2, 1.2),
                new THREE.MeshLambertMaterial({ color: 0xffcc99 })
            );
            head.position.y = 4.2;
            group.add(head);

            // Body
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(2, 2.5, 1.5),
                new THREE.MeshLambertMaterial({ color: bodyColor })
            );
            body.position.y = 2.5;
            group.add(body);

            // Arms
            const armMat = new THREE.MeshLambertMaterial({ color: bodyColor });
            const leftArm = new THREE.Mesh(new THREE.BoxGeometry(0.6, 2, 0.8), armMat);
            leftArm.position.set(-1.3, 2.5, 0);
            group.add(leftArm);

            const rightArm = new THREE.Mesh(new THREE.BoxGeometry(0.6, 2, 0.8), armMat);
            rightArm.position.set(1.3, 2.5, 0);
            group.add(rightArm);

            // Legs
            const legMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
            const leftLeg = new THREE.Mesh(new THREE.BoxGeometry(0.7, 2, 0.9), legMat);
            leftLeg.position.set(-0.5, 0.8, 0);
            group.add(leftLeg);

            const rightLeg = new THREE.Mesh(new THREE.BoxGeometry(0.7, 2, 0.9), legMat);
            rightLeg.position.set(0.5, 0.8, 0);
            group.add(rightLeg);

            // Name tag
            const nameTag = document.createElement('div');
            nameTag.className = 'player-name';
            nameTag.textContent = name;
            nameTag.style.position = 'absolute';
            document.body.appendChild(nameTag);

            group.position.set(x, 0, z);
            group.userData = {
                name: name,
                isGoodGuy: isGoodGuy,
                nameTag: nameTag,
                health: isGoodGuy ? 100 : 80,
                lastMove: Date.now()
            };

            scene.add(group);
            return group;
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 8, 18);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Lights
            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);

            // Main Player
            const isGood = role.includes("AJ");
            player = createCharacter(isGood, "You (" + (isGood ? "AJ" : "Caleb") + ")", 0, 0);

            // Create other players (AI)
            createOtherPlayers();

            // Create locations
            createLocation("Home", 0, 0, 0x8B4513);
            createLocation("Boxing Ring", 40, 0, 0xFF4500);
            createLocation("The Creator", 80, 0, 0x00CED1);
            createLocation("School", 120, 0, 0x4169E1);

            // Teleport pads
            createTeleportPad(15, 0, "Boxing Ring");
            createTeleportPad(55, 0, "The Creator");
            createTeleportPad(95, 0, "School");
            createTeleportPad(-15, 0, "Home");

            // Ground
            const groundGeo = new THREE.PlaneGeometry(200, 200);
            const groundMat = new THREE.MeshLambertMaterial({ color: 0x333333 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // Event listeners
            window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
            window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
            window.addEventListener('click', handlePunch);
            window.addEventListener('resize', onResize);

            document.getElementById('role').textContent = role;
            updateUI();

            animate();
        }

        function createOtherPlayers() {
            // Create several AI players across different locations
            const npcs = [
                { name: "Liam", good: true, x: 5, z: -8 },
                { name: "Zaire", good: false, x: 8, z: 6 },
                { name: "Maya", good: true, x: 42, z: 5 },
                { name: "Tyler", good: false, x: 38, z: -6 },
                { name: "Sam", good: true, x: 82, z: 4 },
                { name: "Jordan", good: false, x: 85, z: -5 }
            ];

            npcs.forEach(npc => {
                const char = createCharacter(npc.good, npc.name, npc.x, npc.z);
                otherPlayers.push(char);
            });
        }

        function createLocation(name, x, z, color) {
            const floor = new THREE.Mesh(
                new THREE.BoxGeometry(30, 1, 30),
                new THREE.MeshLambertMaterial({ color: color })
            );
            floor.position.set(x, 0.5, z);
            scene.add(floor);

            const wallMat = new THREE.MeshLambertMaterial({ color: 0x555555 });
            const walls = [
                new THREE.Mesh(new THREE.BoxGeometry(30, 8, 1), wallMat),
                new THREE.Mesh(new THREE.BoxGeometry(30, 8, 1), wallMat),
                new THREE.Mesh(new THREE.BoxGeometry(1, 8, 30), wallMat),
                new THREE.Mesh(new THREE.BoxGeometry(1, 8, 30), wallMat)
            ];
            walls[0].position.set(x, 4, z - 15);
            walls[1].position.set(x, 4, z + 15);
            walls[2].position.set(x - 15, 4, z);
            walls[3].position.set(x + 15, 4, z);
            walls.forEach(w => scene.add(w));
        }

        function createTeleportPad(x, z, targetLocation) {
            const pad = new THREE.Mesh(
                new THREE.CylinderGeometry(3, 3, 0.5, 32),
                new THREE.MeshLambertMaterial({ color: 0xffff00 })
            );
            pad.position.set(x, 1, z);
            pad.userData = { teleportTo: targetLocation };
            scene.add(pad);
        }

        function handlePunch() {
            if (!canPunch) return;
            canPunch = false;
            setTimeout(() => canPunch = true, 600);

            // Punch nearby AI players
            otherPlayers.forEach(npc => {
                const dist = player.position.distanceTo(npc.position);
                if (dist < 6) {
                    // Damage the NPC
                    npc.userData.health -= role.includes("Caleb") ? 22 : 15;
                    
                    // Knockback
                    const dir = new THREE.Vector3().subVectors(npc.position, player.position).normalize();
                    npc.position.x += dir.x * 3;
                    npc.position.z += dir.z * 3;

                    if (npc.userData.health <= 0) {
                        // Respawn NPC
                        npc.position.set(
                            Math.random() * 30 + (currentLocation === "Home" ? 0 : 40),
                            0,
                            Math.random() * 20 - 10
                        );
                        npc.userData.health = npc.userData.isGoodGuy ? 100 : 80;
                    }
                }
            });

            // Visual punch effect
            const punchEffect = new THREE.Mesh(
                new THREE.SphereGeometry(2),
                new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.6 })
            );
            punchEffect.position.copy(player.position);
            punchEffect.position.y += 2;
            scene.add(punchEffect);
            setTimeout(() => scene.remove(punchEffect), 150);
        }

        function buyItem(item) {
            const prices = {
                "Speed Boost": 75,
                "Troll Bomb": 50,
                "Admin Powers": 200
            };
            
            if (coins >= prices[item]) {
                coins -= prices[item];
                
                if (item === "Speed Boost") {
                    player.userData.speed = 0.7;
                    setTimeout(() => { if (player) player.userData.speed = 0.35; }, 10000);
                } else if (item === "Troll Bomb") {
                    alert("Troll Bomb deployed! Nearby players got stunned (demo)");
                    otherPlayers.forEach(npc => {
                        if (npc.position.distanceTo(player.position) < 15) {
                            npc.position.x += (Math.random() - 0.5) * 8;
                            npc.position.z += (Math.random() - 0.5) * 8;
                        }
                    });
                } else if (item === "Admin Powers") {
                    alert("Admin powers activated! (You can now teleport freely with T)");
                }
                
                updateUI();
            } else {
                alert("Not enough coins!");
            }
        }

        function updateUI() {
            document.getElementById('location').textContent = currentLocation;
            document.getElementById('health').textContent = Math.floor(health);
            document.getElementById('coins').textContent = coins;
        }

        function updateNameTags() {
            const allChars = [player, ...otherPlayers];
            
            allChars.forEach(char => {
                if (!char.userData.nameTag) return;
                
                const vector = new THREE.Vector3();
                vector.setFromMatrixPosition(char.matrixWorld);
                vector.y += 6;

                vector.project(camera);

                const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
                const y = (-vector.y * 0.5 + 0.5) * window.innerHeight;

                const tag = char.userData.nameTag;
                tag.style.left = x + 'px';
                tag.style.top = y + 'px';
                tag.style.display = (vector.z < 1) ? 'block' : 'none';
            });
        }

        function checkTeleport() {
            scene.children.forEach(obj => {
                if (obj.userData && obj.userData.teleportTo) {
                    const dist = player.position.distanceTo(obj.position);
                    if (dist < 5) {
                        const newLoc = obj.userData.teleportTo;
                        if (newLoc !== currentLocation) {
                            currentLocation = newLoc;
                            const locData = locations[newLoc];
                            player.position.set(locData.x + (Math.random() - 0.5) * 10, 2, locData.z + (Math.random() - 0.5) * 8);
                            updateUI();
                        }
                    }
                }
            });
        }

        function moveAIPlayers() {
            const now = Date.now();
            
            otherPlayers.forEach(npc => {
                // Simple wandering AI
                if (now - npc.userData.lastMove > 800) {
                    npc.userData.lastMove = now;
                    
                    // Random movement
                    npc.position.x += (Math.random() - 0.5) * 1.2;
                    npc.position.z += (Math.random() - 0.5) * 1.2;
                    
                    // Keep them near their starting area
                    const homeX = npc.position.x < 30 ? 0 : 
                                  npc.position.x < 70 ? 40 : 
                                  npc.position.x < 110 ? 80 : 120;
                    
                    if (Math.abs(npc.position.x - homeX) > 18) {
                        npc.position.x = homeX + (Math.random() - 0.5) * 10;
                    }
                }
                
                // Keep them on the ground
                npc.position.y = 0;
            });
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Player movement
            const speed = player.userData.speed || 0.35;
            
            if (keys['w']) player.position.z -= speed;
            if (keys['s']) player.position.z += speed;
            if (keys['a']) player.position.x -= speed;
            if (keys['d']) player.position.x += speed;

            // Camera follows player
            camera.position.x = player.position.x;
            camera.position.z = player.position.z + 18;
            camera.lookAt(player.position.x, player.position.y + 3, player.position.z);

            // "No Friends" debuff for Caleb
            if (role.includes("Caleb") && !player.userData.speed) {
                player.userData.speed = 0.28;
            }

            // Update AI players
            moveAIPlayers();

            // Update floating name tags
            updateNameTags();

            // Check teleports
            checkTeleport();

            renderer.render(scene, camera);
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'e') {
                const shop = document.getElementById('shop');
                shop.style.display = shop.style.display === 'block' ? 'none' : 'block';
            }
            if (e.key.toLowerCase() === 't') {
                const locNames = Object.keys(locations);
                const currentIndex = locNames.indexOf(currentLocation);
                const nextIndex = (currentIndex + 1) % locNames.length;
                const nextLoc = locNames[nextIndex];
                currentLocation = nextLoc;
                const locData = locations[nextLoc];
                player.position.set(locData.x, 2, locData.z);
                updateUI();
            }
        });

        function closeShop() {
            document.getElementById('shop').style.display = 'none';
        }

        // Start the game
        init();
    </script>
</body>
</html>
