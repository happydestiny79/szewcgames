<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaylen - Minecraft Family Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: #0f0f23;
            color: #fff;
            font-family: 'Press Start 2P', system-ui;
            overflow: hidden;
        }
        
        canvas {
            display: block;
            margin: 0 auto;
            border: 8px solid #4a9c6d;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(74, 156, 109, 0.6);
        }
        
        /* Title Screen */
        #title-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(#0f0f23, #1a1a3a);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        
        #title-screen h1 {
            font-size: 48px;
            color: #4ecdc4;
            text-shadow: 4px 4px 0 #000;
            margin-bottom: 60px;
        }
        
        .menu-button {
            background: #4a9c6d;
            color: white;
            border: 6px solid #fff;
            padding: 20px 60px;
            font-family: 'Press Start 2P', system-ui;
            font-size: 24px;
            cursor: pointer;
            margin: 12px;
            transition: all 0.1s;
            min-width: 320px;
        }
        
        .menu-button:hover {
            background: #6bb88a;
            transform: scale(1.05);
        }
        
        /* Role Selection */
        #role-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        
        #role-screen h2 {
            font-size: 28px;
            margin-bottom: 40px;
            color: #ffe66d;
        }
        
        .role-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 900px;
        }
        
        .role-button {
            background: #2a2a4a;
            border: 5px solid #4a9c6d;
            color: white;
            padding: 25px 20px;
            font-family: 'Press Start 2P', system-ui;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.1s;
            text-align: center;
        }
        
        .role-button:hover {
            background: #4a9c6d;
            border-color: #fff;
            transform: translateY(-4px);
        }
        
        .role-button .emoji {
            font-size: 42px;
            display: block;
            margin-bottom: 10px;
        }
        
        /* Game HUD */
        #game-hud {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            border: 4px solid #4a9c6d;
            padding: 12px 30px;
            display: none;
            z-index: 50;
            font-size: 13px;
        }
        
        .hud-stats {
            display: flex;
            gap: 40px;
            align-items: center;
        }
        
        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .log {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 340px;
            height: 200px;
            background: rgba(0,0,0,0.92);
            border: 4px solid #4a9c6d;
            padding: 12px;
            overflow-y: auto;
            font-size: 11px;
            line-height: 1.5;
            z-index: 50;
            display: none;
        }
        
        .minecraft-text {
            text-shadow: 3px 3px 0 #000;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- Title Screen -->
    <div id="title-screen">
        <h1 class="minecraft-text">🟩 MINECRAFT FAMILY</h1>
        <button class="menu-button" onclick="startGame()">START</button>
        <button class="menu-button" onclick="showSettings()">SETTINGS</button>
    </div>
    
    <!-- Role Selection Screen -->
    <div id="role-screen">
        <h2>Choose Your Role</h2>
        <div class="role-grid">
            <button class="role-button" onclick="selectRole('Baby')">
                <span class="emoji">👶</span>
                Baby
            </button>
            <button class="role-button" onclick="selectRole('Toddler')">
                <span class="emoji">🧒</span>
                Toddler
            </button>
            <button class="role-button" onclick="selectRole('Kid')">
                <span class="emoji">👦</span>
                Kid
            </button>
            <button class="role-button" onclick="selectRole('Teenager')">
                <span class="emoji">🧑</span>
                Teenager
            </button>
            <button class="role-button" onclick="selectRole('Parent')">
                <span class="emoji">👨</span>
                Parent
            </button>
            <button class="role-button" onclick="selectRole('Senior Citizen')">
                <span class="emoji">👴</span>
                Senior Citizen
            </button>
        </div>
    </div>
    
    <!-- Game HUD -->
    <div id="game-hud">
        <div class="hud-stats">
            <div class="stat">
                <span id="role-display">Baby</span>
            </div>
            <div class="stat">
                Age: <span id="age-display">0</span>
            </div>
            <div class="stat">
                Energy: <span id="energy-display">100</span>%
            </div>
            <div class="stat">
                Hunger: <span id="hunger-display">20</span>%
            </div>
            <div class="stat">
                Happiness: <span id="happiness-display">80</span>%
            </div>
        </div>
    </div>
    
    <!-- Log -->
    <div class="log" id="log"></div>

    <script>
        let role = "Baby";
        let age = 0;
        let energy = 100;
        let hunger = 20;
        let happiness = 80;
        let day = 1;
        let steveX = 360;
        let steveY = 300;
        let parentX = 180;
        let parentY = 280;
        let gameStarted = false;
        
        const roleColors = {
            "Baby": "#ff9ff3",
            "Toddler": "#feca57",
            "Kid": "#48dbfb",
            "Teenager": "#ff6b6b",
            "Parent": "#1dd1a1",
            "Senior Citizen": "#a55eea"
        };
        
        function addLog(message, color = "#fff") {
            const logDiv = document.getElementById("log");
            const entry = document.createElement("div");
            entry.style.color = color;
            entry.innerHTML = `[Day ${day}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            
            if (logDiv.children.length > 14) {
                logDiv.removeChild(logDiv.children[1]);
            }
        }
        
        function updateHUD() {
            document.getElementById("role-display").innerText = role;
            document.getElementById("role-display").style.color = roleColors[role];
            document.getElementById("age-display").innerText = age;
            document.getElementById("energy-display").innerText = Math.floor(energy);
            document.getElementById("hunger-display").innerText = Math.floor(hunger);
            document.getElementById("happiness-display").innerText = Math.floor(happiness);
            
            // Color feedback
            const energyEl = document.getElementById("energy-display");
            energyEl.style.color = energy > 60 ? "#4ecdc4" : energy > 30 ? "#ffe66d" : "#ff6b6b";
            
            const hungerEl = document.getElementById("hunger-display");
            hungerEl.style.color = hunger > 70 ? "#ff6b6b" : hunger > 40 ? "#ffe66d" : "#4ecdc4";
        }
        
        function selectRole(selectedRole) {
            role = selectedRole;
            
            // Set starting stats based on role
            if (role === "Baby") {
                age = 0;
                energy = 60;
                hunger = 45;
                happiness = 75;
            } else if (role === "Toddler") {
                age = 2;
                energy = 75;
                hunger = 30;
                happiness = 80;
            } else if (role === "Kid") {
                age = 7;
                energy = 85;
                hunger = 25;
                happiness = 70;
            } else if (role === "Teenager") {
                age = 14;
                energy = 70;
                hunger = 35;
                happiness = 55;
            } else if (role === "Parent") {
                age = 32;
                energy = 80;
                hunger = 20;
                happiness = 85;
            } else if (role === "Senior Citizen") {
                age = 72;
                energy = 55;
                hunger = 30;
                happiness = 90;
            }
            
            // Hide role screen and show game
            document.getElementById("role-screen").style.display = "none";
            document.getElementById("game-hud").style.display = "block";
            document.getElementById("log").style.display = "block";
            
            gameStarted = true;
            addLog(`You are now a ${role}!`, roleColors[role]);
            addLog("Click on objects in the house to interact.", "#ffe66d");
            updateHUD();
        }
        
        function startGame() {
            document.getElementById("title-screen").style.display = "none";
            document.getElementById("role-screen").style.display = "flex";
        }
        
        function showSettings() {
            const settingsMsg = "Settings coming soon!\n\n- Sound: On\n- Difficulty: Normal\n- Respawn at 100 years old";
            alert(settingsMsg);
        }
        
        function performAction(action) {
            let message = "";
            let color = "#fff";
            
            switch(action) {
                case "feed":
                    hunger = Math.max(0, hunger - 30);
                    happiness += 10;
                    energy += 8;
                    message = role === "Baby" || role === "Toddler" 
                        ? "Your parent fed you pumpkin pie!" 
                        : "You ate some steak and bread.";
                    color = "#feca57";
                    break;
                    
                case "sleep":
                    energy = Math.min(100, energy + 45);
                    day++;
                    message = `You slept well. Day ${day} begins.`;
                    color = "#a55eea";
                    happiness += 5;
                    break;
                    
                case "play":
                    happiness += 22;
                    energy -= 18;
                    message = "You had fun playing!";
                    color = "#4ecdc4";
                    break;
                    
                case "homework":
                    if (role === "Kid" || role === "Teenager") {
                        energy -= 18;
                        happiness -= 8;
                        message = "You finished your homework.";
                    } else {
                        message = "You're not in school right now.";
                        color = "#aaa";
                    }
                    break;
                    
                case "bad":
                    if (role === "Kid" || role === "Teenager") {
                        happiness -= 20;
                        message = "You did something naughty... Steve is disappointed.";
                        color = "#ff6b6b";
                    } else {
                        message = "You decide to behave.";
                        color = "#aaa";
                    }
                    break;
                    
                case "grow":
                    age += 5;
                    if (age >= 100) {
                        dieAndRespawn();
                        return;
                    }
                    message = `You are now ${age} years old.`;
                    color = "#ffe66d";
                    break;
            }
            
            // Clamp values
            energy = Math.max(0, Math.min(100, energy));
            hunger = Math.max(0, Math.min(100, hunger));
            happiness = Math.max(0, Math.min(100, happiness));
            
            if (message) addLog(message, color);
            updateHUD();
            
            // Random events
            if (Math.random() < 0.12) randomEvent();
        }
        
        function randomEvent() {
            const events = [
                { text: "Steve brought home diamonds!", color: "#48dbfb" },
                { text: "A creeper exploded nearby!", color: "#ff6b6b" },
                { text: "You found a cute stray cat.", color: "#feca57" },
                { text: "It started raining outside.", color: "#a55eea" },
                { text: "Your family had dinner together.", color: "#ff9ff3" }
            ];
            const e = events[Math.floor(Math.random() * events.length)];
            addLog(e.text, e.color);
        }
        
        function dieAndRespawn() {
            addLog("You lived to 100 years old!", "#ff6b6b");
            addLog("You passed away peacefully...", "#ff6b6b");
            
            setTimeout(() => {
                addLog("Respawning as a new baby...", "#4ecdc4");
                role = "Baby";
                age = 0;
                energy = 60;
                hunger = 45;
                happiness = 75;
                day = 1;
                steveX = 360;
                steveY = 300;
                parentX = 180;
                parentY = 280;
                updateHUD();
            }, 2800);
        }
        
        function setup() {
            createCanvas(800, 560);
            textFont("Press Start 2P");
        }
        
        function draw() {
            background(25, 55, 85);
            
            // House walls
            fill(160, 110, 60);
            rect(60, 90, 680, 380);
            
            // Floor
            fill(110, 75, 45);
            rect(60, 400, 680, 70);
            
            // Window
            fill(135, 206, 250);
            rect(120, 130, 140, 110);
            stroke(255);
            strokeWeight(4);
            line(190, 130, 190, 240);
            line(120, 185, 260, 185);
            noStroke();
            
            // Bed
            fill(120, 60, 20);
            rect(560, 340, 150, 55);
            fill(255, 180, 200);
            rect(565, 335, 140, 22);
            
            // Table
            fill(90, 60, 30);
            rect(220, 360, 110, 18);
            
            // Bookshelf
            fill(70, 45, 25);
            rect(100, 300, 70, 90);
            fill(255, 220, 180);
            rect(108, 310, 25, 18);
            rect(108, 335, 25, 18);
            rect(108, 360, 25, 18);
            
            // Draw characters
            drawSteve(steveX, steveY, role);
            drawParent(parentX, parentY);
            
            // Role label above player
            if (gameStarted) {
                fill(roleColors[role]);
                textSize(13);
                textAlign(CENTER);
                text(role.toUpperCase(), steveX, steveY - 50);
            }
            
            // Subtle movement
            if (frameCount % 50 === 0 && gameStarted) {
                steveX += random(-4, 4);
                steveY += random(-2, 2);
                parentX += random(-3, 3);
            }
            
            // Boundaries
            steveX = constrain(steveX, 140, 620);
            steveY = constrain(steveY, 220, 390);
            parentX = constrain(parentX, 100, 320);
            parentY = constrain(parentY, 240, 380);
            
            // Status text
            if (gameStarted) {
                fill(255);
                textSize(12);
                textAlign(CENTER);
                text(`Age: ${age}  •  ${role}`, width/2, 35);
            }
        }
        
        function drawSteve(x, y, currentRole) {
            push();
            translate(x, y);
            
            // Head
            fill(255, 218, 185);
            rect(-13, -32, 26, 26);
            
            // Hair
            fill(20, 20, 20);
            rect(-15, -35, 30, 10);
            
            // Eyes
            fill(255);
            rect(-8, -24, 6, 6);
            rect(3, -24, 6, 6);
            fill(0);
            rect(-6, -23, 3, 3);
            rect(5, -23, 3, 3);
            
            // Blue shirt
            fill(65, 105, 225);
            rect(-15, -5, 30, 24);
            
            // Black pants
            fill(25);
            rect(-13, 19, 26, 22);
            
            // Arms
            fill(255, 218, 185);
            rect(-22, -3, 9, 20);
            rect(13, -3, 9, 20);
            
            // Role accessories
            if (currentRole === "Baby") {
                fill(255, 182, 193);
                ellipse(0, -40, 20, 12);
            } else if (currentRole === "Teenager") {
                fill(40);
                rect(-5, -40, 10, 7);
            } else if (currentRole === "Parent") {
                fill(139, 90, 43);
                rect(-12, -42, 24, 9);
            } else if (currentRole === "Senior Citizen") {
                fill(200);
                rect(-14, -38, 28, 8); // White hair
            }
            
            pop();
        }
        
        function drawParent(x, y) {
            push();
            translate(x, y);
            
            fill(255, 218, 185);
            rect(-12, -28, 24, 24);
            
            fill(101, 67, 33);
            rect(-14, -31, 28, 9);
            
            fill(0);
            rect(-6, -20, 4, 4);
            rect(3, -20, 4, 4);
            
            fill(34, 139, 34);
            rect(-14, -3, 28, 22);
            
            fill(60);
            rect(-12, 19, 24, 18);
            
            pop();
        }
        
        // Clickable interactions
        function mousePressed() {
            if (!gameStarted) return;
            
            // Bed area
            if (mouseX > 560 && mouseX < 710 && mouseY > 340 && mouseY < 395) {
                performAction("sleep");
                return;
            }
            
            // Table area (eat)
            if (mouseX > 220 && mouseX < 330 && mouseY > 360 && mouseY < 378) {
                performAction("feed");
                return;
            }
            
            // Bookshelf (homework)
            if (mouseX > 100 && mouseX < 170 && mouseY > 300 && mouseY < 390) {
                performAction("homework");
                return;
            }
            
            // Random play click
            if (mouseX > 300 && mouseX < 500 && mouseY > 250 && mouseY < 350) {
                performAction("play");
                return;
            }
            
            // Right click area for "bad stuff"
            if (mouseX > 600 && mouseButton === RIGHT) {
                performAction("bad");
            }
        }
        
        function keyPressed() {
            if (!gameStarted) return;
            
            if (key === 'f' || key === 'F') performAction("feed");
            if (key === 's' || key === 'S') performAction("sleep");
            if (key === 'p' || key === 'P') performAction("play");
            if (key === 'h' || key === 'H') performAction("homework");
            if (key === 'b' || key === 'B') performAction("bad");
            if (key === 'g' || key === 'G') performAction("grow");
        }
    </script>
</body>
</html>
