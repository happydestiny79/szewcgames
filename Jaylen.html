<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaylen - Minecraft Family Life</title>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: #0a0a1f;
            color: #fff;
            font-family: 'Press Start 2P', system-ui;
            overflow: hidden;
        }
        
        canvas {
            display: block;
            margin: 0 auto;
            border: 8px solid #4a9c6d;
            box-shadow: 0 0 50px rgba(74, 156, 109, 0.7);
        }
        
        #title-screen, #role-screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        
        #title-screen {
            background: linear-gradient(#0a0a1f, #15153a);
        }
        
        #role-screen {
            background: rgba(0,0,0,0.95);
            display: none;
        }
        
        h1 { font-size: 52px; color: #4ecdc4; text-shadow: 4px 4px 0 #000; margin-bottom: 50px; }
        
        .menu-button {
            background: #4a9c6d; color: white; border: 6px solid #fff;
            padding: 18px 55px; font-size: 22px; cursor: pointer; margin: 10px;
        }
        .menu-button:hover { background: #6bb88a; transform: scale(1.05); }
        
        .role-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; max-width: 900px;
        }
        
        .role-button {
            background: #2a2a4a; border: 5px solid #4a9c6d; color: white;
            padding: 22px 15px; font-size: 16px; cursor: pointer; text-align: center;
        }
        .role-button:hover { background: #4a9c6d; border-color: #fff; }
        .role-button .emoji { font-size: 38px; display: block; margin-bottom: 8px; }
        
        #hud {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); border: 4px solid #4a9c6d;
            padding: 10px 25px; font-size: 13px; display: none; z-index: 50;
        }
        
        .log {
            position: absolute; bottom: 15px; right: 15px;
            width: 320px; height: 190px; background: rgba(0,0,0,0.92);
            border: 4px solid #4a9c6d; padding: 10px; overflow-y: auto;
            font-size: 11px; display: none; z-index: 50;
        }
        
        .controls {
            position: absolute; bottom: 15px; left: 15px;
            background: rgba(0,0,0,0.85); border: 3px solid #4a9c6d;
            padding: 10px; font-size: 11px; display: none; z-index: 50;
        }
        
        .role-action {
            position: absolute; top: 70px; left: 15px;
            background: rgba(0,0,0,0.85); border: 3px solid #4a9c6d;
            padding: 8px 12px; font-size: 11px; display: none; z-index: 50;
        }
    </style>
</head>
<body>
    <!-- Title Screen -->
    <div id="title-screen">
        <h1>🟩 JAYLEN'S LIFE</h1>
        <button id="start-btn" class="menu-button">START GAME</button>
        <button class="menu-button" onclick="showSettings()">SETTINGS</button>
    </div>
    
    <!-- Role Selection Screen -->
    <div id="role-screen">
        <h2 style="color:#ffe66d; margin-bottom:30px;">Choose Your Role</h2>
        <div class="role-grid">
            <button class="role-button" onclick="selectRole('Baby')"><span class="emoji">👶</span>Baby</button>
            <button class="role-button" onclick="selectRole('Toddler')"><span class="emoji">🧒</span>Toddler</button>
            <button class="role-button" onclick="selectRole('Kid')"><span class="emoji">👦</span>Kid</button>
            <button class="role-button" onclick="selectRole('Teenager')"><span class="emoji">🧑</span>Teenager</button>
            <button class="role-button" onclick="selectRole('Parent')"><span class="emoji">👨</span>Parent</button>
            <button class="role-button" onclick="selectRole('Senior Citizen')"><span class="emoji">👴</span>Senior Citizen</button>
        </div>
    </div>
    
    <!-- HUD -->
    <div id="hud">
        <span id="role-hud"></span> | Age: <span id="age-hud">0</span> 
        | Energy: <span id="energy-hud">100</span>% 
        | Hunger: <span id="hunger-hud">30</span>% 
        | Happiness: <span id="happiness-hud">70</span>%
    </div>
    
    <!-- Log -->
    <div class="log" id="log"></div>
    
    <!-- Controls -->
    <div class="controls" id="controls">
        <strong>Controls:</strong><br>
        Arrow Keys / WASD = Move<br>
        E = Enter/Exit buildings<br>
        F = Eat | Click NPCs to interact
    </div>
    
    <!-- Role-specific actions hint -->
    <div class="role-action" id="role-action"></div>

    <script>
        let role = "Kid";
        let age = 10;
        let energy = 80;
        let hunger = 35;
        let happiness = 70;
        let day = 1;
        let gameStarted = false;
        let currentLocation = "outside";
        
        let player = { x: 450, y: 320 };
        let family = [];
        let cars = [];
        let houses = [];
        let store = { x: 720, y: 150, w: 110, h: 90 };
        
        const roleColors = {
            "Baby": "#ff9ff3", "Toddler": "#feca57", "Kid": "#48dbfb",
            "Teenager": "#ff6b6b", "Parent": "#1dd1a1", "Senior Citizen": "#a55eea"
        };
        
        function addLog(msg, color = "#fff") {
            const log = document.getElementById("log");
            const div = document.createElement("div");
            div.style.color = color;
            div.innerHTML = `[Day ${day}] ${msg}`;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
            if (log.children.length > 15) log.removeChild(log.children[1]);
        }
        
        function updateHUD() {
            document.getElementById("role-hud").innerText = role;
            document.getElementById("role-hud").style.color = roleColors[role] || "#fff";
            document.getElementById("age-hud").innerText = age;
            document.getElementById("energy-hud").innerText = Math.floor(energy);
            document.getElementById("hunger-hud").innerText = Math.floor(hunger);
            document.getElementById("happiness-hud").innerText = Math.floor(happiness);
        }
        
        function updateRoleActionHint() {
            const hintDiv = document.getElementById("role-action");
            let hint = "";
            
            if (role === "Baby" || role === "Toddler") {
                hint = "Just relax and be cared for!";
            } else if (role === "Kid") {
                hint = "Do homework or play with friends";
            } else if (role === "Teenager") {
                hint = "Go to school or hang out";
            } else if (role === "Parent") {
                hint = "Work, cook, pay taxes, drive";
            } else if (role === "Senior Citizen") {
                hint = "Help the kid with homework";
            }
            
            hintDiv.innerHTML = `<strong>${role}:</strong> ${hint}`;
            hintDiv.style.display = "block";
        }
        
        function selectRole(selected) {
            role = selected;
            
            // Starting stats per role
            if (role === "Baby") {
                age = 0; energy = 50; hunger = 55; happiness = 80;
            } else if (role === "Toddler") {
                age = 2; energy = 65; hunger = 40; happiness = 82;
            } else if (role === "Kid") {
                age = 8; energy = 85; hunger = 28; happiness = 75;
            } else if (role === "Teenager") {
                age = 15; energy = 70; hunger = 38; happiness = 60;
            } else if (role === "Parent") {
                age = 34; energy = 75; hunger = 25; happiness = 78;
            } else if (role === "Senior Citizen") {
                age = 70; energy = 48; hunger = 35; happiness = 85;
            }
            
            document.getElementById("role-screen").style.display = "none";
            document.getElementById("hud").style.display = "block";
            document.getElementById("log").style.display = "block";
            document.getElementById("controls").style.display = "block";
            
            gameStarted = true;
            currentLocation = "house";
            player.x = 280;
            player.y = 260;
            
            addLog(`You joined the world as a ${role}!`, roleColors[role]);
            updateRoleActionHint();
            updateHUD();
            
            // Role-specific starting message
            if (role === "Baby" || role === "Toddler") {
                addLog("You are being taken care of by your family.", "#ff9ff3");
            } else if (role === "Kid") {
                addLog("Time to do homework or play!", "#48dbfb");
            } else if (role === "Parent") {
                addLog("You need to work, cook, and pay taxes.", "#1dd1a1");
            } else if (role === "Senior Citizen") {
                addLog("You can help the kids with homework.", "#a55eea");
            }
        }
        
        function startGame() {
            const title = document.getElementById("title-screen");
            const roleScreen = document.getElementById("role-screen");
            
            if (title && roleScreen) {
                title.style.display = "none";
                roleScreen.style.display = "flex";
                console.log("%c[Jaylen] Role selection screen opened", "color:#4ecdc4");
            } else {
                console.error("Could not find title or role screen elements");
            }
        }
        
        function showSettings() {
            alert("Settings:\n- First Person Exploration\n- Role-specific actions\n- School, Store, Street & Houses");
        }
        
        function createWorld() {
            // Family
            family = [
                { name: "Steve", x: 160, y: 230, type: "dad", color: "#4a9c6d" },
                { name: "Mom", x: 540, y: 250, type: "mom", color: "#e67e22" },
                { name: "Sam", x: 320, y: 300, type: "kid", color: "#9b59b6" },
                { name: "Friend", x: 650, y: 390, type: "friend", color: "#3498db" }
            ];
            
            // Cars on street
            cars = [
                { x: 80, y: 530, speed: 2.0, dir: 1 },
                { x: 720, y: 570, speed: 2.5, dir: -1 },
                { x: 350, y: 550, speed: 1.7, dir: 1 }
            ];
            
            // More houses
            houses = [
                { x: 60, y: 170, w: 130, h: 100 },
                { x: 620, y: 150, w: 140, h: 105 },
                { x: 200, y: 70, w: 110, h: 90 },
                { x: 420, y: 80, w: 100, h: 85 }
            ];
        }
        
        function performRoleAction(action) {
            let msg = "";
            let col = "#fff";
            
            if (role === "Baby" || role === "Toddler") {
                msg = "You are too little to do that.";
                col = "#aaa";
            }
            else if (role === "Kid") {
                if (action === "homework") {
                    energy -= 18;
                    happiness += 5;
                    msg = "You did your homework!";
                    col = "#48dbfb";
                } else if (action === "play") {
                    happiness += 20;
                    energy -= 10;
                    msg = "You played outside!";
                    col = "#2ecc71";
                }
            }
            else if (role === "Parent") {
                if (action === "work") {
                    energy -= 25;
                    happiness -= 5;
                    msg = "You went to work and earned money.";
                    col = "#1dd1a1";
                } else if (action === "cook") {
                    hunger = Math.max(0, hunger - 35);
                    happiness += 12;
                    msg = "You cooked a nice meal!";
                    col = "#f39c12";
                } else if (action === "taxes") {
                    energy -= 15;
                    msg = "You paid the taxes at the store.";
                    col = "#e74c3c";
                } else if (action === "drive") {
                    msg = "You drove the car around the block.";
                    col = "#3498db";
                }
            }
            else if (role === "Senior Citizen") {
                if (action === "help") {
                    happiness += 15;
                    msg = "You helped the kid with homework!";
                    col = "#a55eea";
                }
            }
            
            energy = Math.max(0, Math.min(100, energy));
            hunger = Math.max(0, Math.min(100, hunger));
            happiness = Math.max(0, Math.min(100, happiness));
            
            if (msg) addLog(msg, col);
            updateHUD();
        }
        
        function keyPressed() {
            if (!gameStarted) return;
            
            let speed = 5.5;
            if (keyCode === UP_ARROW || key === 'w' || key === 'W') player.y -= speed;
            if (keyCode === DOWN_ARROW || key === 's' || key === 'S') player.y += speed;
            if (keyCode === LEFT_ARROW || key === 'a' || key === 'A') player.x -= speed;
            if (keyCode === RIGHT_ARROW || key === 'd' || key === 'D') player.x += speed;
            
            // E = Enter/Exit buildings
            if (key === 'e' || key === 'E') {
                // House door
                if (currentLocation === "house" && player.x > 200 && player.x < 340 && player.y < 170) {
                    currentLocation = "outside";
                    player.x = 450;
                    player.y = 480;
                    addLog("You went outside onto the street.", "#4ecdc4");
                } 
                else if (currentLocation === "outside" && player.x > 400 && player.x < 520 && player.y > 450 && player.y < 510) {
                    currentLocation = "house";
                    player.x = 280;
                    player.y = 240;
                    addLog("You entered the house.", "#4ecdc4");
                }
                // School
                else if (currentLocation === "outside" && player.x > 620 && player.x < 750 && player.y > 200 && player.y < 300) {
                    currentLocation = "school";
                    player.x = 180;
                    player.y = 280;
                    addLog("You arrived at school.", "#3498db");
                }
                // Store
                else if (currentLocation === "outside" && player.x > 700 && player.x < 820 && player.y > 120 && player.y < 220) {
                    currentLocation = "store";
                    player.x = 150;
                    player.y = 200;
                    addLog("You entered the store.", "#f1c40f");
                }
            }
            
            // Role actions
            if (key === 'f' || key === 'F') {
                if (role === "Parent") performRoleAction("cook");
                else performRoleAction("eat");
            }
            
            if (key === 'h' || key === 'H' && (role === "Kid" || role === "Teenager")) {
                performRoleAction("homework");
            }
            
            if (key === 'p' || key === 'P' && role === "Kid") {
                performRoleAction("play");
            }
            
            if (key === 'w' || key === 'W' && role === "Parent") {
                performRoleAction("work");
            }
            
            if (key === 't' || key === 'T' && role === "Parent") {
                performRoleAction("taxes");
            }
            
            if (key === 'd' || key === 'D' && role === "Parent") {
                performRoleAction("drive");
            }
            
            if (key === 'h' || key === 'H' && role === "Senior Citizen") {
                performRoleAction("help");
            }
        }
        
        function mousePressed() {
            if (!gameStarted) return;
            
            // Click family / NPCs
            for (let f of family) {
                let d = dist(player.x, player.y, f.x, f.y);
                if (d < 55) {
                    if (role === "Senior Citizen" && f.type === "kid") {
                        performRoleAction("help");
                    } else {
                        addLog(`You talked with ${f.name}.`, "#ff9ff3");
                        happiness = Math.min(100, happiness + 10);
                    }
                    updateHUD();
                    return;
                }
            }
            
            // Fridge (house)
            if (currentLocation === "house" && mouseX > 420 && mouseX < 500 && mouseY > 190 && mouseY < 280) {
                if (role === "Parent") performRoleAction("cook");
                else performRoleAction("eat");
            }
            
            // Bed
            if (currentLocation === "house" && mouseX > 70 && mouseX < 200 && mouseY > 270 && mouseY < 360) {
                energy = Math.min(100, energy + 40);
                day++;
                addLog(`You slept. Day ${day} started.`, "#9b59b6");
                updateHUD();
            }
            
            // School door
            if (currentLocation === "outside" && mouseX > 620 && mouseX < 750 && mouseY > 200 && mouseY < 300) {
                currentLocation = "school";
                player.x = 180;
                player.y = 280;
                addLog("You entered the school.", "#3498db");
            }
            
            // Store door
            if (currentLocation === "outside" && mouseX > 700 && mouseX < 820 && mouseY > 120 && mouseY < 220) {
                currentLocation = "store";
                player.x = 150;
                player.y = 200;
                addLog("You went to the store.", "#f1c40f");
            }
        }
        
        function setup() {
            createCanvas(900, 620);
            textFont("Press Start 2P");
            createWorld();
        }
        
        function draw() {
            background(30, 60, 90);
            
            if (!gameStarted) {
                fill(255);
                textSize(18);
                textAlign(CENTER);
                text("Press START to begin your life!", width/2, height/2);
                return;
            }
            
            // ========== OUTSIDE - STREET & WORLD ==========
            if (currentLocation === "outside") {
                // Grass background
                fill(34, 139, 34);
                rect(0, 0, width, height);
                
                // Big Street / Road
                fill(55);
                rect(0, 470, width, 150);
                fill(255);
                for (let i = 0; i < 12; i++) {
                    rect(20 + i * 80, 540, 50, 7);
                }
                
                // More houses
                for (let h of houses) {
                    fill(139, 90, 43);
                    rect(h.x, h.y, h.w, h.h);
                    fill(200, 150, 100);
                    triangle(h.x - 8, h.y, h.x + h.w/2, h.y - 35, h.x + h.w + 8, h.y);
                    fill(80, 50, 20);
                    rect(h.x + 25, h.y + 45, 28, 45); // door
                }
                
                // School building
                fill(70, 130, 180);
                rect(620, 180, 160, 130);
                fill(255);
                textSize(12);
                text("SCHOOL", 700, 250);
                fill(139, 90, 43);
                rect(680, 310, 40, 55);
                
                // Store
                fill(210, 180, 140);
                rect(store.x, store.y, store.w, store.h);
                fill(255);
                textSize(11);
                text("STORE", store.x + 55, store.y + 50);
                fill(139, 90, 43);
                rect(store.x + 35, store.y + store.h - 5, 40, 35);
                
                // Castle in distance
                fill(120);
                rect(40, 50, 90, 80);
                fill(100);
                rect(55, 20, 18, 35);
                rect(85, 15, 18, 40);
                
                // Moving cars on street
                for (let c of cars) {
                    fill(180, 40, 40);
                    rect(c.x, c.y, 65, 32);
                    fill(255);
                    rect(c.x + 8, c.y + 6, 18, 10);
                    rect(c.x + 38, c.y + 6, 18, 10);
                    c.x += c.speed * c.dir;
                    if (c.x > width + 60) c.x = -70;
                    if (c.x < -70) c.x = width + 60;
                }
                
                // Family / NPCs
                for (let f of family) {
                    fill(f.color);
                    ellipse(f.x, f.y, 20, 20);
                    fill(255);
                    textSize(8);
                    textAlign(CENTER);
                    text(f.name, f.x, f.y - 18);
                    
                    if (frameCount % 45 === 0) {
                        f.x += random(-10, 10);
                        f.y += random(-6, 6);
                    }
                    f.x = constrain(f.x, 50, 850);
                    f.y = constrain(f.y, 70, 460);
                }
                
                // Player (first person style - blue character)
                fill(65, 105, 225);
                ellipse(player.x, player.y, 24, 24);
                fill(255);
                textAlign(CENTER);
                text(role, player.x, player.y - 20);
                
                fill(255, 255, 200);
                textSize(11);
                text("Walk to buildings and press E to enter", width/2, 35);
            }
            
            // ========== HOUSE INTERIOR ==========
            else if (currentLocation === "house") {
                fill(160, 110, 60);
                rect(40, 70, 820, 490);
                
                fill(120, 85, 55);
                rect(40, 390, 820, 170);
                
                // Window
                fill(135, 206, 250);
                rect(70, 100, 120, 95);
                
                // Bed
                fill(139, 69, 19);
                rect(70, 270, 130, 65);
                fill(255, 182, 193);
                rect(75, 265, 120, 18);
                
                // Fridge
                fill(170);
                rect(430, 190, 55, 95);
                fill(90);
                rect(438, 200, 38, 28);
                rect(438, 235, 38, 28);
                fill(255);
                textSize(7);
                text("FRIDGE", 458, 275);
                
                // Table
                fill(101, 67, 33);
                rect(260, 310, 150, 22);
                
                // Family inside
                for (let f of family) {
                    fill(f.color);
                    ellipse(f.x, f.y, 18, 18);
                    fill(255);
                    textSize(7);
                    text(f.name, f.x, f.y - 16);
                }
                
                // Player
                fill(65, 105, 225);
                ellipse(player.x, player.y, 22, 22);
                fill(255);
                textAlign(CENTER);
                text(role, player.x, player.y - 18);
                
                fill(255, 220, 100);
                textSize(10);
                text("Press E near door to go outside", width/2, 555);
            }
            
            // ========== SCHOOL ==========
            else if (currentLocation === "school") {
                fill(200, 185, 160);
                rect(30, 50, 840, 520);
                
                fill(70, 130, 180);
                rect(80, 110, 200, 100);
                
                fill(255);
                textSize(14);
                text("SCHOOL - Classroom", width/2, 80);
                
                fill(65, 105, 225);
                ellipse(player.x, player.y, 22, 22);
                
                fill(255);
                textSize(11);
                text("Press E to leave school", width/2, 560);
                
                if (keyIsDown(69)) {
                    currentLocation = "outside";
                    player.x = 700;
                    player.y = 340;
                    addLog("You left school.", "#aaa");
                }
            }
            
            // ========== STORE ==========
            else if (currentLocation === "store") {
                fill(220, 200, 170);
                rect(30, 50, 840, 520);
                
                fill(139, 90, 43);
                rect(120, 140, 80, 60); // shelf
                rect(280, 140, 80, 60);
                
                fill(255);
                textSize(14);
                text("STORE", width/2, 80);
                
                fill(65, 105, 225);
                ellipse(player.x, player.y, 22, 22);
                
                fill(255);
                textSize(11);
                text("Press E to leave store", width/2, 560);
                
                if (keyIsDown(69)) {
                    currentLocation = "outside";
                    player.x = 760;
                    player.y = 200;
                    addLog("You left the store.", "#aaa");
                }
            }
            
            // Clamp player
            player.x = constrain(player.x, 40, width - 40);
            player.y = constrain(player.y, 70, height - 60);
            
            // Random events
            if (gameStarted && frameCount % 260 === 0 && random() < 0.25) {
                const ev = ["Steve smiled at you.", "Mom is cooking dinner.", "A car drove by.", "You saw a bird."];
                addLog(ev[Math.floor(random() * ev.length)], "#ffe66d");
            }
            
            // Auto age progression
            if (gameStarted && frameCount % 850 === 0) {
                age++;
                if (age >= 100) {
                    addLog("You lived to 100 years old!", "#ff6b6b");
                    setTimeout(() => {
                        addLog("Respawning as a new baby...", "#4ecdc4");
                        role = "Baby";
                        age = 0;
                        energy = 55;
                        hunger = 50;
                        happiness = 80;
                        currentLocation = "house";
                        player.x = 280;
                        player.y = 260;
                        updateHUD();
                        updateRoleActionHint();
                    }, 2200);
                }
                updateHUD();
            }
        }
    </script>
</body>
</html>
