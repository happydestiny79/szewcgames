<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AJ Anime Creation</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
<style>
  body { margin:0; background:#0a0a1f; color:#fff; font-family: 'Arial', sans-serif; }
  canvas { display:block; margin:10px auto; border:4px solid #4a90e2; border-radius:8px; }
  .info { text-align:center; max-width:900px; margin:0 auto; padding:5px; }
</style>
</head>
<body>
<div class="info">
  <h1 style="margin:5px">AJ Anime Creation</h1>
  <p style="margin:3px">Level 1 → 100 • Collect Puzzle Pieces • Unlock Legend Powers</p>
</div>

<script>
// ==================== GAME VARIABLES ====================
let playerName = "AJ";
let level = 1;
let puzzlePieces = 0;
let legendPieces = 0;
let xp = 0;
let gameState = "start";
let player, guide, enemies = [], pieces = [], projectiles = [], powerEffects = [];
let practiceMode = true;
let canLeavePractice = false;
let keys = {};
let specialAbilities = [];
let competitionWins = 0;

// ==================== SETUP ====================
function setup() {
  createCanvas(1050, 560);
  textAlign(CENTER, CENTER);
  
  player = {
    x: 180,
    y: 400,
    size: 48,
    vy: 0,
    onGround: true,
    speed: 5
  };
  
  guide = {
    x: 720,
    y: 380,
    message: "Welcome! Use the controls at the top. Press SPACE to start practice."
  };
}

// ==================== MAIN DRAW LOOP ====================
function draw() {
  background(8, 8, 30);
  
  // Anime night city skyline
  fill(18, 22, 55);
  rect(0, 0, width, 300);
  
  // Stars
  fill(255, 255, 210, 170);
  for (let i = 0; i < 65; i++) {
    ellipse((i * 29 + frameCount * 0.07) % width, (i * 17) % 260, 2, 2);
  }
  
  // Buildings with neon
  fill(22, 26, 52);
  for (let i = 0; i < 15; i++) {
    let bx = (i * 72) % width;
    let bh = 95 + (i % 7) * 32;
    rect(bx, 300 - bh, 65, bh);
    fill(255, 80, 180, 90);
    for (let wy = 8; wy < bh - 12; wy += 18) {
      for (let wx = 8; wx < 55; wx += 16) {
        rect(bx + wx, 300 - bh + wy, 6, 6);
      }
    }
    fill(22, 26, 52);
  }
  
  // Ground
  fill(25, 28, 45);
  rect(0, 460, width, 100);
  stroke(0, 255, 200, 180);
  strokeWeight(2);
  for (let i = 0; i < width; i += 50) {
    line(i, 465, i + 35, 465);
  }
  noStroke();
  
  // Control guide banner at the TOP only
  drawControlGuide();
  
  // Game states
  if (gameState === "start") {
    drawStartScreen();
  } else if (gameState === "practice") {
    drawPractice();
  } else if (gameState === "play") {
    drawGame();
  } else if (gameState === "levelup") {
    drawLevelUp();
  } else if (gameState === "free") {
    drawFreeMode();
  }
  
  // HUD
  drawHUD();
  updatePlayer();
  updateProjectiles();
}

// ==================== CONTROL GUIDE (TOP ONLY) ====================
function drawControlGuide() {
  fill(0, 0, 0, 200);
  rect(0, 0, width, 38);
  
  fill(255, 230, 120);
  textSize(15);
  textAlign(CENTER, CENTER);
  text("W = Left    |    S = Right    |    SPACE = Jump    |    A = Shoot    |    E = Special Ability", width/2, 19);
}

// ==================== START SCREEN ====================
function drawStartScreen() {
  fill(255);
  textSize(38);
  text("ANIME CREATION", width/2, 120);
  textSize(20);
  text("Level 1 → Level 100", width/2, 165);
  
  textSize(17);
  text("Press ENTER to begin", width/2, 230);
  
  fill(180, 210, 255);
  textSize(13);
  text("Collect ★ Puzzle Pieces  •  Unlock Legend Powers at Lv 50  •  Full Freedom at Lv 100", width/2, 290);
}

// ==================== PRACTICE MODE ====================
function drawPractice() {
  // Caleb the AI Guide
  fill(70, 170, 255);
  ellipse(guide.x, guide.y - 28, 48, 48);
  fill(35, 110, 190);
  rect(guide.x - 16, guide.y - 5, 32, 45);
  fill(255);
  textSize(13);
  text("Caleb (AI Guide)", guide.x, guide.y + 55);
  
  // Guide message
  fill(255, 255, 200);
  textSize(15);
  text(guide.message, width/2, 95);
  
  // Player character
  drawHero();
  
  // Training dummies
  for (let i = 0; i < 3; i++) {
    let ex = 280 + i * 200;
    fill(220, 90, 130);
    ellipse(ex, 410, 26, 26);
    textSize(10);
    fill(255);
    text("Trainee", ex, 445);
  }
  
  textSize(13);
  fill(200, 255, 220);
  text("Practice Mode — Press SPACE to collect puzzle piece • Press L to start real levels", width/2, 520);
}

// ==================== HERO DRAW (Yellow hair, black headband, black jacket, orange pants) ====================
function drawHero() {
  push();
  translate(player.x, player.y);
  
  // Orange pants
  fill(255, 140, 40);
  rect(-15, 8, 13, 32);
  rect(2, 8, 13, 32);
  
  // Black jacket
  fill(30, 30, 35);
  rect(-17, -22, 34, 32);
  
  // Jacket highlight
  fill(55, 55, 60);
  rect(-17, -22, 10, 32);
  
  // Head
  fill(255, 215, 180);
  ellipse(0, -32, 24, 24);
  
  // Yellow hair
  fill(255, 220, 60);
  arc(0, -34, 26, 20, PI, TWO_PI);
  
  // Black headband
  fill(20, 20, 25);
  rect(-13, -42, 26, 7);
  
  pop();
}

// ==================== VILLAIN DRAW (Yellow hair, black headband, orange & black) ====================
function drawVillain(v) {
  push();
  translate(v.x, v.y);
  
  // Orange and black outfit
  fill(255, 130, 30);
  rect(-12, 5, 24, 30);
  fill(25, 25, 30);
  rect(-12, 5, 10, 30);
  
  // Head
  fill(255, 215, 180);
  ellipse(0, -25, 22, 22);
  
  // Yellow hair
  fill(255, 215, 50);
  arc(0, -27, 24, 18, PI, TWO_PI);
  
  // Black headband
  fill(15, 15, 20);
  rect(-11, -35, 22, 6);
  
  pop();
}

// ==================== GAMEPLAY ====================
function drawGame() {
  drawHero();
  
  // Villains attack player
  for (let e of enemies) {
    drawVillain(e);
    
    // Simple AI attack - move toward player
    if (e.x < player.x - 30) e.x += e.speed;
    else if (e.x > player.x + 30) e.x -= e.speed;
    
    // Damage on contact
    if (dist(e.x, e.y, player.x, player.y) < 38) {
      player.x += (player.x - e.x) * 0.8;
    }
  }
  
  // Puzzle pieces
  for (let p of pieces) {
    if (!p.collected) {
      fill(255, 215, 60);
      ellipse(p.x, p.y, 17, 17);
      fill(255, 80, 40);
      textSize(11);
      text("★", p.x, p.y);
    }
  }
  
  // Projectiles
  for (let proj of projectiles) {
    fill(100, 255, 255);
    ellipse(proj.x, proj.y, 8, 8);
    fill(200, 255, 255);
    ellipse(proj.x, proj.y, 4, 4);
  }
  
  // Power effects
  for (let fx of powerEffects) {
    fill(120, 255, 200, fx.alpha);
    ellipse(fx.x, fx.y, fx.size, fx.size);
    fx.alpha -= 15;
    fx.size += 2;
  }
  powerEffects = powerEffects.filter(f => f.alpha > 10);
}

// ==================== FREE MODE (Lv 100) ====================
function drawFreeMode() {
  drawHero();
  
  fill(100, 255, 200);
  textSize(18);
  text("★ FREEDOM MODE - Level 100 ★", width/2, 85);
  textSize(13);
  fill(220);
  text("All abilities unlocked. Create your own anime story!", width/2, 110);
  
  // Freedom sparkles
  for (let i = 0; i < 10; i++) {
    fill(random(180, 255), random(220, 255), 100, 160);
    ellipse(random(width), random(200, 420), random(5, 9), random(5, 9));
  }
}

// ==================== LEVEL UP SCREEN ====================
function drawLevelUp() {
  fill(255, 210, 80);
  textSize(34);
  text("LEVEL UP!", width/2, 180);
  textSize(22);
  text("Level " + level, width/2, 230);
  
  if (level >= 50) {
    fill(255, 170, 50);
    text("LEGEND PIECES UNLOCKED!", width/2, 290);
  }
  
  textSize(15);
  fill(230);
  text("Press SPACE to continue", width/2, 360);
}

// ==================== HUD ====================
function drawHUD() {
  fill(0, 0, 0, 170);
  rect(15, 48, 260, 78);
  
  fill(255);
  textAlign(LEFT, TOP);
  textSize(15);
  text(playerName + "   |   Lv " + level, 28, 55);
  text("Puzzle Pieces: " + puzzlePieces, 28, 75);
  text("Legend Pieces: " + legendPieces + " / 10", 28, 95);
  
  // XP bar
  fill(50);
  rect(28, 115, 230, 8);
  fill(90, 230, 130);
  rect(28, 115, min(xp / 1.8, 230), 8);
  
  textAlign(CENTER, CENTER);
}

// ==================== PLAYER UPDATE & CONTROLS ====================
function updatePlayer() {
  if (gameState !== "play" && gameState !== "practice" && gameState !== "free") return;
  
  // NEW CONTROLS: W = Left, S = Right, SPACE = Jump, A = Shoot
  if (keys[87]) player.x -= player.speed;        // W = Left
  if (keys[83]) player.x += player.speed;        // S = Right
  
  // Jump
  if (keys[32] && player.onGround) {
    player.vy = -13;
    player.onGround = false;
  }
  
  // Shoot with A
  if (keys[65]) {
    shoot();
    keys[65] = false; // prevent auto-fire
  }
  
  // Special ability
  if (keys[69]) {
    useSpecialAbility();
    keys[69] = false;
  }
  
  // Gravity
  player.vy += 0.85;
  player.y += player.vy;
  
  if (player.y > 400) {
    player.y = 400;
    player.vy = 0;
    player.onGround = true;
  }
  
  // Boundaries
  if (player.x < 35) player.x = 35;
  if (player.x > width - 35) player.x = width - 35;
  
  // Collect puzzle pieces
  for (let p of pieces) {
    if (!p.collected && dist(player.x, player.y, p.x, p.y) < 32) {
      p.collected = true;
      puzzlePieces++;
      xp += 18;
      
      if (xp > level * 32 && level < 100) {
        level++;
        xp = 0;
        if (level === 50) legendPieces = 5;
        if (level >= 100) {
          gameState = "free";
          legendPieces = 10;
        }
        gameState = "levelup";
      }
    }
  }
  
  // Check enemy contact damage
  for (let e of enemies) {
    if (dist(player.x, player.y, e.x, e.y) < 36) {
      player.x += (player.x - e.x) * 0.6;
    }
  }
}

// ==================== SHOOT ====================
function shoot() {
  projectiles.push({
    x: player.x + 30,
    y: player.y - 25,
    speed: 9
  });
}

// ==================== UPDATE PROJECTILES ====================
function updateProjectiles() {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    let proj = projectiles[i];
    proj.x += proj.speed;
    
    // Hit enemies
    for (let j = enemies.length - 1; j >= 0; j--) {
      if (dist(proj.x, proj.y, enemies[j].x, enemies[j].y) < 25) {
        enemies.splice(j, 1);
        projectiles.splice(i, 1);
        xp += 8;
        powerEffects.push({x: proj.x, y: proj.y, size: 22, alpha: 255});
        break;
      }
    }
    
    // Remove offscreen
    if (proj.x > width + 20) projectiles.splice(i, 1);
  }
}

// ==================== SPECIAL ABILITY ====================
function useSpecialAbility() {
  powerEffects.push({x: player.x + 50, y: player.y - 20, size: 28, alpha: 255});
  
  // Damage nearby villains
  for (let i = enemies.length - 1; i >= 0; i--) {
    if (dist(player.x, player.y, enemies[i].x, enemies[i].y) < 130) {
      enemies.splice(i, 1);
    }
  }
  
  if (level > 40) {
    for (let i = 0; i < 3; i++) {
      powerEffects.push({x: player.x + random(30, 90), y: player.y - random(20, 50), size: 18, alpha: 220});
    }
  }
}

// ==================== SPAWN ENEMIES (Villains) ====================
function spawnLevelEnemies() {
  enemies = [];
  let count = min(3 + floor(level / 7), 10);
  for (let i = 0; i < count; i++) {
    enemies.push({
      x: random(380, width - 60),
      y: 400,
      speed: 1.6 + level * 0.025
    });
  }
  
  // Spawn puzzle pieces
  pieces = [];
  for (let i = 0; i < 5; i++) {
    pieces.push({
      x: random(80, width - 80),
      y: random(260, 390),
      collected: false
    });
  }
}

// ==================== KEY HANDLING ====================
function keyPressed() {
  keys[keyCode] = true;
  
  if (gameState === "start") {
    if (keyCode === ENTER) {
      gameState = "practice";
      practiceMode = true;
      guide.message = "Great! Move with W/S, SPACE to jump, A to shoot. Collect your first piece!";
      canLeavePractice = true;
    }
  } 
  else if (gameState === "practice") {
    if (keyCode === 32) { // SPACE
      puzzlePieces = 1;
      xp += 22;
      guide.message = "Excellent! Press L to leave practice and begin real levels.";
      canLeavePractice = true;
      powerEffects.push({x: player.x + 30, y: player.y - 30, size: 35, alpha: 230});
    }
    if (keyCode === 76 && canLeavePractice) { // L
      practiceMode = false;
      gameState = "play";
      spawnLevelEnemies();
      guide.message = "";
    }
  } 
  else if (gameState === "play") {
    if (keyCode === 80) { // P = back to practice
      gameState = "practice";
      practiceMode = true;
    }
  } 
  else if (gameState === "levelup") {
    if (keyCode === 32) {
      gameState = "play";
      spawnLevelEnemies();
    }
  } 
  else if (gameState === "free") {
    if (keyCode === 32 && player.onGround) {
      player.vy = -14;
      player.onGround = false;
    }
    if (keyCode === 65) shoot();
    if (keyCode === 69) useSpecialAbility();
  }
  
  return false;
}

function keyReleased() {
  keys[keyCode] = false;
}

// ==================== MOUSE ====================
function mousePressed() {
  if ((gameState === "play" || gameState === "free") && mouseY > 50) {
    for (let p of pieces) {
      if (!p.collected && dist(mouseX, mouseY, p.x, p.y) < 28) {
        p.collected = true;
        puzzlePieces++;
        xp += 15;
        powerEffects.push({x: p.x, y: p.y, size: 32, alpha: 255});
      }
    }
  }
}
</script>
</body>
</html>
