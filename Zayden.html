<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zayden's Escape - Super Saiyan Stage 2</title>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
  <style>
    body {
      margin: 0;
      background: #0a1628;
      color: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    canvas {
      border: 4px solid #00d4ff;
      border-radius: 8px;
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
    }
    .info {
      margin-top: 15px;
      text-align: center;
      max-width: 700px;
    }
    h1 {
      color: #aa66ff;
      text-shadow: 0 0 15px #aa66ff;
      margin: 0 0 10px 0;
    }
    .controls {
      background: #112244;
      padding: 12px 20px;
      border-radius: 8px;
      margin-top: 10px;
      font-size: 14px;
    }
    .status {
      color: #00ffcc;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>🌀 ZAYDEN'S ESCAPE 🌀</h1>
  <p style="color:#aa88ff; margin:5px 0;">Future Platform • Trapped • Super Saiyan Stage 2 (Purple)</p>
  
  <div id="game-container"></div>
  
  <div class="info">
    <div class="controls">
      <strong>Controls:</strong><br>
      ← → / A D : Move &nbsp;&nbsp; SPACE : Jump &nbsp;&nbsp; <span style="color:#aa66ff">G : Super Saiyan Stage 2</span><br>
      <span style="color:#ff6666">At the end: K = Kill &nbsp; | &nbsp; S = Spare</span>
    </div>
    <p style="font-size:13px; color:#aaa; margin-top:8px;">
      Trapped in the future. Escape John and find your way home.<br>
      <span class="status">Level <span id="level-display">1</span> / 19</span>
    </p>
  </div>

  <script>
    let player, enemy, platforms = [];
    let level = 1;
    let maxLevels = 19;
    let gameState = "playing";
    let superSaiyan = false;
    let superTimer = 0;
    let score = 0;
    let clouds = [], particles = [];
    let storyIndex = 0;
    let inJohnsHouse = false;
    let choiceMade = "";
    let storyPhase = 0; // 0 = first escape story, 1 = John's house story

    const storyBeats = [
      "You finally escape the floating platforms...",
      "You see your mom waiting at the door. She looks worried but relieved.",
      "She cooks your favorite meal. You sit together and eat in silence.",
      "After dinner, you go upstairs to your room.",
      "You turn on the TV. Something feels... off. The news looks strange.",
      "You start feeling sleepy. Your eyes grow heavy...",
      "You wake up — not in your bed, but in a dark house.",
      "This is John's house. You're trapped again."
    ];

    const johnsHouseStory = [
      "You escaped John's house... but something still feels wrong.",
      "You run back home, heart pounding.",
      "Your mom is waiting. She asks if you're okay.",
      "You tell her everything. She believes you.",
      "That night, you go to sleep again...",
      "This time, you wake up in a completely new place.",
      "The cycle isn't over yet..."
    ];

    function setup() {
      let canvas = createCanvas(800, 500);
      canvas.parent('game-container');
      resetLevel();
      for (let i = 0; i < 6; i++) {
        clouds.push({x: random(width), y: random(50, 150), size: random(40, 80)});
      }
    }

    function resetLevel() {
      platforms = [];
      
      if (inJohnsHouse) {
        // John's House - Much Harder Version
        platforms.push({x: 0, y: 420, w: 800, h: 80, house: true});
        
        // More complex and dangerous layout
        platforms.push({x: 80, y: 360, w: 100, h: 18, house: true, moving: true, dir: 1, speed: 1.8});
        platforms.push({x: 250, y: 300, w: 90, h: 18, house: true});
        platforms.push({x: 400, y: 260, w: 110, h: 18, house: true, moving: true, dir: -1, speed: 2.2});
        platforms.push({x: 580, y: 220, w: 85, h: 18, house: true});
        platforms.push({x: 300, y: 170, w: 120, h: 18, house: true, moving: true, dir: 1, speed: 1.5});
        platforms.push({x: 150, y: 120, w: 95, h: 18, house: true});
        platforms.push({x: 520, y: 90, w: 100, h: 18, house: true, moving: true, dir: -1, speed: 2.0});
        
        // Final exit
        platforms.push({x: 650, y: 420, w: 120, h: 20, goal: true, house: true});
      } else {
        // Normal floating platforms
        platforms.push({x: 0, y: 420, w: 800, h: 80});
        let platformCount = min(3 + floor(level / 2), 9);
        for (let i = 0; i < platformCount; i++) {
          let px = 100 + (i * (650 / platformCount)) + random(-25, 25);
          let py = 380 - (i * 38) - random(0, level * 9);
          platforms.push({
            x: px, y: constrain(py, 140, 380), w: random(75, 135), h: 20,
            moving: level > 5 && random() > 0.5,
            dir: random([-1, 1]), speed: random(1.0, 2.0)
          });
        }
        platforms.push({x: 650, y: 200, w: 120, h: 20, goal: true});
      }
      
      player = {
        x: 80, y: inJohnsHouse ? 380 : 350,
        w: 28, h: 42, vx: 0, vy: 0, onGround: false, color: [70, 130, 200]
      };
      
      enemy = {
        x: inJohnsHouse ? 550 : 420, y: inJohnsHouse ? 380 : 350,
        w: 30, h: 44, vx: 0, vy: 0, onGround: false,
        health: inJohnsHouse ? 8 : (3 + floor(level / 3)),
        angry: true
      };
      
      superSaiyan = false;
      superTimer = 0;
      gameState = "playing";
    }

    function draw() {
      if (gameState === "story") {
        drawStoryScreen();
        return;
      }
      
      // Background
      if (inJohnsHouse) {
        background(25, 20, 40);
        fill(45, 35, 60);
        rect(0, 0, width, 90);
        fill(60, 50, 80, 80);
        for (let i = 0; i < 5; i++) {
          rect(50 + i * 160, 20, 30, 50);
        }
      } else {
        background(20, 60, 140);
        for (let i = 0; i < 8; i++) {
          fill(30 + i*8, 80 + i*10, 160 + i*5, 180);
          rect(0, i * 60, width, 70);
        }
        fill(255, 230, 100); circle(650, 80, 50);
      }
      
      // Clouds
      if (!inJohnsHouse) {
        fill(255, 255, 255, 170);
        for (let c of clouds) {
          ellipse(c.x, c.y, c.size, c.size * 0.6);
          ellipse(c.x + 25, c.y - 5, c.size * 0.8, c.size * 0.5);
          c.x += 0.15; if (c.x > width + 50) c.x = -80;
        }
      }
      
      // Platforms
      for (let p of platforms) {
        if (p.moving) {
          p.x += p.dir * p.speed;
          if (p.x < 40 || p.x + p.w > 760) p.dir *= -1;
        }
        if (inJohnsHouse) {
          fill(p.goal ? '#ffaa00' : '#443355');
          stroke('#665577');
        } else {
          fill(p.goal ? '#00ffaa' : '#334466');
          stroke(p.goal ? '#00ffcc' : '#556688');
        }
        strokeWeight(2);
        rect(p.x, p.y, p.w, p.h, 4);
      }
      
      drawJohn();
      drawZayden();
      
      // Purple particles
      if (superSaiyan) {
        for (let i = particles.length - 1; i >= 0; i--) {
          let pt = particles[i];
          fill(170, 100, 255, pt.alpha);
          circle(pt.x, pt.y, pt.size);
          pt.y -= 2; pt.alpha -= 10;
          if (pt.alpha <= 0) particles.splice(i, 1);
        }
      }
      
      // UI
      fill(255); textSize(16); textAlign(LEFT);
      let lvlText = inJohnsHouse ? "John's House" : `Level ${level}`;
      text(lvlText, 20, 30);
      
      if (superSaiyan) {
        fill(170, 100, 255);
        text("⚡ SUPER SAIYAN STAGE 2 ⚡", 20, 55);
        superTimer--;
        if (superTimer <= 0) superSaiyan = false;
      }
      
      if (enemy.health > 0) {
        fill(40); rect(enemy.x - 5, enemy.y - 18, 40, 6);
        fill(255, 50, 50); rect(enemy.x - 5, enemy.y - 18, map(enemy.health, 0, 9, 0, 40), 6);
      }
      
      // Messages
      if (gameState === "escaped") {
        fill(0, 255, 150); textSize(26); textAlign(CENTER);
        text("YOU ESCAPED!", width/2, 170);
        textSize(15); fill(255);
        text("Press SPACE to continue the story", width/2, 210);
      }
      if (gameState === "badEnding") {
        fill(255, 80, 80); textSize(22); textAlign(CENTER);
        text("THE BAD GUY FOLLOWED YOU...", width/2, 190);
        textSize(15); fill(255); text("Press R to try again", width/2, 240);
      }
      if (gameState === "won") {
        fill(255, 215, 0); textSize(30); textAlign(CENTER);
        text("🏆 YOU WON! 🏆", width/2, 190);
        textSize(16); text("All 19 levels complete!", width/2, 235);
      }
      
      handleInput();
      updatePhysics();
      handleCollisions();
      updateEnemy();
      checkWinCondition();
    }

    function drawStoryScreen() {
      background(15, 18, 40);
      fill(255); textAlign(CENTER); textSize(20);
      text("Zayden's Story", width/2, 60);
      
      let currentStory = storyPhase === 0 ? storyBeats : johnsHouseStory;
      
      fill(200, 180, 255); textSize(17);
      let y = 130;
      for (let i = 0; i <= storyIndex && i < currentStory.length; i++) {
        text(currentStory[i], width/2, y);
        y += 36;
      }
      
      // Show choices at certain points
      if (storyIndex === 3 && storyPhase === 0) {
        fill(255, 200, 100); textSize(15);
        text("Choice: [1] Go straight to your room    [2] Check the window first", width/2, 420);
      }
      if (storyIndex === 5 && storyPhase === 0) {
        fill(255, 200, 100); textSize(15);
        text("Choice: [1] Fight the sleep    [2] Accept it and sleep", width/2, 420);
      }
      
      fill(150); textSize(14);
      text("Press SPACE to continue...", width/2, 470);
    }

    function drawZayden() {
      let p = player;
      push(); translate(p.x, p.y);
      let shirtColor = superSaiyan ? [170, 100, 255] : p.color;
      fill(shirtColor[0], shirtColor[1], shirtColor[2]);
      rect(0, 12, p.w, 24, 3);
      fill(210, 160, 120); rect(4, 0, 20, 16, 4);
      fill(superSaiyan ? [140, 80, 220] : [101, 67, 33]);
      rect(3, -2, 22, 8, 3);
      if (superSaiyan) {
        fill(170, 100, 255); triangle(5, -2, 14, -20, 23, -2);
        noFill(); stroke(170, 100, 255, 150); strokeWeight(3);
        ellipse(p.w/2, p.h/2 + 5, p.w + 18, p.h + 22);
      }
      fill(30); rect(3, 34, 9, 12); rect(16, 34, 9, 12);
      pop();
    }

    function drawJohn() {
      let e = enemy;
      push(); translate(e.x, e.y);
      fill(25); rect(0, 14, e.w, 26);
      fill(60); rect(3, 2, 24, 16, 3);
      fill(10); rect(5, 5, 20, 10);
      fill(0); rect(6, 6, 16, 6);
      fill(20); rect(2, -1, 26, 6);
      fill(90); rect(3, 38, 10, 10); rect(17, 38, 10, 10);
      pop();
    }

    function handleInput() {
      if (gameState !== "playing") return;
      let speed = superSaiyan ? 5.8 : 4.2;
      
      if (keyIsDown(LEFT_ARROW) || keyIsDown(65)) player.vx = -speed;
      else if (keyIsDown(RIGHT_ARROW) || keyIsDown(68)) player.vx = speed;
      else player.vx *= 0.7;
      
      if ((keyIsDown(32) || keyIsDown(UP_ARROW)) && player.onGround) {
        player.vy = superSaiyan ? -15 : -12;
        player.onGround = false;
      }
      
      if (keyIsDown(71) && !superSaiyan) {
        superSaiyan = true;
        superTimer = 220 + level * 12;
        for (let i = 0; i < 20; i++) {
          particles.push({
            x: player.x + random(10, 30),
            y: player.y + random(10, 40),
            size: random(5, 11),
            alpha: 240
          });
        }
      }
    }

    function updatePhysics() {
      if (gameState !== "playing") return;
      player.vy += 0.6; enemy.vy += 0.6;
      player.x += player.vx; player.y += player.vy;
      enemy.x += enemy.vx; enemy.y += enemy.vy;
      player.x = constrain(player.x, 0, width - player.w);
      enemy.x = constrain(enemy.x, 0, width - enemy.w);
    }

    function handleCollisions() {
      player.onGround = false; enemy.onGround = false;
      for (let p of platforms) {
        if (player.x < p.x + p.w && player.x + player.w > p.x &&
            player.y < p.y + p.h && player.y + player.h > p.y) {
          if (player.vy > 0 && player.y < p.y) {
            player.y = p.y - player.h; player.vy = 0; player.onGround = true;
          } else if (player.vy < 0) { player.y = p.y + p.h; player.vy = 0; }
        }
        if (enemy.x < p.x + p.w && enemy.x + enemy.w > p.x &&
            enemy.y < p.y + p.h && enemy.y + enemy.h > p.y) {
          if (enemy.vy > 0) { enemy.y = p.y - enemy.h; enemy.vy = 0; enemy.onGround = true; }
        }
      }
      if (player.y > 420) { player.y = 420 - player.h; player.vy = 0; player.onGround = true; }
    }

    function updateEnemy() {
      if (gameState !== "playing" || enemy.health <= 0) return;
      let chaseSpeed = inJohnsHouse ? 3.2 : (2.3 + level * 0.2);
      if (enemy.x < player.x - 18) enemy.vx = chaseSpeed;
      else if (enemy.x > player.x + 18) enemy.vx = -chaseSpeed;
      else enemy.vx *= 0.5;
      
      if (random() < (inJohnsHouse ? 0.04 : 0.025) && enemy.onGround) {
        enemy.vy = inJohnsHouse ? -11 : -9.5;
      }
    }

    function checkWinCondition() {
      if (gameState !== "playing") return;
      let goal = platforms.find(p => p.goal);
      if (goal && player.x > goal.x + 30 && player.y < goal.y + 30) {
        gameState = "escaped";
      }
      if (abs(player.x - enemy.x) < 25 && abs(player.y - enemy.y) < 30 && enemy.health > 0) {
        if (!superSaiyan) gameState = "badEnding";
        else { enemy.health = 0; score += 100; }
      }
    }

    function keyPressed() {
      if (gameState === "story") {
        if (key === ' ') {
          let currentStory = storyPhase === 0 ? storyBeats : johnsHouseStory;
          
          // Handle choices
          if (storyIndex === 3 && storyPhase === 0) {
            if (key === '1') choiceMade = "room";
            if (key === '2') choiceMade = "window";
          }
          if (storyIndex === 5 && storyPhase === 0) {
            if (key === '1') choiceMade = "fight";
            if (key === '2') choiceMade = "accept";
          }
          
          storyIndex++;
          if (storyIndex >= currentStory.length) {
            if (storyPhase === 0) {
              // Finished first story → enter John's House
              inJohnsHouse = true;
              gameState = "playing";
              level = 16;
              resetLevel();
              storyIndex = 0;
              storyPhase = 1;
            } else {
              // Finished second story → win or continue
              gameState = "won";
            }
          }
        }
        return;
      }
      
      if (gameState === "escaped") {
        if (key === ' ') {
          if (level >= 15 && !inJohnsHouse) {
            gameState = "story";
            storyIndex = 0;
            storyPhase = 0;
          } else if (level < maxLevels) {
            level++;
            resetLevel();
          } else {
            gameState = "won";
          }
        }
      }
      
      if ((gameState === "escaped" || gameState === "badEnding") && (key === 'r' || key === 'R')) {
        if (level < maxLevels) { level++; resetLevel(); }
        else { gameState = "won"; }
      }
      
      if (key === 'r' || key === 'R') {
        if (gameState === "playing") resetLevel();
      }
    }

    function mousePressed() {
      if (gameState === "story") {
        let currentStory = storyPhase === 0 ? storyBeats : johnsHouseStory;
        storyIndex++;
        if (storyIndex >= currentStory.length) {
          if (storyPhase === 0) {
            inJohnsHouse = true;
            gameState = "playing";
            level = 16;
            resetLevel();
            storyIndex = 0;
            storyPhase = 1;
          } else {
            gameState = "won";
          }
        }
      } else if (gameState !== "playing") {
        if (level < maxLevels) level++;
        else { level = 1; inJohnsHouse = false; }
        resetLevel();
      }
    }
  </script>
</body>
</html>
