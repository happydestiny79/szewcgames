<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MJ • The Strongest Hero • 2070</title>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
  <style>
    body { margin: 0; background: #0a0a1f; color: #fff; font-family: Arial, sans-serif; }
    canvas { display: block; margin: 20px auto; border: 4px solid #00ccff; box-shadow: 0 0 30px #00ccff; }
    .info { text-align: center; margin-top: 10px; }
    .info h1 { color: #00ccff; text-shadow: 0 0 10px #00ccff; }
  </style>
</head>
<body>
<div class="info">
  <h1>MJ • THE STRONGEST HERO</h1>
  <p>2070 New York • Play as MJ • Defeat the Villain Nick</p>
</div>

<script>
let nick, mj;
let nickHealth = 100;
let mjHealth = 100;
let gameState = "start";
let particles = [];
let skyscrapers = [];
let taxis = [];
let waterLevel = 380;

function setup() {
  createCanvas(900, 550);
  
  for (let i = 0; i < 8; i++) {
    skyscrapers.push({
      x: i * 120 + 30,
      w: random(70, 100),
      h: random(220, 380),
      color: color(random(20, 50), random(10, 30), random(60, 100))
    });
  }
  
  for (let i = 0; i < 5; i++) {
    taxis.push({
      x: random(width),
      y: random(80, 200),
      speed: random(1.5, 3.5),
      color: color(255, random(200, 255), 50)
    });
  }
  
  nick = {
    x: 180,
    y: 320,
    size: 55,
    color: color(20, 20, 20),
    facing: 1,
    dashCooldown: 0,
    attackTimer: 0,
    trail: []
  };
  
  mj = {
    x: 680,
    y: 200,
    size: 50,
    color: color(255, 255, 255),
    vy: 0,
    attackTimer: 0,
    facing: -1
  };
}

function draw() {
  background(10, 10, 35);
  
  for (let i = 0; i < 20; i++) {
    fill(10 + i * 3, 10, 50 + i * 4, 80);
    rect(0, i * 15, width, 15);
  }
  
  for (let s of skyscrapers) {
    fill(s.color);
    rect(s.x, waterLevel - s.h, s.w, s.h);
    fill(255, 200, 50, 180);
    for (let wy = waterLevel - s.h + 20; wy < waterLevel - 30; wy += 25) {
      for (let wx = s.x + 10; wx < s.x + s.w - 10; wx += 18) {
        rect(wx, wy, 8, 12);
      }
    }
  }
  
  fill(20, 60, 120, 180);
  rect(0, waterLevel, width, height - waterLevel);
  fill(100, 200, 255, 60);
  rect(0, waterLevel + 5, width, 30);
  
  for (let t of taxis) {
    t.x += t.speed;
    if (t.x > width + 30) t.x = -30;
    
    fill(t.color);
    ellipse(t.x, t.y, 35, 18);
    fill(255, 255, 200);
    ellipse(t.x - 12, t.y, 8, 8);
    fill(255, 50, 50);
    ellipse(t.x + 12, t.y, 6, 6);
  }
  
  if (gameState === "start") {
    drawStartScreen();
  } else if (gameState === "fight") {
    drawFight();
  } else if (gameState === "win" || gameState === "lose") {
    drawEndScreen();
  }
  
  updateParticles();
}

function drawStartScreen() {
  fill(255);
  textSize(44);
  textAlign(CENTER);
  text("MJ • THE STRONGEST HERO", width/2, 120);
  
  textSize(18);
  fill(200, 220, 255);
  text("MJ — African Hero — All White — Can Fly", width/2, 175);
  fill(255, 100, 100);
  text("Nick — Betrayed Villain — All Black — Super Speed", width/2, 205);
  
  textSize(18);
  fill(255);
  text("Press SPACE to FIGHT AS MJ", width/2, 280);
  
  textSize(15);
  fill(180);
  text("Arrow Keys = Move  |  SPACE = Energy Blast  |  X = Flying Strike", width/2, 330);
}

function drawFight() {
  drawNick();
  drawMJ();
  drawHealthBars();
  
  fill(200);
  textSize(14);
  textAlign(LEFT);
  text("Arrow Keys: Move   |   SPACE: Energy Blast   |   X: Flying Strike", 30, height - 25);
  
  handleInput();
  updateNickAI();
  
  if (nickHealth <= 0) gameState = "win";
  if (mjHealth <= 0) gameState = "lose";
}

function drawNick() {
  nick.trail.push({x: nick.x, y: nick.y});
  if (nick.trail.length > 7) nick.trail.shift();
  
  for (let i = 0; i < nick.trail.length; i++) {
    let alpha = map(i, 0, nick.trail.length, 20, 140);
    fill(80, 80, 220, alpha);
    ellipse(nick.trail[i].x, nick.trail[i].y + 25, nick.size * 0.75);
  }
  
  // Human-like villain body
  fill(nick.color);
  ellipse(nick.x, nick.y - 15, 32, 34); // head
  rect(nick.x - 15, nick.y + 2, 30, 38); // body
  rect(nick.x - 12, nick.y + 38, 9, 18); // legs
  rect(nick.x + 3, nick.y + 38, 9, 18);
  
  fill(0);
  ellipse(nick.x, nick.y - 18, 26, 22); // hood
  
  fill(139, 69, 19);
  ellipse(nick.x - 7, nick.y - 18, 6, 5);
  ellipse(nick.x + 7, nick.y - 18, 6, 5);
  
  // Angry red eyes when attacking
  if (nick.dashCooldown > 8) {
    fill(255, 50, 50);
    ellipse(nick.x - 7, nick.y - 18, 7, 6);
    ellipse(nick.x + 7, nick.y - 18, 7, 6);
  }
}

function drawMJ() {
  mj.y = 195 + sin(frameCount * 0.07) * 22;
  
  // White glowing aura
  fill(200, 230, 255, 35);
  ellipse(mj.x, mj.y, mj.size * 1.8, mj.size * 2.0);
  
  // Human-like MJ body
  fill(mj.color);
  ellipse(mj.x, mj.y - 18, 30, 32); // head
  rect(mj.x - 14, mj.y + 1, 28, 36); // body
  fill(250);
  rect(mj.x - 10, mj.y + 35, 8, 16);
  rect(mj.x + 2, mj.y + 35, 8, 16);
  
  fill(245);
  ellipse(mj.x, mj.y - 20, 26, 20); // hood/hair
  
  fill(101, 67, 33);
  ellipse(mj.x - 6, mj.y - 19, 6, 5);
  ellipse(mj.x + 6, mj.y - 19, 6, 5);
  
  // Energy wings
  stroke(255, 255, 255, 200);
  strokeWeight(5);
  line(mj.x - 14, mj.y + 8, mj.x - 34, mj.y - 4);
  line(mj.x + 14, mj.y + 8, mj.x + 34, mj.y - 4);
  noStroke();
  
  fill(255, 255, 255, 120);
  ellipse(mj.x, mj.y + 48, 36, 8);
}

function drawHealthBars() {
  fill(40);
  rect(30, 30, 200, 22);
  fill(50, 200, 255);
  rect(30, 30, map(nickHealth, 0, 100, 0, 200), 22);
  fill(255);
  textSize(14);
  text("NICK (Villain)", 35, 46);
  
  fill(40);
  rect(width - 230, 30, 200, 22);
  fill(100, 220, 255);
  rect(width - 230, 30, map(mjHealth, 0, 100, 0, 200), 22);
  fill(255);
  text("MJ (Hero)", width - 225, 46);
}

function handleInput() {
  let speed = 4.2;
  
  if (keyIsDown(LEFT_ARROW)) { mj.x -= speed; mj.facing = -1; }
  if (keyIsDown(RIGHT_ARROW)) { mj.x += speed; mj.facing = 1; }
  if (keyIsDown(UP_ARROW)) { mj.y -= speed * 0.75; }
  if (keyIsDown(DOWN_ARROW)) { mj.y += speed * 0.75; }
  
  // SPACE = Energy Blast (ranged)
  if (keyIsDown(32) && mj.attackTimer <= 0) {
    mj.attackTimer = 18;
    
    for (let i = 0; i < 10; i++) {
      particles.push({
        x: mj.x,
        y: mj.y,
        vx: (nick.x - mj.x) * 0.09 + random(-2, 2),
        vy: (nick.y - mj.y) * 0.09 + random(-2, 2),
        life: 20,
        color: color(150, 220, 255)
      });
    }
    
    if (dist(mj.x, mj.y, nick.x, nick.y) < 135) {
      nickHealth -= 10;
      createHitParticles(nick.x, nick.y);
    }
  }
  
  // X = Flying Strike (close range melee)
  if (keyIsDown(88) && mj.attackTimer <= 0) { // X key
    mj.attackTimer = 24;
    
    // Dash forward quickly
    mj.x += 45 * mj.facing;
    
    // Strong hit if close
    if (dist(mj.x, mj.y, nick.x, nick.y) < 75) {
      nickHealth -= 18;
      createHitParticles(nick.x, nick.y);
      
      // Knockback effect
      nick.x += 30 * mj.facing;
    }
    
    // Strike particles
    for (let i = 0; i < 8; i++) {
      particles.push({
        x: mj.x + random(-15, 15),
        y: mj.y + random(-10, 20),
        vx: 6 * mj.facing,
        vy: random(-3, 3),
        life: 16,
        color: color(255, 255, 255)
      });
    }
  }
  
  mj.attackTimer = max(0, mj.attackTimer - 1);
  mj.x = constrain(mj.x, 50, width - 50);
  mj.y = constrain(mj.y, 90, waterLevel - 40);
}

function updateNickAI() {
  nick.attackTimer++;
  nick.dashCooldown = max(0, nick.dashCooldown - 1);
  
  // Aggressive chasing
  let targetX = mj.x + (sin(frameCount * 0.035) * 50);
  nick.x = lerp(nick.x, targetX, 0.035);
  
  // Nick dashes more aggressively
  if (nick.attackTimer % 38 === 0 && nick.dashCooldown <= 0) {
    nick.dashCooldown = 16;
    nick.x += 70 * ((mj.x > nick.x) ? 1 : -1);
    
    // Strong dash attack
    if (dist(mj.x, mj.y, nick.x, nick.y) < 85) {
      mjHealth -= 13;
      createHitParticles(mj.x, mj.y);
    }
    
    // Dash particles
    for (let i = 0; i < 9; i++) {
      particles.push({
        x: nick.x - 25 * nick.facing,
        y: nick.y + random(-12, 12),
        vx: -7 * ((mj.x > nick.x) ? 1 : -1),
        vy: random(-2, 2),
        life: 14,
        color: color(120, 100, 255)
      });
    }
  }
  
  // Occasional powerful counter attack
  if (nick.attackTimer % 75 === 0) {
    nick.x += 35 * ((mj.x > nick.x) ? 1 : -1);
    if (dist(mj.x, mj.y, nick.x, nick.y) < 65) {
      mjHealth -= 9;
      createHitParticles(mj.x, mj.y);
    }
  }
  
  nick.x = constrain(nick.x, 50, width - 50);
  nick.y = constrain(nick.y, 200, waterLevel - 30);
}

function createHitParticles(x, y) {
  for (let i = 0; i < 14; i++) {
    particles.push({
      x: x,
      y: y,
      vx: random(-4.5, 4.5),
      vy: random(-4.5, 4.5),
      life: random(16, 30),
      color: color(255, random(120, 220), 80)
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    p.vx *= 0.95;
    p.vy *= 0.95;
    
    fill(p.color);
    noStroke();
    ellipse(p.x, p.y, map(p.life, 0, 28, 2, 9));
    
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawEndScreen() {
  fill(0, 0, 0, 180);
  rect(0, 0, width, height);
  
  if (gameState === "win") {
    fill(100, 255, 180);
    textSize(46);
    textAlign(CENTER);
    text("NICK DEFEATED", width/2, 170);
    textSize(22);
    fill(255);
    text("MJ remains the strongest hero", width/2, 220);
    textSize(18);
    text("Press R to play again", width/2, 290);
  } else {
    fill(255, 90, 90);
    textSize(46);
    textAlign(CENTER);
    text("MJ WAS DEFEATED", width/2, 170);
    textSize(22);
    fill(255);
    text("The Villain Wins...", width/2, 220);
    textSize(18);
    text("Press R to try again", width/2, 290);
  }
}

function keyPressed() {
  if (gameState === "start" && key === ' ') {
    gameState = "fight";
    nickHealth = 100;
    mjHealth = 100;
  }
  
  if ((gameState === "win" || gameState === "lose") && (key === 'r' || key === 'R')) {
    gameState = "start";
    mj.x = 680;
    mj.y = 200;
    nick.x = 180;
    nick.y = 320;
    particles = [];
  }
}
</script>
</body>
</html>
