<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MJ • The Villain • 2070</title>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
  <style>
    body { margin: 0; background: #0a0a1f; color: #fff; font-family: Arial, sans-serif; }
    canvas { display: block; margin: 20px auto; border: 4px solid #ff00aa; box-shadow: 0 0 30px #ff00aa; }
    .info { text-align: center; margin-top: 10px; }
    .info h1 { color: #ff00aa; text-shadow: 0 0 10px #ff00aa; }
  </style>
</head>
<body>
<div class="info">
  <h1>MJ • THE VILLAIN RISES</h1>
  <p>2070 New York • Nick vs Kesha • Super Speed vs Flight</p>
</div>

<script>
let nick, kesha;
let nickHealth = 100;
let keshaHealth = 100;
let gameState = "start";
let particles = [];
let skyscrapers = [];
let taxis = [];
let waterLevel = 380;

function setup() {
  createCanvas(900, 550);
  
  for (let i = 0; i < 8; i++) {
    skyscrapers.push({
      x: i * 120 + 30,
      w: random(70, 100),
      h: random(220, 380),
      color: color(random(20, 50), random(10, 30), random(60, 100))
    });
  }
  
  for (let i = 0; i < 5; i++) {
    taxis.push({
      x: random(width),
      y: random(80, 200),
      speed: random(1.5, 3.5),
      color: color(255, random(200, 255), 50)
    });
  }
  
  nick = {
    x: 180,
    y: 320,
    size: 55,
    color: color(20, 20, 20),
    facing: 1,
    dashCooldown: 0,
    trail: []
  };
  
  kesha = {
    x: 680,
    y: 200,
    size: 50,
    color: color(255, 255, 255),
    vy: 0,
    attackTimer: 0
  };
}

function draw() {
  background(10, 10, 35);
  
  for (let i = 0; i < 20; i++) {
    fill(10 + i * 3, 10, 50 + i * 4, 80);
    rect(0, i * 15, width, 15);
  }
  
  for (let s of skyscrapers) {
    fill(s.color);
    rect(s.x, waterLevel - s.h, s.w, s.h);
    fill(255, 200, 50, 180);
    for (let wy = waterLevel - s.h + 20; wy < waterLevel - 30; wy += 25) {
      for (let wx = s.x + 10; wx < s.x + s.w - 10; wx += 18) {
        rect(wx, wy, 8, 12);
      }
    }
  }
  
  fill(20, 60, 120, 180);
  rect(0, waterLevel, width, height - waterLevel);
  fill(100, 200, 255, 60);
  rect(0, waterLevel + 5, width, 30);
  
  for (let t of taxis) {
    t.x += t.speed;
    if (t.x > width + 30) t.x = -30;
    
    fill(t.color);
    ellipse(t.x, t.y, 35, 18);
    fill(255, 255, 200);
    ellipse(t.x - 12, t.y, 8, 8);
    fill(255, 50, 50);
    ellipse(t.x + 12, t.y, 6, 6);
  }
  
  if (gameState === "start") {
    drawStartScreen();
  } else if (gameState === "fight") {
    drawFight();
  } else if (gameState === "win" || gameState === "lose") {
    drawEndScreen();
  }
  
  updateParticles();
}

function drawStartScreen() {
  fill(255);
  textSize(48);
  textAlign(CENTER);
  text("MJ • THE VILLAIN", width/2, 130);
  
  textSize(20);
  fill(255, 100, 200);
  text("Nick — Super Speed — All Black", width/2, 185);
  fill(200, 220, 255);
  text("Kesha Cole — Flight — All White", width/2, 215);
  
  textSize(18);
  fill(255);
  text("Press SPACE to START", width/2, 290);
  
  textSize(15);
  fill(180);
  text("2070 Flooded New York • Defeat Kesha", width/2, 340);
}

function drawFight() {
  drawNick();
  drawKesha();
  drawHealthBars();
  
  fill(200);
  textSize(14);
  textAlign(LEFT);
  text("Arrow Keys: Move   |   SPACE: Super Dash Attack", 30, height - 25);
  
  handleInput();
  updateKesha();
  
  if (keshaHealth <= 0) gameState = "win";
  if (nickHealth <= 0) gameState = "lose";
}

function drawNick() {
  nick.trail.push({x: nick.x, y: nick.y});
  if (nick.trail.length > 6) nick.trail.shift();
  
  for (let i = 0; i < nick.trail.length; i++) {
    let alpha = map(i, 0, nick.trail.length, 30, 150);
    fill(50, 50, 200, alpha);
    ellipse(nick.trail[i].x, nick.trail[i].y + 25, nick.size * 0.7);
  }
  
  fill(nick.color);
  ellipse(nick.x, nick.y, nick.size, nick.size * 1.1);
  
  fill(0);
  ellipse(nick.x, nick.y - 8, nick.size * 0.7, nick.size * 0.6);
  
  fill(139, 69, 19);
  ellipse(nick.x - 8, nick.y - 5, 8, 6);
  ellipse(nick.x + 8, nick.y - 5, 8, 6);
  
  if (abs(nick.vx || 0) > 4) {
    stroke(100, 150, 255, 150);
    strokeWeight(2);
    line(nick.x - 40 * nick.facing, nick.y, nick.x - 20 * nick.facing, nick.y);
    line(nick.x - 45 * nick.facing, nick.y + 10, nick.x - 25 * nick.facing, nick.y + 10);
    noStroke();
  }
}

function drawKesha() {
  kesha.y = 180 + sin(frameCount * 0.08) * 25;
  
  fill(255, 255, 255, 40);
  ellipse(kesha.x, kesha.y, kesha.size * 1.6, kesha.size * 1.6);
  
  fill(kesha.color);
  ellipse(kesha.x, kesha.y, kesha.size, kesha.size * 1.1);
  
  fill(240);
  ellipse(kesha.x, kesha.y - 8, kesha.size * 0.65, kesha.size * 0.55);
  
  fill(101, 67, 33);
  ellipse(kesha.x - 7, kesha.y - 4, 7, 5);
  ellipse(kesha.x + 7, kesha.y - 4, 7, 5);
  
  stroke(255, 255, 255, 180);
  strokeWeight(3);
  line(kesha.x - 25, kesha.y + 10, kesha.x - 45, kesha.y - 5);
  line(kesha.x + 25, kesha.y + 10, kesha.x + 45, kesha.y - 5);
  noStroke();
}

function drawHealthBars() {
  fill(40);
  rect(30, 30, 200, 22);
  fill(50, 200, 255);
  rect(30, 30, map(nickHealth, 0, 100, 0, 200), 22);
  fill(255);
  textSize(14);
  text("NICK", 35, 46);
  
  fill(40);
  rect(width - 230, 30, 200, 22);
  fill(255, 100, 200);
  rect(width - 230, 30, map(keshaHealth, 0, 100, 0, 200), 22);
  fill(255);
  text("KESHA", width - 225, 46);
}

function handleInput() {
  let speed = 4.5;
  
  if (keyIsDown(LEFT_ARROW)) { nick.x -= speed; nick.facing = -1; }
  if (keyIsDown(RIGHT_ARROW)) { nick.x += speed; nick.facing = 1; }
  if (keyIsDown(UP_ARROW)) { nick.y -= speed * 0.7; }
  if (keyIsDown(DOWN_ARROW)) { nick.y += speed * 0.7; }
  
  if (keyIsDown(32) && nick.dashCooldown <= 0) {
    nick.x += 55 * nick.facing;
    nick.dashCooldown = 18;
    
    for (let i = 0; i < 8; i++) {
      particles.push({
        x: nick.x - 30 * nick.facing,
        y: nick.y + random(-15, 15),
        vx: -8 * nick.facing,
        vy: random(-2, 2),
        life: 18,
        color: color(100, 150, 255)
      });
    }
    
    if (dist(nick.x, nick.y, kesha.x, kesha.y) < 90) {
      keshaHealth -= 12;
      createHitParticles(kesha.x, kesha.y);
    }
  }
  
  nick.dashCooldown = max(0, nick.dashCooldown - 1);
  nick.x = constrain(nick.x, 50, width - 50);
  nick.y = constrain(nick.y, 150, waterLevel - 30);
}

function updateKesha() {
  kesha.attackTimer++;
  
  let targetX = nick.x + (sin(frameCount * 0.03) * 80);
  kesha.x = lerp(kesha.x, targetX, 0.025);
  
  if (kesha.attackTimer % 45 === 0) {
    kesha.vy = 6;
  }
  
  kesha.y += kesha.vy;
  kesha.vy *= 0.92;
  
  if (dist(nick.x, nick.y, kesha.x, kesha.y) < 55 && kesha.attackTimer % 20 === 0) {
    nickHealth -= 8;
    createHitParticles(nick.x, nick.y);
  }
  
  kesha.x = constrain(kesha.x, 100, width - 100);
  kesha.y = constrain(kesha.y, 80, 280);
}

function createHitParticles(x, y) {
  for (let i = 0; i < 12; i++) {
    particles.push({
      x: x,
      y: y,
      vx: random(-4, 4),
      vy: random(-4, 4),
      life: random(15, 28),
      color: color(255, random(100, 200), 50)
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    p.vx *= 0.96;
    p.vy *= 0.96;
    
    fill(p.color);
    noStroke();
    ellipse(p.x, p.y, map(p.life, 0, 25, 2, 8));
    
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawEndScreen() {
  fill(0, 0, 0, 180);
  rect(0, 0, width, height);
  
  if (gameState === "win") {
    fill(100, 255, 150);
    textSize(48);
    textAlign(CENTER);
    text("KESHA DEFEATED", width/2, 180);
    textSize(22);
    fill(255);
    text("The Villain Wins... for now", width/2, 230);
    textSize(18);
    text("Press R to fight again", width/2, 300);
  } else {
    fill(255, 80, 80);
    textSize(48);
    textAlign(CENTER);
    text("NICK WAS DEFEATED", width/2, 180);
    textSize(22);
    fill(255);
    text("Kesha remains the strongest", width/2, 230);
    textSize(18);
    text("Press R to try again", width/2, 300);
  }
}

function keyPressed() {
  if (gameState === "start" && key === ' ') {
    gameState = "fight";
    nickHealth = 100;
    keshaHealth = 100;
  }
  
  if ((gameState === "win" || gameState === "lose") && (key === 'r' || key === 'R')) {
    gameState = "start";
    nick.x = 180;
    nick.y = 320;
    kesha.x = 680;
    kesha.y = 200;
    particles = [];
  }
}
</script>
</body>
</html>
