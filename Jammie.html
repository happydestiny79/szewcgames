<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jammie • Minecraft Railroad Obby</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #0a2f0a; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
p5.disableFriendlyErrors = true;

let player, enemies, platforms, particles, animals, foods, score, hearts, level;
let gameState = 'explore';
let railroadOffset = 0;
let worldWidth = 1800;

function setup() {
  createCanvas(1800, 720);
  colorMode(HSB, 360, 100, 100, 100);
  pixelDensity(1);
  
  // Jammie
  player = {
    x: 150, y: 480, w: 32, h: 48,
    vx: 0, vy: 0,
    onGround: true,
    facing: 1,
    powerCooldown: 0,
  };
  
  // MULTIPLE VILLAINS (faster)
  enemies = [];
  for (let i = 0; i < 4; i++) {
    enemies.push({
      x: 600 + i * 280,
      y: 480,
      w: 34, h: 50,
      vx: 0, vy: 0,
      health: 80,
      attackCooldown: 0,
      patrolDir: (i % 2 === 0) ? 1 : -1,
      patrolTarget: 600 + i * 280 + random(-80, 80),
      speed: 2.4 + i * 0.35   // faster with each villain
    });
  }
  
  // Obby-style platforms (gaps, heights, parkour feel)
  platforms = [
    {x: 0, y: 560, w: 1800, h: 160},       // ground
    {x: 80, y: 440, w: 90, h: 16},
    {x: 240, y: 380, w: 70, h: 16},
    {x: 370, y: 320, w: 80, h: 16},
    {x: 520, y: 410, w: 95, h: 16},
    {x: 680, y: 290, w: 65, h: 16},
    {x: 820, y: 370, w: 110, h: 16},
    {x: 1000, y: 250, w: 75, h: 16},
    {x: 1150, y: 340, w: 90, h: 16},
    {x: 1320, y: 280, w: 70, h: 16},
    {x: 1480, y: 400, w: 100, h: 16},
    {x: 1650, y: 320, w: 80, h: 16},
  ];
  
  particles = [];
  animals = [];
  foods = [];
  score = 10;
  hearts = 10;
  level = 1;
  
  // More animals & food across big map
  for (let i = 0; i < 10; i++) {
    animals.push({
      x: random(60, worldWidth - 100), 
      y: random(430, 530), 
      type: random(['pig', 'cow', 'chicken', 'sheep'])
    });
  }
  for (let i = 0; i < 9; i++) {
    foods.push({
      x: random(80, worldWidth - 100), 
      y: random(400, 540), 
      eaten: false
    });
  }
  
  house = {x: 1650, y: 300, w: 130, h: 260};
}

function draw() {
  background(195, 55, 90);
  
  // Sky layers
  for (let i = 0; i < 7; i++) {
    fill(195, 45, 82 - i * 5, 35);
    rect(0, i * 60, width, 60);
  }
  
  drawEnvironment();
  drawRailroad();
  drawHouse();
  
  // Platforms
  for (let p of platforms) {
    fill(82, 42, 35);
    rect(p.x, p.y, p.w, p.h);
    fill(95, 52, 42);
    rect(p.x, p.y, p.w, 8);
  }
  
  // Animals & Food
  for (let a of animals) drawAnimal(a);
  for (let f of foods) if (!f.eaten) drawFood(f);
  
  // Player
  updatePlayer();
  drawJammie(player);
  
  // All villains (faster movement)
  for (let e of enemies) {
    updateEnemy(e);
    drawSnake(e);
  }
  
  updateParticles();
  drawHUD();
  
  // Win / Lose
  if (score >= 100) {
    gameState = 'win';
    fill(0, 0, 0, 75);
    rect(0, 0, width, height);
    fill(140, 85, 92);
    textSize(56);
    textAlign(CENTER);
    text("🌊 YOU WIN! 🌊", width/2, height/2 - 50);
    textSize(26);
    text("Jammie stopped all the villains!", width/2, height/2 + 10);
    text("Final Score: " + score, width/2, height/2 + 55);
    noLoop();
  }
  
  if (hearts <= 0) {
    gameState = 'lose';
    fill(0, 0, 0, 75);
    rect(0, 0, width, height);
    fill(0, 80, 75);
    textSize(56);
    textAlign(CENTER);
    text("GAME OVER", width/2, height/2 - 30);
    textSize(24);
    text("The villains took over...", width/2, height/2 + 25);
    text("Press R to restart", width/2, height/2 + 70);
    noLoop();
  }
}

function drawEnvironment() {
  fill(102, 62, 40);
  rect(0, 540, width, 180);
  
  // Lots of flowers
  for (let i = 0; i < 45; i++) {
    let fx = (i * 39 + sin(i * 1.4) * 22) % worldWidth;
    let fy = 525 + cos(i) * 15;
    fill((i % 4 === 0) ? color(340, 78, 93) : (i % 3 === 0) ? color(52, 82, 96) : color(290, 72, 90));
    ellipse(fx, fy, 10, 10);
    fill(112, 52, 36);
    rect(fx - 1.5, fy + 5, 3, 13);
  }
  
  // Many Minecraft trees
  let treeX = [70, 210, 380, 530, 720, 890, 1070, 1240, 1410, 1590];
  for (let tx of treeX) {
    fill(28, 52, 30);
    rect(tx - 17, 310, 34, 230);
    fill(82, 68, 36);
    ellipse(tx, 285, 92, 92);
    ellipse(tx - 28, 308, 72, 72);
    ellipse(tx + 26, 302, 76, 76);
  }
  
  // Distant hills for depth
  fill(95, 38, 52);
  beginShape();
  vertex(0, 540);
  vertex(180, 390);
  vertex(390, 530);
  vertex(610, 350);
  vertex(870, 510);
  vertex(1120, 370);
  vertex(1380, 520);
  vertex(1620, 360);
  vertex(1800, 540);
  endShape(CLOSE);
}

function drawRailroad() {
  stroke(30);
  strokeWeight(9);
  line(0, 590, width, 590);
  line(0, 620, width, 620);
  strokeWeight(4);
  for (let i = -70; i < width + 70; i += 75) {
    let rx = (i + railroadOffset) % worldWidth;
    line(rx, 582, rx, 628);
  }
  noStroke();
  
  // Minecart
  let cartX = 380 + sin(frameCount * 0.018) * 220;
  fill(65);
  rect(cartX, 570, 82, 34, 6);
  fill(205, 52, 32);
  textSize(14);
  text("🚂 OBSTACLE COURSE", cartX + 5, 592);
}

function drawHouse() {
  fill(120, 45, 20);
  rect(house.x, house.y, house.w, house.h);
  fill(70, 35, 15);
  triangle(house.x - 12, house.y, house.x + house.w/2, house.y - 65, house.x + house.w + 12, house.y);
  fill(50, 25, 10);
  rect(house.x + 42, house.y + 105, 46, 155);
  fill(215, 88, 95);
  rect(house.x + 15, house.y + 38, 26, 26);
  rect(house.x + 88, house.y + 38, 26, 26);
}

function drawJammie(p) {
  push();
  translate(p.x, p.y);
  if (p.facing === -1) scale(-1, 1);
  
  fill(200, 72, 80);
  beginShape();
  vertex(-9, 6); vertex(9, 6); vertex(19, 36); vertex(-19, 36);
  endShape(CLOSE);
  
  fill(190, 82, 70);
  rect(-12, 2, 24, 32, 4);
  
  fill(36, 40, 80);
  ellipse(0, -17, 22, 22);
  
  fill(0);
  arc(0, -20, 26, 22, PI, TWO_PI);
  fill(130, 82, 65);
  rect(-10, -26, 20, 6, 2);
  
  fill(26, 60, 32);
  ellipse(-5, -17, 5, 5);
  ellipse(5, -17, 5, 5);
  
  if (p.powerCooldown > 0) {
    noFill();
    stroke(180, 72, 90, 50);
    strokeWeight(3.5);
    ellipse(0, 6, 55, 55);
    noStroke();
  }
  pop();
}

function drawSnake(e) {
  push();
  translate(e.x, e.y);
  if (e.vx < 0) scale(-1, 1);
  
  fill(275, 62, 30);
  rect(-13, 3, 26, 34, 5);
  
  fill(12);
  ellipse(0, -17, 24, 24);
  
  fill(0);
  rect(-11, -28, 22, 12, 2);
  
  fill(0, 90, 95);
  ellipse(-6, -17, 6, 6);
  ellipse(6, -17, 6, 6);
  
  if (e.attackCooldown > 0) {
    for (let i = 0; i < 5; i++) {
      fill(15, 90, 95, 60);
      ellipse(random(-20, 20), random(-6, 30), 8, 10);
    }
  }
  pop();
}

function drawAnimal(a) {
  push();
  translate(a.x, a.y);
  if (a.type === 'pig') {
    fill(248, 175, 185); ellipse(0, 0, 23, 16);
    fill(255, 135, 145); ellipse(10, -2, 6, 4);
  } else if (a.type === 'cow') {
    fill(52, 26, 16); ellipse(0, 0, 27, 18);
    fill(255); rect(-8, -6, 16, 8);
  } else if (a.type === 'sheep') {
    fill(232); ellipse(0, 0, 25, 19);
  } else {
    fill(248, 208, 55); ellipse(0, 0, 16, 14);
    fill(255, 75, 35); triangle(8, -1, 13, 2, 8, 3);
  }
  pop();
}

function drawFood(f) {
  fill(22, 82, 55);
  ellipse(f.x, f.y, 14, 14);
  fill(52, 90, 45);
  ellipse(f.x - 2, f.y - 2, 6, 6);
}

function updatePlayer() {
  player.vy += 0.82;
  player.y += player.vy;
  player.x += player.vx;
  player.vx *= 0.8;
  
  player.onGround = false;
  for (let p of platforms) {
    if (player.x + 11 > p.x && player.x - 11 < p.x + p.w &&
        player.y + 24 > p.y && player.y + 24 < p.y + 22) {
      player.y = p.y - 24;
      player.vy = 0;
      player.onGround = true;
    }
  }
  
  player.x = constrain(player.x, 30, worldWidth - 40);
  
  if (player.powerCooldown > 0) player.powerCooldown--;
  
  // Water Blast
  if (keyIsDown(32) && player.powerCooldown === 0) {
    player.powerCooldown = 15;
    for (let i = 0; i < 6; i++) {
      particles.push({
        x: player.x + player.facing * 26,
        y: player.y - 6,
        vx: player.facing * random(6.5, 10.5),
        vy: random(-2, 2),
        life: 24,
        type: 'water'
      });
    }
    
    // Hit any nearby villain
    for (let e of enemies) {
      if (dist(player.x, player.y, e.x, e.y) < 185) {
        e.health -= 10;
        score += 3;
        createHitParticles(e.x, e.y, 'water');
      }
    }
  }
  
  if (keyIsDown(16) && player.onGround) {
    player.vy = -13.5;
    player.onGround = false;
  }
  
  if (keyIsDown(LEFT_ARROW) || keyIsDown(65)) {
    player.vx = -5.2; player.facing = -1;
  }
  if (keyIsDown(RIGHT_ARROW) || keyIsDown(68)) {
    player.vx = 5.2; player.facing = 1;
  }
}

function updateEnemy(e) {
  e.attackCooldown = max(0, e.attackCooldown - 1);
  
  let dx = player.x - e.x;
  let distToPlayer = abs(dx);
  
  if (gameState === 'fight') {
    // Chase faster
    if (distToPlayer > 50) {
      e.vx = dx > 0 ? e.speed : -e.speed;
    } else {
      e.vx *= 0.5;
    }
    
    if (e.attackCooldown === 0 && distToPlayer < 230) {
      e.attackCooldown = 32;
      for (let i = 0; i < 4; i++) {
        particles.push({
          x: e.x, y: e.y - 10,
          vx: (dx > 0 ? 1 : -1) * random(4.5, 8.5),
          vy: random(-1.8, 1.8),
          life: 28,
          type: 'fire'
        });
      }
      if (distToPlayer < 90) {
        hearts = max(0, hearts - 1);
        createHitParticles(player.x, player.y, 'fire');
      }
    }
  } else {
    // Patrol faster
    if (abs(e.x - e.patrolTarget) > 50) {
      e.vx = e.patrolDir * e.speed * 0.85;
    } else {
      e.patrolDir *= -1;
      e.patrolTarget = random(500, worldWidth - 150);
    }
  }
  
  e.x += e.vx;
  e.y += e.vy;
  e.vy += 0.6;
  
  for (let p of platforms) {
    if (e.x > p.x && e.x < p.x + p.w && e.y > p.y - 32 && e.y < p.y) {
      e.y = p.y - 25;
      e.vy = 0;
    }
  }
  
  e.x = constrain(e.x, 180, worldWidth - 50);
  e.y = min(e.y, 515);
  
  // Defeated villain
  if (e.health <= 0) {
    score += 22;
    e.health = 80;
    e.x = random(650, worldWidth - 120);
    e.patrolTarget = e.x + random(-60, 60);
    if (level < 2) level = 2;
  }
}

function createHitParticles(x, y, type) {
  for (let i = 0; i < 12; i++) {
    particles.push({
      x: x + random(-16, 16),
      y: y + random(-20, 20),
      vx: random(-3.2, 3.2),
      vy: random(-4.5, 0),
      life: random(16, 27),
      type: type
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    p.vy += 0.11;
    
    if (p.type === 'water') {
      fill(185, 80, 92, p.life * 3.3);
      ellipse(p.x, p.y, 7, 7);
    } else {
      fill(14, 90, 95, p.life * 3.3);
      ellipse(p.x, p.y, 8, 8);
    }
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawHUD() {
  textAlign(LEFT);
  fill(0, 0, 95);
  textSize(24);
  text("SCORE: " + score, 30, 45);
  
  fill(0, 85, 88);
  text("HEARTS: " + hearts, 30, 78);
  for (let i = 0; i < hearts; i++) {
    text("♥", 155 + i * 22, 78);
  }
  
  textSize(18);
  fill(195, 72, 85);
  text("LEVEL " + level + "  •  " + (gameState === 'fight' ? "FIGHT MODE" : "OBBY MODE"), 30, 110);
  
  textSize(13);
  fill(0, 0, 90);
  text("SPACE = Water Blast   SHIFT = Jump   F = Toggle Fight   Click animals/food", 30, 660);
}

function mousePressed() {
  for (let i = animals.length - 1; i >= 0; i--) {
    let a = animals[i];
    if (dist(mouseX, mouseY, a.x, a.y) < 26) {
      score += 8;
      animals.splice(i, 1);
      createHitParticles(a.x, a.y, 'water');
      if (random() < 0.6) {
        animals.push({x: random(60, worldWidth - 100), y: random(440, 530), type: random(['pig', 'cow', 'chicken', 'sheep'])});
      }
      return;
    }
  }
  
  for (let i = foods.length - 1; i >= 0; i--) {
    let f = foods[i];
    if (!f.eaten && dist(mouseX, mouseY, f.x, f.y) < 18) {
      score += 5;
      f.eaten = true;
      foods.splice(i, 1);
      foods.push({x: random(80, worldWidth - 100), y: random(410, 535), eaten: false});
      return;
    }
  }
  
  // Click near any villain to toggle fight
  for (let e of enemies) {
    if (dist(mouseX, mouseY, e.x, e.y) < 85) {
      gameState = (gameState === 'fight') ? 'explore' : 'fight';
      return;
    }
  }
}

function keyPressed() {
  if (key === 'f' || key === 'F') {
    gameState = (gameState === 'fight') ? 'explore' : 'fight';
  }
  if (key === 'r' || key === 'R') {
    score = 10;
    hearts = 10;
    level = 1;
    player.x = 150;
    player.y = 480;
    for (let i = 0; i < enemies.length; i++) {
      enemies[i].x = 600 + i * 280;
      enemies[i].health = 80;
      enemies[i].patrolTarget = enemies[i].x;
    }
    gameState = 'explore';
    loop();
  }
}

function touchStarted() {
  mousePressed();
}
</script>
</body>
</html>
