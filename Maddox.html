<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maddox Wade: Gorilla Gadget</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
        
        body {
            margin: 0;
            background: #0a0a0a;
            color: #00ff00;
            font-family: 'Press Start 2P', system-ui;
            overflow-x: hidden;
        }
        
        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
        }
        
        #header {
            text-align: center;
            margin-bottom: 8px;
        }
        
        #title {
            font-size: 26px;
            text-shadow: 0 0 12px #00ff00;
            margin: 0;
        }
        
        #subtitle {
            font-size: 13px;
            color: #ffaa00;
        }
        
        #main-area {
            display: flex;
            gap: 18px;
            max-width: 1280px;
            width: 100%;
            flex-wrap: wrap;
        }
        
        #canvas-container {
            border: 4px solid #00ff00;
            box-shadow: 0 0 25px #00ff00;
        }
        
        #ui-panel {
            width: 310px;
            background: #111;
            border: 4px solid #00ff00;
            padding: 14px;
            box-shadow: 0 0 20px #00ff00;
            flex-shrink: 0;
        }
        
        #inventory-panel {
            width: 310px;
            background: #111;
            border: 4px solid #ffaa00;
            padding: 14px;
            box-shadow: 0 0 20px #ffaa00;
            flex-shrink: 0;
        }
        
        .stat {
            margin: 6px 0;
            font-size: 13px;
        }
        
        button {
            background: #003300;
            color: #00ff00;
            border: 3px solid #00ff00;
            padding: 9px 12px;
            font-family: 'Press Start 2P', system-ui;
            font-size: 11px;
            margin: 4px 2px;
            cursor: pointer;
            transition: all 0.1s;
        }
        
        button:hover {
            background: #00ff00;
            color: #003300;
            box-shadow: 0 0 10px #00ff00;
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        .weapon-btn {
            background: #002200;
            border-color: #ffaa00;
            color: #ffaa00;
            font-size: 10px;
            padding: 6px 8px;
        }
        
        .weapon-btn:hover {
            background: #ffaa00;
            color: #002200;
        }
        
        #log {
            height: 165px;
            overflow-y: auto;
            background: #000;
            border: 3px solid #00ff00;
            padding: 8px;
            font-size: 10px;
            margin-top: 12px;
            line-height: 1.35;
        }
        
        .log-entry {
            margin: 3px 0;
        }
        
        .boss {
            color: #ff4444;
            font-weight: bold;
        }
        
        .equip {
            background: #330000;
            border-color: #ffaa00;
            color: #ffaa00;
        }
        
        #name-input {
            background: #000;
            border: 3px solid #00ff00;
            color: #00ff00;
            padding: 7px;
            width: 100%;
            font-family: 'Press Start 2P', system-ui;
            font-size: 13px;
        }
        
        .biome {
            font-size: 11px;
            color: #ffaa00;
            margin: 8px 0;
        }
        
        .inventory-item {
            background: #1a1a1a;
            border: 2px solid #ffaa00;
            padding: 6px 8px;
            margin: 5px 0;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .equipped {
            border-color: #00ff00;
            background: #002200;
        }
        
        .gorilla-info {
            font-size: 11px;
            margin: 8px 0;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="header">
            <h1 id="title">MADDOX WADE</h1>
            <p id="subtitle">GORILLA GADGET • ANIMAL COMPANY</p>
        </div>
        
        <div id="main-area">
            <!-- Game Canvas -->
            <div id="canvas-container"></div>
            
            <!-- Main UI -->
            <div id="ui-panel">
                <div style="margin-bottom: 10px;">
                    <input id="name-input" type="text" placeholder="Gorilla Name" value="Maddox Wade">
                    <button onclick="changeName()" style="width: 100%; margin-top: 6px;">CHANGE NAME</button>
                </div>
                
                <div class="gorilla-info">
                    <strong>Body Color:</strong> 
                    <input type="color" id="body-color" value="#4a2c0a" onchange="updateGorilla()">
                    <br>
                    <span style="color:#00ff00">Green Eyes • No Legs</span>
                </div>
                
                <div class="stat">
                    <strong>COINS:</strong> <span id="coins">500</span>
                </div>
                <div class="stat">
                    <strong>EQUIPPED:</strong> <span id="equipped">Fists</span>
                </div>
                <div class="stat">
                    <strong>KILLS:</strong> <span id="kills">0</span>
                </div>
                
                <div style="margin-top: 12px;">
                    <button onclick="startTutorial()">TUTORIAL</button>
                    <button onclick="goAdventuring()">GO ADVENTURING</button>
                    <button onclick="fightBoss()">FIGHT GREAT ORG</button>
                </div>
                
                <div class="biome" id="biome-display">Current Biome: Forest</div>
                
                <div id="log"></div>
            </div>
            
            <!-- Inventory Panel -->
            <div id="inventory-panel">
                <h4 style="margin: 0 0 10px 0; color: #ffaa00; text-align: center;">INVENTORY</h4>
                <div id="inventory-list">
                    <!-- Populated by JS -->
                </div>
                
                <div style="margin-top: 15px; border-top: 2px solid #ffaa00; padding-top: 10px;">
                    <button onclick="buyWeapon('stick')" class="weapon-btn" style="width: 100%;">BUY STICK (100)</button>
                    <button onclick="buyWeapon('bat')" class="weapon-btn" style="width: 100%;">BUY BAT (180)</button>
                    <button onclick="buyWeapon('pipe')" class="weapon-btn" style="width: 100%;">BUY PIPE (280)</button>
                    <button onclick="buyWeapon('boxing_glove')" class="weapon-btn" style="width: 100%;">BUY BOXING GLOVE (420)</button>
                    <button onclick="buyHookshot()" class="weapon-btn" style="width: 100%; margin-top: 8px;">BUY HOOKSHOT (250)</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== GAME STATE ====================
        let coins = 500;
        let kills = 0;
        let hasHookshot = false;
        let currentBiome = "Forest";
        let playerName = "Maddox Wade";
        let bodyColor = "#4a2c0a";
        let gameState = "idle";
        let monstersInBiome = 0;
        let biomeIndex = 0;
        
        let biomes = ["Forest", "Swamp", "Volcano", "Ice Peaks", "Acid Wastes"];
        
        // Weapons
        let weapons = {
            stick: { name: "Stick", damage: 14, price: 100, owned: false },
            bat: { name: "Bat", damage: 22, price: 180, owned: false },
            pipe: { name: "Pipe", damage: 31, price: 280, owned: false },
            boxing_glove: { name: "Boxing Glove", damage: 27, price: 420, owned: false }
        };
        
        let inventory = [];
        let equippedWeapon = null; // {id, name, damage}
        
        let currentMonster = null;
        let bossHP = 420;
        
        // ==================== LOGGING ====================
        function log(message, type = "normal") {
            const logDiv = document.getElementById("log");
            const entry = document.createElement("div");
            entry.className = "log-entry";
            
            if (type === "boss") {
                entry.classList.add("boss");
                entry.innerHTML = "🐾 " + message;
            } else if (type === "death") {
                entry.style.color = "#ff4444";
                entry.innerHTML = "💀 " + message;
            } else if (type === "loot") {
                entry.style.color = "#ffaa00";
                entry.innerHTML = "✦ " + message;
            } else {
                entry.innerHTML = "• " + message;
            }
            
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            
            // Random player chat
            if (Math.random() < 0.25) {
                setTimeout(() => {
                    const otherPlayers = ["ZaireTheFire", "LiamAir", "ElstonGunn", "GadgetGorilla42", "AcidKing"];
                    const randomPlayer = otherPlayers[Math.floor(Math.random() * otherPlayers.length)];
                    const chats = [
                        "This biome is brutal...",
                        "Just got wrecked by a spider",
                        "Hookshot saved me",
                        "Boxing glove is meta",
                        "The Org hits like a truck"
                    ];
                    const chatMsg = chats[Math.floor(Math.random() * chats.length)];
                    const chatEntry = document.createElement("div");
                    chatEntry.className = "log-entry";
                    chatEntry.style.color = "#ffaa00";
                    chatEntry.innerHTML = `[${randomPlayer}]: ${chatMsg}`;
                    logDiv.appendChild(chatEntry);
                    logDiv.scrollTop = logDiv.scrollHeight;
                }, 700);
            }
        }
        
        function updateUI() {
            document.getElementById("coins").textContent = coins;
            document.getElementById("kills").textContent = kills;
            document.getElementById("biome-display").textContent = `Current Biome: ${currentBiome}`;
            document.getElementById("equipped").textContent = equippedWeapon ? equippedWeapon.name : "Fists";
            document.getElementById("name-input").value = playerName;
            
            renderInventory();
        }
        
        function changeName() {
            const input = document.getElementById("name-input");
            if (input.value.trim()) {
                playerName = input.value.trim();
                log(`Name changed to ${playerName}!`);
                updateUI();
            }
        }
        
        function updateGorilla() {
            bodyColor = document.getElementById("body-color").value;
        }
        
        // ==================== INVENTORY ====================
        function renderInventory() {
            const container = document.getElementById("inventory-list");
            container.innerHTML = "";
            
            // Show equipped weapon
            if (equippedWeapon) {
                const equippedDiv = document.createElement("div");
                equippedDiv.className = "inventory-item equipped";
                equippedDiv.innerHTML = `
                    <span>⚔️ ${equippedWeapon.name} (${equippedWeapon.damage} DMG)</span>
                    <button onclick="unequipWeapon()" style="font-size:9px; padding:2px 6px;">UNEQUIP</button>
                `;
                container.appendChild(equippedDiv);
            } else {
                const fistsDiv = document.createElement("div");
                fistsDiv.className = "inventory-item";
                fistsDiv.innerHTML = `<span>👊 Fists (8 DMG)</span>`;
                container.appendChild(fistsDiv);
            }
            
            // Show owned weapons
            inventory.forEach(weaponId => {
                if (equippedWeapon && equippedWeapon.id === weaponId) return; // already shown above
                
                const w = weapons[weaponId];
                if (!w) return;
                
                const div = document.createElement("div");
                div.className = "inventory-item";
                div.innerHTML = `
                    <span>${w.name} (${w.damage} DMG)</span>
                    <button onclick="equipWeapon('${weaponId}')" class="equip" style="font-size:9px; padding:2px 6px;">EQUIP</button>
                `;
                container.appendChild(div);
            });
            
            if (inventory.length === 0 && !equippedWeapon) {
                const empty = document.createElement("div");
                empty.style.fontSize = "10px";
                empty.style.color = "#666";
                empty.innerHTML = "No weapons yet. Buy some!";
                container.appendChild(empty);
            }
        }
        
        function equipWeapon(weaponId) {
            const w = weapons[weaponId];
            if (!w || !w.owned) return;
            
            equippedWeapon = {
                id: weaponId,
                name: w.name,
                damage: w.damage
            };
            
            log(`Equipped ${w.name}!`);
            updateUI();
        }
        
        function unequipWeapon() {
            if (equippedWeapon) {
                log(`Unequipped ${equippedWeapon.name}`);
                equippedWeapon = null;
                updateUI();
            }
        }
        
        // ==================== WEAPONS & SHOP ====================
        function buyWeapon(type) {
            const w = weapons[type];
            if (!w) return;
            
            if (w.owned) {
                log(`You already own the ${w.name}!`);
                return;
            }
            
            if (coins < w.price) {
                log("Not enough coins!");
                return;
            }
            
            coins -= w.price;
            w.owned = true;
            inventory.push(type);
            
            log(`Purchased ${w.name}!`, "loot");
            
            // Auto-equip if nothing equipped
            if (!equippedWeapon) {
                equipWeapon(type);
            }
            
            updateUI();
        }
        
        function buyHookshot() {
            if (hasHookshot) {
                log("You already have the Hookshot!");
                return;
            }
            if (coins < 250) {
                log("Not enough coins!");
                return;
            }
            coins -= 250;
            hasHookshot = true;
            log("Hookshot acquired! You can now reach new biomes.", "loot");
            updateUI();
        }
        
        // ==================== TUTORIAL ====================
        function startTutorial() {
            if (gameState !== "idle") return;
            
            log("=== TUTORIAL ===");
            log("You are a legless gorilla with green eyes.");
            log("Buy weapons from the INVENTORY panel.");
            log("Equip weapons before fighting.");
            log("Click GO ADVENTURING to explore and find monsters.");
            log("Deeper biomes = harder monsters + better loot.");
            log("Kill 12+ monsters then fight the GREAT ORG.");
            log("=== GOOD LUCK ===");
            
            gameState = "tutorial_done";
        }
        
        // ==================== EXPLORATION & COMBAT ====================
        function goAdventuring() {
            if (gameState === "fighting" || gameState === "boss_fight") {
                log("You're already in combat!");
                return;
            }
            
            gameState = "adventuring";
            monstersInBiome++;
            
            // Chance to find monster increases with exploration
            const encounterChance = Math.min(0.35 + (monstersInBiome * 0.12), 0.85);
            
            if (Math.random() < encounterChance || monstersInBiome >= 3) {
                // Found a monster!
                startMonsterEncounter();
            } else {
                log(`You explore deeper into the ${currentBiome}...`);
                setTimeout(() => {
                    if (gameState === "adventuring") {
                        log("Nothing yet. Keep exploring or adventure again.");
                        gameState = "idle";
                    }
                }, 900);
            }
            
            updateUI();
        }
        
        function startMonsterEncounter() {
            gameState = "fighting";
            
            let monsterPool = getMonstersForBiome();
            currentMonster = {...monsterPool[Math.floor(Math.random() * monsterPool.length)]};
            currentMonster.maxHP = currentMonster.hp;
            
            log(`A wild ${currentMonster.name} appears!`);
            
            if (!equippedWeapon) {
                log("You're fighting with your fists!");
            } else {
                log(`Using your ${equippedWeapon.name}.`);
            }
            
            setTimeout(() => {
                if (gameState === "fighting") {
                    log(`[${currentMonster.name} HP: ${currentMonster.hp}]`);
                }
            }, 400);
        }
        
        function getMonstersForBiome() {
            if (currentBiome === "Forest") {
                return [
                    { name: "Slime Rat", hp: 38, damage: 6 },
                    { name: "Thorn Boar", hp: 52, damage: 9 }
                ];
            } else if (currentBiome === "Swamp") {
                return [
                    { name: "Acid Spider", hp: 45, damage: 11 },
                    { name: "Mud Gator", hp: 68, damage: 13 }
                ];
            } else if (currentBiome === "Volcano") {
                return [
                    { name: "Lava Boar", hp: 75, damage: 15 },
                    { name: "Ember Wolf", hp: 60, damage: 17 }
                ];
            } else if (currentBiome === "Ice Peaks") {
                return [
                    { name: "Frost Boar", hp: 82, damage: 14 },
                    { name: "Ice Serpent", hp: 55, damage: 19 }
                ];
            } else if (currentBiome === "Acid Wastes") {
                return [
                    { name: "Toxic Crawler", hp: 70, damage: 18 },
                    { name: "Corrosive Slime", hp: 95, damage: 12 }
                ];
            }
            return [{ name: "Wild Rat", hp: 35, damage: 6 }];
        }
        
        function performAttack() {
            if (!currentMonster || gameState !== "fighting") return;
            
            let damage = 8; // fists
            
            if (equippedWeapon) {
                damage = equippedWeapon.damage;
                
                // Weapon-specific bonuses
                if (equippedWeapon.id === "boxing_glove" && currentBiome === "Swamp") damage += 6;
                if (equippedWeapon.id === "pipe" && currentBiome === "Volcano") damage += 7;
                if (equippedWeapon.id === "bat" && currentBiome === "Ice Peaks") damage += 8;
            }
            
            // Biome difficulty scaling
            if (currentBiome === "Acid Wastes") damage = Math.floor(damage * 0.85);
            
            currentMonster.hp -= damage;
            log(`You hit the ${currentMonster.name} for ${damage} damage!`);
            
            if (currentMonster.hp <= 0) {
                // Victory!
                kills++;
                let reward = Math.floor(Math.random() * 55) + 48;
                if (currentBiome === "Acid Wastes") reward += 30;
                
                coins += reward;
                log(`Defeated ${currentMonster.name}! +${reward} coins`, "loot");
                
                gameState = "idle";
                currentMonster = null;
                
                // Unlock new biome occasionally
                if (hasHookshot && Math.random() < 0.45 && biomeIndex < biomes.length - 1) {
                    biomeIndex++;
                    currentBiome = biomes[biomeIndex];
                    monstersInBiome = 0;
                    log(`New biome unlocked: ${currentBiome}!`, "loot");
                }
                
                if (kills >= 12) {
                    log("You're ready to challenge the GREAT ORG!", "boss");
                }
                
                updateUI();
            } else {
                // Monster counterattack
                let monsterDamage = currentMonster.damage;
                if (currentBiome === "Acid Wastes") monsterDamage += 5;
                
                log(`The ${currentMonster.name} hits you for ${monsterDamage} damage!`);
                
                // Death chance
                if (Math.random() < 0.18 && kills > 4) {
                    log("You died in battle...", "death");
                    coins = Math.max(0, Math.floor(coins * 0.55));
                    gameState = "idle";
                    currentMonster = null;
                    updateUI();
                    return;
                }
                
                setTimeout(() => {
                    if (gameState === "fighting" && currentMonster) {
                        log(`[${currentMonster.name} HP: ${currentMonster.hp}]`);
                    }
                }, 650);
            }
        }
        
        // ==================== BOSS FIGHT ====================
        function fightBoss() {
            if (kills < 10) {
                log("You need at least 10 monster kills to face the Great Org!");
                return;
            }
            
            if (gameState === "boss_fight") {
                // Attack boss
                let damage = equippedWeapon ? equippedWeapon.damage + 8 : 14;
                
                if (equippedWeapon) {
                    if (equippedWeapon.id === "pipe") damage += 12;
                    if (equippedWeapon.id === "boxing_glove") damage += 9;
                }
                
                bossHP -= damage;
                log(`You strike the Great Org for ${damage} damage!`, "boss");
                
                if (bossHP <= 0) {
                    log("🎉 YOU DEFEATED THE GREAT ORG! 🎉", "boss");
                    log("The wastelands are free. You are a legend of Animal Company!", "boss");
                    coins += 650;
                    kills += 8;
                    gameState = "idle";
                    bossHP = 420;
                    updateUI();
                    return;
                }
                
                // Boss counter
                const bossDamage = 24;
                log(`The Great Org spits ACID for ${bossDamage} damage!`, "boss");
                
                if (Math.random() < 0.28) {
                    log("You were melted by the Great Org's acid...", "death");
                    coins = Math.max(0, Math.floor(coins * 0.35));
                    gameState = "idle";
                    bossHP = 420;
                    updateUI();
                    return;
                }
                
                log(`Great Org HP: ${bossHP}`, "boss");
                
            } else {
                gameState = "boss_fight";
                bossHP = 420;
                log("=== FINAL BOSS: THE GREAT ORG ===", "boss");
                log("A massive, disgusting Shrek-like creature towers before you.");
                log("It spits acid and violently defends itself.");
                log("Make sure you have a strong weapon equipped!");
                log(`Great Org HP: ${bossHP}`, "boss");
            }
        }
        
        // ==================== p5.js DRAWING ====================
        let gorillaX, gorillaY;
        let armAngle = 0;
        
        function setup() {
            let canvas = createCanvas(480, 480);
            canvas.parent("canvas-container");
            
            gorillaX = width / 2;
            gorillaY = height / 2 + 45;
            
            setTimeout(() => {
                const logDiv = document.getElementById("log");
                logDiv.innerHTML = "";
                log("Welcome to Animal Company!");
                log("Buy weapons → Equip them → Go Adventuring!");
                log("Deeper biomes are much harder.");
                updateUI();
            }, 400);
        }
        
        function draw() {
            background(15, 25, 15);
            
            drawBiomeBackground();
            drawGorilla();
            
            if (currentMonster && gameState === "fighting") {
                drawMonster();
            }
            
            if (gameState === "boss_fight") {
                drawGreatOrg();
            }
            
            // Status text
            fill(0, 255, 0, 160);
            textSize(11);
            textAlign(CENTER);
            
            if (gameState === "idle") {
                text("Buy weapons • Equip • Go Adventuring", width/2, height - 28);
            } else if (gameState === "fighting") {
                text("Click canvas or press F to attack!", width/2, height - 28);
            } else if (gameState === "boss_fight") {
                text("Keep attacking the Great Org!", width/2, height - 28);
            }
        }
        
        function drawBiomeBackground() {
            if (currentBiome === "Forest") {
                fill(20, 80, 30);
                rect(0, height - 120, width, 120);
                for (let i = 0; i < 5; i++) {
                    fill(10, 50, 20);
                    rect(40 + i * 95, height - 180, 25, 80);
                    fill(30, 120, 40);
                    ellipse(52 + i * 95, height - 200, 60, 60);
                }
            } else if (currentBiome === "Swamp") {
                fill(40, 70, 50);
                rect(0, height - 100, width, 100);
                fill(60, 100, 40);
                for (let i = 0; i < 8; i++) {
                    ellipse(30 + i * 60, height - 70, 80, 40);
                }
            } else if (currentBiome === "Volcano") {
                fill(60, 30, 20);
                rect(0, height - 130, width, 130);
                fill(200, 80, 30);
                ellipse(width/2, height - 160, 120, 80);
            } else if (currentBiome === "Ice Peaks") {
                fill(180, 200, 220);
                rect(0, height - 110, width, 110);
                fill(220, 240, 255);
                triangle(80, height - 110, 140, height - 220, 200, height - 110);
                triangle(280, height - 110, 340, height - 200, 400, height - 110);
            } else if (currentBiome === "Acid Wastes") {
                fill(50, 80, 40);
                rect(0, height - 100, width, 100);
                fill(30, 120, 50);
                for (let i = 0; i < 12; i++) {
                    rect(random(width), height - 80, 8, 60);
                }
            }
        }
        
        function drawGorilla() {
            push();
            translate(gorillaX, gorillaY);
            
            // Body
            fill(bodyColor);
            stroke(30);
            strokeWeight(3);
            ellipse(0, 0, 140, 110);
            
            // Green eyes
            fill(0, 255, 80);
            ellipse(-35, -20, 28, 28);
            ellipse(35, -20, 28, 28);
            fill(255);
            ellipse(-32, -23, 10, 10);
            ellipse(38, -23, 10, 10);
            
            // Eyebrows
            stroke(0);
            strokeWeight(4);
            line(-48, -35, -22, -38);
            line(22, -38, 48, -35);
            
            // Arms
            stroke(bodyColor);
            strokeWeight(18);
            armAngle = sin(frameCount * 0.08) * 0.4;
            
            push();
            rotate(-0.8 + armAngle);
            line(-50, 10, -95, 55);
            pop();
            
            push();
            rotate(0.8 - armAngle);
            line(50, 10, 95, 55);
            pop();
            
            // Chest gadget
            fill(80);
            rect(-25, 15, 50, 25, 5);
            fill(0, 255, 0);
            rect(-15, 20, 30, 8);
            
            // Name
            fill(0, 255, 0);
            textSize(14);
            textAlign(CENTER);
            text(playerName.split(" ")[0], 0, 65);
            
            pop();
        }
        
        function drawMonster() {
            push();
            translate(width * 0.75, height * 0.45);
            
            fill(80, 120, 60);
            stroke(30);
            strokeWeight(3);
            
            if (currentMonster.name.includes("Rat") || currentMonster.name.includes("Crawler")) {
                ellipse(0, 0, 70, 50);
                fill(40, 90, 30);
                ellipse(-15, -5, 20, 15);
                ellipse(15, -5, 20, 15);
            } else if (currentMonster.name.includes("Boar")) {
                fill(100, 80, 60);
                ellipse(0, 0, 90, 60);
                fill(60);
                rect(-40, -15, 20, 30);
                rect(20, -15, 20, 30);
            } else if (currentMonster.name.includes("Spider")) {
                fill(30, 100, 40);
                ellipse(0, 0, 60, 50);
                fill(0, 255, 100);
                ellipse(-20, -10, 15, 15);
                ellipse(20, -10, 15, 15);
            } else {
                fill(40, 40, 50);
                ellipse(0, 0, 80, 55);
                fill(255, 0, 0);
                ellipse(-20, -8, 12, 12);
                ellipse(20, -8, 12, 12);
            }
            
            // HP bar
            fill(0);
            rect(-50, -50, 100, 12);
            fill(0, 255, 0);
            rect(-48, -48, map(currentMonster.hp, 0, currentMonster.maxHP, 0, 96), 8);
            
            pop();
        }
        
        function drawGreatOrg() {
            push();
            translate(width * 0.7, height * 0.42);
            
            fill(60, 100, 40);
            stroke(30);
            strokeWeight(4);
            ellipse(0, 20, 160, 140);
            
            fill(70, 110, 45);
            ellipse(0, -60, 110, 100);
            
            fill(50, 90, 30);
            ellipse(-55, -90, 35, 50);
            ellipse(55, -90, 35, 50);
            
            fill(0, 255, 80);
            ellipse(-25, -65, 30, 25);
            ellipse(25, -65, 30, 25);
            
            fill(0, 255, 100, 180);
            ellipse(-15, -30, 12, 35);
            ellipse(20, -25, 10, 28);
            
            // HP bar
            fill(0);
            rect(-70, -130, 140, 16);
            fill(255, 50, 50);
            rect(-68, -128, map(bossHP, 0, 420, 0, 136), 12);
            
            pop();
        }
        
        // ==================== INPUT ====================
        function mousePressed() {
            if (gameState === "fighting" && currentMonster) {
                performAttack();
            } else if (gameState === "boss_fight") {
                if (mouseX > width * 0.4) {
                    fightBoss();
                }
            }
        }
        
        function keyPressed() {
            if (key === 'f' || key === 'F') {
                if (gameState === "fighting") {
                    performAttack();
                } else if (gameState === "boss_fight") {
                    fightBoss();
                } else {
                    goAdventuring();
                }
            }
            if (key === 'e' || key === 'E') {
                if (hasHookshot && biomeIndex < biomes.length - 1) {
                    biomeIndex++;
                    currentBiome = biomes[biomeIndex];
                    monstersInBiome = 0;
                    log(`Traveled to ${currentBiome}!`);
                    updateUI();
                } else {
                    log("Need Hookshot or already at last biome.");
                }
            }
        }
        
        function keyReleased() {
            if (key === 'g' || key === 'G') {
                bodyColor = '#' + Math.floor(Math.random()*16777215).toString(16);
                document.getElementById("body-color").value = bodyColor;
            }
        }
        
        setInterval(updateUI, 2000);
    </script>
</body>
</html>
