<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KJ vs Bluedude - Zachary's Game</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
<style>
  body { margin: 0; background: #111; color: #fff; font-family: Arial, sans-serif; }
  canvas { display: block; margin: 20px auto; border: 4px solid #555; }
  .info { text-align: center; margin-top: 10px; }
</style>
</head>
<body>
<div class="info">
  <h1>KJ vs Bluedude</h1>
  <p>99 Levels • Worlds 1-9 • Boss at World 9</p>
</div>

<script>
let kj, bluedude;
let kjHealth = 100;
let blueHealth = 100;
let gameState = "start";
let currentWorld = 1;
let currentLevel = 1;
let enemiesDefeated = 0;
let totalScore = 0;
let particles = [];
let backgroundBlocks = [];
let isBossFight = false;
let bossHealth = 200;

function setup() {
  createCanvas(800, 520);
  
  for (let i = 0; i < 22; i++) {
    backgroundBlocks.push({
      x: random(width),
      y: random(height * 0.55, height - 30),
      size: random(18, 42),
      color: color(random(70, 110), random(50, 85), random(35, 55))
    });
  }
  
  resetCharacters();
}

function resetCharacters() {
  kj = {
    x: 180,
    y: 340,
    size: 58,
    color: color(220, 50, 50),
    superMode: false,
    superTimer: 0,
    facing: 1
  };
  
  bluedude = {
    x: 620,
    y: 340,
    size: 58,
    color: color(30, 100, 220),
    transform: false,
    transformType: 0,
    health: 100
  };
  
  blueHealth = isBossFight ? 200 : 100 + (currentWorld * 8);
  kjHealth = 100;
  bossHealth = isBossFight ? 200 : 100;
}

function draw() {
  background(18, 28, 48);
  
  // Minecraft ground
  fill(95, 60, 30);
  rect(0, 400, width, 120);
  
  // Background blocks
  for (let block of backgroundBlocks) {
    fill(block.color);
    rect(block.x, block.y, block.size, block.size);
    fill(255, 255, 255, 35);
    rect(block.x, block.y, block.size * 0.28, block.size);
  }
  
  if (gameState === "start") {
    drawStartScreen();
  } else if (gameState === "fight") {
    drawFight();
  } else if (gameState === "win" || gameState === "lose") {
    drawEndScreen();
  }
  
  updateParticles();
}

function drawStartScreen() {
  fill(255);
  textSize(44);
  textAlign(CENTER);
  text("KJ vs BLUEDUDE", width/2, 130);
  
  textSize(22);
  text("Worlds 1-9 • 99 Levels • Boss at World 9", width/2, 175);
  
  textSize(20);
  text("Press SPACE to START", width/2, 230);
  
  textSize(16);
  fill(255, 200, 100);
  text("Z = Punch   X = Teleport   C = Super Mode / UTMINE", width/2, 290);
  text("Arrow Keys = Move", width/2, 315);
}

function drawFight() {
  drawKJ();
  drawBluedude();
  drawHealthBars();
  drawLevelInfo();
  
  fill(180);
  textSize(13);
  textAlign(LEFT);
  text("Z Punch | X Teleport | C Ultimate | ← → Move", 20, 490);
}

function drawLevelInfo() {
  fill(255);
  textSize(18);
  textAlign(CENTER);
  let label = isBossFight ? "WORLD 9 - FINAL BOSS" : `WORLD ${currentWorld} - Level ${currentLevel}`;
  text(label, width/2, 55);
  
  textSize(14);
  text("Enemies Defeated: " + enemiesDefeated, width/2, 78);
}

function drawKJ() {
  push();
  translate(kj.x, kj.y);
  scale(kj.facing, 1);
  
  fill(kj.superMode ? color(255, 230, 60) : kj.color);
  rect(-kj.size/2, -kj.size/2, kj.size, kj.size * 0.82);
  
  fill(255, 160, 60);
  rect(-kj.size/3, -kj.size * 0.92, kj.size * 0.66, kj.size * 0.48);
  
  // Ears
  fill(255, 140, 50);
  triangle(-kj.size/3, -kj.size * 0.92, -kj.size/7, -kj.size * 1.18, 0, -kj.size * 0.92);
  triangle(kj.size/3, -kj.size * 0.92, kj.size/7, -kj.size * 1.18, 0, -kj.size * 0.92);
  
  fill(0);
  ellipse(-kj.size/7, -kj.size * 0.78, 9, 9);
  ellipse(kj.size/7, -kj.size * 0.78, 9, 9);
  
  // Gloves
  fill(40);
  rect(-kj.size/2 - 12, -kj.size/4, 16, 22);
  rect(kj.size/2 - 4, -kj.size/4, 16, 22);
  
  pop();
  
  if (kj.superMode) {
    noFill();
    stroke(255, 230, 60, 160);
    strokeWeight(5);
    ellipse(kj.x, kj.y - 8, kj.size * 1.5, kj.size * 1.5);
    strokeWeight(1);
  }
}

function drawBluedude() {
  push();
  translate(bluedude.x, bluedude.y);
  
  let bColor = bluedude.transform ? color(120, 20, 180) : bluedude.color;
  if (isBossFight) bColor = color(180, 30, 200);
  
  fill(bColor);
  rect(-bluedude.size/2, -bluedude.size/2, bluedude.size, bluedude.size * 0.92);
  
  // Horns
  fill(45);
  triangle(-bluedude.size/3, -bluedude.size/2, -bluedude.size/5, -bluedude.size * 0.95, 0, -bluedude.size/2);
  triangle(bluedude.size/3, -bluedude.size/2, bluedude.size/5, -bluedude.size * 0.95, 0, -bluedude.size/2);
  
  fill(isBossFight ? color(255, 50, 50) : color(255, 0, 0));
  ellipse(-bluedude.size/5, -bluedude.size * 0.32, 13, 13);
  ellipse(bluedude.size/5, -bluedude.size * 0.32, 13, 13);
  
  if (bluedude.transform || isBossFight) {
    noFill();
    stroke(200, 50, 255, 90);
    strokeWeight(4);
    ellipse(0, 0, bluedude.size * 1.7, bluedude.size * 1.7);
    strokeWeight(1);
  }
  
  pop();
}

function drawHealthBars() {
  // KJ
  fill(40);
  rect(40, 25, 180, 22);
  fill(0, 255, 80);
  rect(40, 25, kjHealth * 1.8, 22);
  fill(255);
  textSize(15);
  text("KJ", 230, 42);
  
  // Bluedude / Boss
  fill(40);
  rect(580, 25, 180, 22);
  fill(isBossFight ? color(255, 80, 80) : color(60, 160, 255));
  rect(580, 25, blueHealth * (isBossFight ? 0.9 : 1.8), 22);
  fill(255);
  text(isBossFight ? "FINAL BOSS" : "Bluedude", isBossFight ? 760 : 770, 42);
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    fill(p.color);
    noStroke();
    ellipse(p.x, p.y, p.size);
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function advanceLevel() {
  enemiesDefeated++;
  totalScore += 10;
  
  // Advance level
  currentLevel++;
  
  // Every 3 levels, advance world
  if (currentLevel > 3) {
    currentLevel = 1;
    currentWorld++;
  }
  
  // Check for World 9 boss
  if (currentWorld >= 9) {
    isBossFight = true;
    currentWorld = 9;
  }
  
  // Reset for next fight
  resetCharacters();
  
  // Make game harder
  if (currentWorld > 5) {
    bluedude.size = 68;
  }
}

function keyPressed() {
  if (gameState === "start" && key === ' ') {
    gameState = "fight";
    currentWorld = 1;
    currentLevel = 1;
    enemiesDefeated = 0;
    isBossFight = false;
    resetCharacters();
  }
  
  if (gameState === "fight") {
    if (key === 'z' || key === 'Z') punch();
    if (key === 'x' || key === 'X') teleport();
    if (key === 'c' || key === 'C') superOrUltimate();
    
    if (keyCode === LEFT_ARROW) { kj.x -= 32; kj.facing = -1; }
    if (keyCode === RIGHT_ARROW) { kj.x += 32; kj.facing = 1; }
  }
  
  if ((gameState === "win" || gameState === "lose") && key === ' ') {
    gameState = "start";
    isBossFight = false;
  }
}

function punch() {
  let distToBlue = abs(kj.x - bluedude.x);
  
  if (distToBlue < 130) {
    let damage = kj.superMode ? 22 : 12;
    if (isBossFight) damage = kj.superMode ? 18 : 9;
    
    blueHealth -= damage;
    bossHealth -= damage;
    
    for (let i = 0; i < 9; i++) {
      particles.push({
        x: bluedude.x,
        y: bluedude.y - 15,
        vx: random(-3.5, 3.5),
        vy: random(-2, -6),
        size: random(4, 9),
        life: 26,
        color: color(255, 210, 0)
      });
    }
    
    checkWinCondition();
  }
}

function teleport() {
  kj.x = bluedude.x + (random() > 0.5 ? 95 : -95);
  kj.facing = (kj.x < bluedude.x) ? 1 : -1;
  
  for (let i = 0; i < 14; i++) {
    particles.push({
      x: kj.x,
      y: kj.y,
      vx: random(-5, 5),
      vy: random(-4, 4),
      size: random(3, 8),
      life: 22,
      color: color(255, 255, 120)
    });
  }
}

function superOrUltimate() {
  if (kjHealth < 45 || blueHealth < 55) {
    // UTMINE ULTIMATE
    let damage = isBossFight ? 55 : 42;
    blueHealth -= damage;
    bossHealth -= damage;
    
    for (let i = 0; i < 55; i++) {
      particles.push({
        x: bluedude.x,
        y: bluedude.y,
        vx: random(-7, 7),
        vy: random(-7, 7),
        size: random(5, 13),
        life: 45,
        color: color(random(220, 255), random(120, 200), 30)
      });
    }
    
    checkWinCondition();
  } else {
    // Super Mode
    kj.superMode = true;
    kj.superTimer = 200;
    
    for (let i = 0; i < 18; i++) {
      particles.push({
        x: kj.x,
        y: kj.y,
        vx: random(-4, 4),
        vy: random(-6, -1),
        size: random(4, 10),
        life: 32,
        color: color(255, 230, 60)
      });
    }
  }
}

function checkWinCondition() {
  if (blueHealth <= 0 || (isBossFight && bossHealth <= 0)) {
    if (isBossFight) {
      gameState = "win";
    } else {
      advanceLevel();
      // Small delay before next fight
      setTimeout(() => {
        if (gameState !== "win") gameState = "fight";
      }, 800);
    }
  }
}

function drawEndScreen() {
  fill(0, 0, 0, 185);
  rect(0, 0, width, height);
  
  fill(255);
  textSize(38);
  textAlign(CENTER);
  
  if (gameState === "win") {
    fill(120, 255, 120);
    text("KJ WINS THE GAME!", width/2, height/2 - 50);
    textSize(22);
    fill(255);
    text("You defeated the FINAL BOSS with UTMINE!", width/2, height/2 + 10);
    text("Total Score: " + totalScore, width/2, height/2 + 50);
  } else {
    fill(255, 90, 90);
    text("BLUEDUDE WINS!", width/2, height/2 - 30);
    textSize(20);
    fill(255);
    text("Try again...", width/2, height/2 + 20);
  }
  
  textSize(18);
  text("Press SPACE to return to menu", width/2, height/2 + 100);
}

// Simple AI for Bluedude
setInterval(() => {
  if (gameState === "fight") {
    if (kj.superMode) {
      kj.superTimer--;
      if (kj.superTimer <= 0) kj.superMode = false;
    }
    
    // AI movement and attacks
    if (frameCount % 55 === 0) {
      if (bluedude.x > kj.x + 40) bluedude.x -= (isBossFight ? 18 : 22);
      else if (bluedude.x < kj.x - 40) bluedude.x += (isBossFight ? 18 : 22);
      
      // Occasional transform
      if (random() < (isBossFight ? 0.5 : 0.35)) {
        bluedude.transform = !bluedude.transform;
      }
    }
    
    // AI attack
    if (frameCount % 90 === 0 && random() < (isBossFight ? 0.7 : 0.55)) {
      let dist = abs(bluedude.x - kj.x);
      if (dist < 150) {
        let dmg = isBossFight ? random(12, 18) : random(7, 12);
        kjHealth -= dmg;
        
        for (let i = 0; i < 7; i++) {
          particles.push({
            x: kj.x,
            y: kj.y,
            vx: random(-3, 3),
            vy: random(-4, -2),
            size: random(4, 8),
            life: 18,
            color: color(140, 60, 255)
          });
        }
        
        if (kjHealth <= 0) {
          gameState = "lose";
        }
      }
    }
  }
}, 120);
</script>
</body>
</html>
