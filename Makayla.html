<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hoots World! - Makayla Ann Sherman</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
<style>
  body { margin:0; background:#0a1f0a; color:#fff; font-family:Arial; }
  canvas { display:block; margin:15px auto; border:6px solid #2a5a2a; border-radius:12px; }
  .controls { text-align:center; margin-top:8px; }
  button { 
    background:#2a5a2a; color:#fff; border:2px solid #4a7a4a; 
    padding:8px 14px; margin:3px; border-radius:8px; font-size:14px; cursor:pointer;
  }
  button:hover { background:#3a6a3a; }
  .stat { display:inline-block; margin:0 12px; width:130px; text-align:left; }
  .bar { background:#222; height:16px; border:2px solid #4a7a4a; border-radius:4px; overflow:hidden; }
  .fill { height:100%; transition:width 0.3s; }
</style>
</head>
<body>
<h1 style="text-align:center; color:#aaffaa">🦉 Hoots World! 🦉</h1>
<p style="text-align:center; color:#88cc88">A Tamagotchi Adventure for Makayla Ann Sherman • Care for Hoot the Owl</p>

<div class="controls">
  <button onclick="feed()">🍃 Feed</button>
  <button onclick="giveWater()">💧 Water</button>
  <button onclick="putToSleep()">🛏️ Sleep</button>
  <button onclick="petHoot()">🖐️ Pet</button>
  <button onclick="playWithHoot()">🎾 Play</button>
  <button onclick="singToHoot()">🎵 Sing</button>
  <button onclick="groomHoot()">🪶 Groom</button>
  <button onclick="tellStory()">📖 Story</button>
  <button onclick="letFly()">🕊️ Fly</button>
  <button onclick="roam()">🌲 Roam</button>
  <button onclick="releaseOwl()">🌲 Release</button>
  <button onclick="restartGame()">🔄 Restart</button>
</div>

<div style="text-align:center; margin:12px 0;">
  <div class="stat"><b>Hunger</b><div class="bar"><div id="hungerBar" class="fill" style="width:70%; background:#ffaa44"></div></div></div>
  <div class="stat"><b>Thirst</b><div class="bar"><div id="thirstBar" class="fill" style="width:70%; background:#44aaff"></div></div></div>
  <div class="stat"><b>Energy</b><div class="bar"><div id="energyBar" class="fill" style="width:80%; background:#aaff44"></div></div></div>
  <div class="stat"><b>Happiness</b><div class="bar"><div id="happinessBar" class="fill" style="width:75%; background:#ff44aa"></div></div></div>
  <div class="stat"><b>Care Level</b><div class="bar"><div id="careBar" class="fill" style="width:10%; background:#aaffaa"></div></div></div>
</div>

<p style="text-align:center; font-size:13px; color:#88aa88">
  Keys: <b>F</b> Feed • <b>W</b> Water • <b>S</b> Sleep • <b>P</b> Pet • <b>L</b> Play • <b>G</b> Groom • <b>T</b> Story • <b>Space</b> Fly • <b>R</b> Roam • <b>ESC</b> Release • <b>C</b> Change Colors
</p>

<script>
let hoot = {
  x: 450, y: 320, size: 68,
  vx: 0, vy: 0,
  flying: false, flyingTime: 0,
  colorScheme: 0,
  mood: "happy",
  sleeping: false
};

let hunger = 75, thirst = 75, energy = 88, happiness = 78, careLevel = 12;
let scene = "house";
let lastDecay = Date.now();
let gameOver = false;
let win = false;
let villain = null;
let particles = [];
let trees = [];
let eatingAnim = 0;
let drinkingAnim = 0;
let sleepingAnim = 0;

function setup() {
  createCanvas(950, 620);
  
  for (let i = 0; i < 9; i++) {
    trees.push({
      x: 60 + i * 105,
      y: 380,
      h: random(120, 190),
      type: i % 3
    });
  }
  
  hoot.x = width/2;
  hoot.y = 340;
}

function draw() {
  if (gameOver) { drawGameOver(); return; }
  if (win) { drawWinScreen(); return; }
  
  // Much slower decay (minutes of life)
  if (Date.now() - lastDecay > 4800) {
    hunger = max(0, hunger - 0.65);
    thirst = max(0, thirst - 0.65);
    energy = max(0, energy - 0.35);
    happiness = max(0, happiness - 0.3);
    lastDecay = Date.now();
    
    if (random() < 0.15) happiness = max(0, happiness - 0.5);
    updateBars();
    checkGameState();
  }
  
  if (scene === "forest") {
    drawForest();
  } else {
    drawHouse();
  }
  
  updateOwl();
  drawHoot(hoot.x, hoot.y, hoot.size, hoot.colorScheme, hoot.mood, hoot.flying, hoot.sleeping);
  updateParticles();
  
  if (villain) drawVillain();
  
  // Eating animation (food going to beak)
  if (eatingAnim > 0) {
    eatingAnim--;
    let beakX = hoot.x;
    let beakY = hoot.y - hoot.size * 0.18;
    fill(255, 200, 80);
    for (let i = 0; i < 4; i++) {
      let prog = (18 - eatingAnim) / 18;
      ellipse(beakX + random(-12,12) * (1-prog), beakY - 25 + prog * 30, 7, 7);
    }
  }
  
  // Drinking animation (water drops into beak)
  if (drinkingAnim > 0) {
    drinkingAnim--;
    let beakX = hoot.x;
    let beakY = hoot.y - hoot.size * 0.15;
    for (let i = 0; i < 5; i++) {
      let prog = (22 - drinkingAnim) / 22;
      fill(80, 180, 255, 220);
      ellipse(beakX + random(-7,7) * (1-prog), beakY - 18 + prog * 25, 5, 7);
    }
    if (drinkingAnim < 6) {
      fill(100, 210, 255, 160);
      ellipse(beakX, beakY, 13, 8);
    }
  }
  
  fill(255);
  textSize(17);
  textAlign(LEFT);
  text("Scene: " + (scene === "forest" ? "🌲 Forest" : "🏠 House"), 25, 35);
  text("Hoot's Mood: " + hoot.mood.toUpperCase(), 25, 58);
  
  if (careLevel > 90) {
    fill(255, 255, 150);
    text("Ready to release! Press ESC", width/2 - 140, 35);
  }
}

function drawForest() {
  background(25, 55, 35);
  for (let i = 0; i < 12; i++) {
    fill(35 + i*4, 75 + i*5, 55 + i*3, 180);
    rect(0, i * 35, width, 40);
  }
  fill(255, 220, 120, 25);
  for (let i = 0; i < 5; i++) {
    triangle(200 + i*120, 0, 320 + i*80, 380, 120 + i*90, 0);
  }
  fill(35, 95, 45);
  rect(0, 380, width, 250);
  for (let i = 0; i < 60; i++) {
    stroke(45, 120, 55);
    strokeWeight(2);
    line(i*16, 390, i*16 + random(-8,8), 340 + random(30));
  }
  noStroke();
  
  for (let t of trees) {
    fill(70, 45, 25);
    rect(t.x - 18, t.y - t.h + 60, 36, t.h - 50);
    if (t.type === 0) {
      fill(20, 85, 35);
      ellipse(t.x, t.y - t.h + 30, 95, 110);
      ellipse(t.x - 30, t.y - t.h + 55, 75, 85);
      ellipse(t.x + 28, t.y - t.h + 50, 70, 90);
    } else if (t.type === 1) {
      fill(25, 95, 40);
      ellipse(t.x, t.y - t.h + 20, 85, 100);
      ellipse(t.x, t.y - t.h + 65, 110, 70);
    } else {
      fill(15, 75, 30);
      ellipse(t.x, t.y - t.h + 40, 120, 95);
    }
  }
  fill(60, 110, 50, 150);
  rect(0, 400, width, 30);
}

function drawHouse() {
  background(55, 40, 30);
  fill(180, 150, 120);
  rect(40, 80, width-80, 380);
  
  fill(120, 85, 55);
  rect(40, 460, width-80, 160);
  for (let i = 0; i < 18; i++) {
    stroke(90, 60, 35);
    line(50 + i*50, 460, 50 + i*50, 620);
  }
  noStroke();
  
  // Colorful carpet
  fill(200, 60, 120);
  rect(280, 470, 420, 130);
  fill(60, 180, 220); rect(300, 485, 80, 50);
  fill(255, 200, 50); rect(420, 510, 60, 70);
  fill(120, 220, 80); rect(510, 490, 90, 40);
  fill(180, 80, 200); rect(620, 505, 55, 65);
  
  // Bed
  fill(140, 90, 160);
  rect(90, 420, 200, 120);
  fill(220, 180, 230);
  rect(95, 425, 190, 55);
  
  // Painting of Hoot
  fill(240, 220, 180);
  rect(650, 140, 180, 140);
  fill(60);
  textSize(11);
  textAlign(CENTER);
  text("Hoot", 740, 155);
  drawMiniOwl(740, 220, 22);
  
  // Bedside table + lamp
  fill(100, 70, 45);
  rect(750, 400, 90, 80);
  fill(220, 200, 160);
  ellipse(795, 385, 25, 25);
}

function drawMiniOwl(x, y, s) {
  push();
  translate(x, y);
  fill(230, 150, 50);
  ellipse(0, 0, s*1.6, s*1.3);
  fill(255, 180, 60);
  triangle(-s*0.35, -s*0.15, s*0.35, -s*0.15, 0, s*0.45);
  fill(0);
  ellipse(-s*0.45, -s*0.25, s*0.25, s*0.35);
  ellipse(s*0.45, -s*0.25, s*0.25, s*0.35);
  pop();
}

function drawHoot(x, y, size, scheme, mood, flying, sleeping) {
  push();
  translate(x, y);
  
  let bodyColor, wingColor, beakColor, eyeColor;
  
  if (scheme === 0) { // orange & brown
    bodyColor = color(230, 145, 45); wingColor = color(180, 100, 30); beakColor = color(255, 200, 60); eyeColor = color(30, 20, 10);
  } else if (scheme === 1) { // pink & purple
    bodyColor = color(255, 140, 200); wingColor = color(160, 80, 180); beakColor = color(255, 220, 230); eyeColor = color(40, 10, 50);
  } else if (scheme === 2) { // blue & black
    bodyColor = color(70, 130, 200); wingColor = color(30, 40, 80); beakColor = color(200, 220, 255); eyeColor = color(10, 10, 30);
  } else if (scheme === 3) { // red & blue
    bodyColor = color(220, 60, 80); wingColor = color(50, 80, 160); beakColor = color(255, 200, 210); eyeColor = color(20, 10, 40);
  } else if (scheme === 4) { // purple & yellow
    bodyColor = color(160, 80, 200); wingColor = color(240, 200, 60); beakColor = color(255, 230, 180); eyeColor = color(30, 20, 50);
  } else if (scheme === 5) { // yellow & orange
    bodyColor = color(255, 210, 70); wingColor = color(230, 130, 40); beakColor = color(255, 240, 200); eyeColor = color(40, 25, 10);
  } else { // green & blue
    bodyColor = color(60, 180, 120); wingColor = color(40, 90, 160); beakColor = color(200, 255, 220); eyeColor = color(10, 30, 40);
  }
  
  if (sleeping && scene === "house") {
    // Sleeping in bed - tucked in with blanket
    fill(bodyColor);
    ellipse(180, 470, size*0.9, size*0.7); // body under blanket
    fill(220, 180, 230);
    rect(145, 455, size*1.1, 35); // blanket
    fill(bodyColor);
    ellipse(180, 445, size*0.85, size*0.65); // head on pillow
    fill(255, 200, 60);
    triangle(170, 440, 190, 440, 180, 455); // beak
    fill(255);
    ellipse(168, 432, 12, 14);
    ellipse(192, 432, 12, 14);
    fill(30);
    ellipse(168, 433, 6, 7);
    ellipse(192, 433, 6, 7);
    // Z's
    fill(255, 255, 200);
    textSize(16);
    text("z", 210, 430);
    text("Z", 225, 415);
  } else {
    // Normal owl drawing
    fill(bodyColor);
    beginShape();
    vertex(-size*0.45, -size*0.1);
    bezierVertex(-size*0.6, size*0.5, size*0.6, size*0.5, size*0.45, -size*0.1);
    endShape(CLOSE);
    
    fill(bodyColor);
    ellipse(0, -size*0.35, size*1.15, size*0.95);
    
    fill(wingColor);
    triangle(-size*0.35, -size*0.7, -size*0.15, -size*0.35, -size*0.55, -size*0.35);
    triangle(size*0.35, -size*0.7, size*0.15, -size*0.35, size*0.55, -size*0.35);
    
    fill(wingColor);
    if (flying) {
      push(); rotate(-0.6); ellipse(-size*0.55, -size*0.1, size*0.35, size*0.9); pop();
      push(); rotate(0.6); ellipse(size*0.55, -size*0.1, size*0.35, size*0.9); pop();
    } else {
      ellipse(-size*0.6, size*0.15, size*0.28, size*0.75);
      ellipse(size*0.6, size*0.15, size*0.28, size*0.75);
    }
    
    fill(beakColor);
    triangle(-size*0.18, -size*0.25, size*0.18, -size*0.25, 0, size*0.18);
    
    fill(255);
    ellipse(-size*0.32, -size*0.42, size*0.32, size*0.38);
    ellipse(size*0.32, -size*0.42, size*0.32, size*0.38);
    
    fill(eyeColor);
    let eyeOffset = (mood === "sad") ? size*0.05 : 0;
    ellipse(-size*0.32, -size*0.42 + eyeOffset, size*0.18, size*0.22);
    ellipse(size*0.32, -size*0.42 + eyeOffset, size*0.18, size*0.22);
    
    // Two feet
    fill(255, 180, 80);
    ellipse(-size*0.28, size*0.65, size*0.32, size*0.28);
    ellipse(size*0.28, size*0.65, size*0.32, size*0.28);
  }
  pop();
}

function updateOwl() {
  if (hoot.flying) {
    hoot.vx = sin(frameCount * 0.08) * 2.2;
    hoot.vy = -1.8 + cos(frameCount * 0.06) * 0.6;
    hoot.flyingTime--;
    if (hoot.flyingTime <= 0) {
      hoot.flying = false;
      happiness = min(100, happiness + 12);
      careLevel = min(100, careLevel + 3);
      updateBars();
    }
  } else if (hoot.sleeping) {
    hoot.vx = 0;
    hoot.vy = 0;
  } else {
    hoot.vx = sin(frameCount * 0.03) * 0.6;
    hoot.vy = cos(frameCount * 0.04) * 0.4;
    if (scene === "forest" && random() < 0.008) hoot.vy = -3;
  }
  
  hoot.x += hoot.vx;
  hoot.y += hoot.vy;
  
  let groundY = (scene === "forest") ? 390 : 430;
  if (hoot.y > groundY) { hoot.y = groundY; hoot.vy = 0; }
  hoot.x = constrain(hoot.x, 80, width - 80);
  
  if (hunger < 25 || thirst < 25) hoot.mood = "sad";
  else if (happiness > 70) hoot.mood = "happy";
  else hoot.mood = "neutral";
  
  if ((hunger < 15 || thirst < 15) && !villain && random() < 0.1) {
    villain = { x: random(100, width-100), y: 420, timer: 180 };
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    p.vy += 0.1;
    fill(p.col);
    ellipse(p.x, p.y, p.size, p.size);
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function addFeather(x, y) {
  particles.push({
    x: x, y: y,
    vx: random(-1.5, 1.5),
    vy: random(-2, -0.5),
    size: random(6, 11),
    life: random(35, 70),
    col: color(255, random(200, 255), random(180, 220), 200)
  });
}

function updateBars() {
  document.getElementById("hungerBar").style.width = hunger + "%";
  document.getElementById("thirstBar").style.width = thirst + "%";
  document.getElementById("energyBar").style.width = energy + "%";
  document.getElementById("happinessBar").style.width = happiness + "%";
  document.getElementById("careBar").style.width = careLevel + "%";
}

function checkGameState() {
  if (hunger <= 0 || thirst <= 0 || energy <= 0) gameOver = true;
  if (villain) {
    villain.timer--;
    if (villain.timer % 4 === 0) villain.x += random(-3, 3);
    if (villain.timer <= 0 && (hunger < 10 || thirst < 10)) gameOver = true;
  }
}

function drawVillain() {
  fill(40, 20, 10, 220);
  ellipse(villain.x, villain.y - 20, 55, 40);
  fill(60, 30, 15);
  ellipse(villain.x - 18, villain.y - 25, 18, 22);
  ellipse(villain.x + 18, villain.y - 25, 18, 22);
  fill(200, 50, 30);
  ellipse(villain.x, villain.y - 18, 12, 8);
}

function drawGameOver() {
  background(30, 10, 10);
  fill(255, 80, 80);
  textSize(48);
  textAlign(CENTER);
  text("💔 Hoot flew away...", width/2, 220);
  textSize(24);
  fill(255);
  text("You didn't take care of Hoot properly.", width/2, 280);
  text("Try again and give him lots of love!", width/2, 320);
  textSize(18);
  text("Press R to restart", width/2, 380);
}

function drawWinScreen() {
  background(20, 60, 35);
  fill(180, 255, 180);
  textSize(42);
  textAlign(CENTER);
  text("🌲 Hoot is Free! 🌲", width/2, 200);
  textSize(22);
  fill(255);
  text("You gave Hoot the best care and let him return to the forest.", width/2, 260);
  text("Hoot will always remember you, Makayla 💜", width/2, 300);
  textSize(18);
  text("Care Level: " + floor(careLevel) + " / 100", width/2, 350);
  text("Press R to play again", width/2, 400);
}

// === ACTIONS ===

function feed() {
  if (gameOver || win) return;
  hunger = min(100, hunger + 18);
  happiness = min(100, happiness + 6);
  careLevel = min(100, careLevel + 4);
  eatingAnim = 18;
  updateBars();
}

function giveWater() {
  if (gameOver || win) return;
  thirst = min(100, thirst + 20);
  happiness = min(100, happiness + 5);
  careLevel = min(100, careLevel + 3);
  drinkingAnim = 22;
  updateBars();
}

function putToSleep() {
  if (gameOver || win) return;
  if (scene !== "house") {
    scene = "house";
    hoot.x = 180;
    hoot.y = 470;
  }
  hoot.sleeping = true;
  energy = min(100, energy + 24);
  happiness = min(100, happiness + 5);
  careLevel = min(100, careLevel + 5);
  setTimeout(() => { hoot.sleeping = false; }, 4200);
  updateBars();
}

function petHoot() {
  if (gameOver || win) return;
  happiness = min(100, happiness + 14);
  careLevel = min(100, careLevel + 4);
  for (let i = 0; i < 6; i++) addFeather(hoot.x + random(-20,20), hoot.y - 10);
  updateBars();
}

function playWithHoot() {
  if (gameOver || win) return;
  happiness = min(100, happiness + 16);
  energy = max(0, energy - 4);
  careLevel = min(100, careLevel + 5);
  hoot.flying = true;
  hoot.flyingTime = 70;
  updateBars();
}

function singToHoot() {
  if (gameOver || win) return;
  happiness = min(100, happiness + 13);
  careLevel = min(100, careLevel + 4);
  for (let i = 0; i < 8; i++) {
    particles.push({
      x: hoot.x + random(-25,25),
      y: hoot.y - 40 + random(-10,10),
      vx: random(-0.8,0.8),
      vy: random(-1.2,-0.3),
      size: random(5,9),
      life: 55,
      col: color(255, random(220,255), random(180,240), 180)
    });
  }
  updateBars();
}

function groomHoot() {
  if (gameOver || win) return;
  happiness = min(100, happiness + 11);
  careLevel = min(100, careLevel + 6);
  for (let i = 0; i < 10; i++) addFeather(hoot.x, hoot.y);
  updateBars();
}

function tellStory() {
  if (gameOver || win) return;
  happiness = min(100, happiness + 12);
  energy = min(100, energy + 8);
  careLevel = min(100, careLevel + 5);
  updateBars();
}

function letFly() {
  if (gameOver || win) return;
  hoot.flying = true;
  hoot.flyingTime = 95;
  happiness = min(100, happiness + 14);
  careLevel = min(100, careLevel + 6);
  if (scene === "forest") hoot.y = min(hoot.y - 80, 220);
  updateBars();
}

function roam() {
  if (gameOver || win) return;
  scene = (scene === "forest") ? "house" : "forest";
  hoot.x = (scene === "forest") ? random(150, width-150) : random(200, 500);
  hoot.y = (scene === "forest") ? 340 : 380;
  happiness = min(100, happiness + 3);
  careLevel = min(100, careLevel + 2);
  villain = null;
  updateBars();
}

function releaseOwl() {
  if (gameOver || win) return;
  if (careLevel >= 75) {
    win = true;
    hoot.flying = true;
    hoot.vy = -4;
    hoot.vx = 0;
    for (let i = 0; i < 30; i++) {
      particles.push({
        x: hoot.x + random(-40,40),
        y: hoot.y + random(-30,30),
        vx: random(-2,2),
        vy: random(-3,-0.5),
        size: random(8,16),
        life: 90,
        col: color(255, random(220,255), random(200,240))
      });
    }
  } else {
    happiness -= 8;
    alert("Hoot isn't ready yet. Keep caring for him! (Need 75+ Care Level)");
  }
}

function restartGame() {
  hunger = 75; thirst = 75; energy = 88; happiness = 78; careLevel = 12;
  scene = "house";
  gameOver = false;
  win = false;
  villain = null;
  hoot.x = width/2;
  hoot.y = 340;
  hoot.flying = false;
  hoot.sleeping = false;
  particles = [];
  eatingAnim = 0;
  drinkingAnim = 0;
  updateBars();
}

function keyPressed() {
  if (key === 'f' || key === 'F') feed();
  if (key === 'w' || key === 'W') giveWater();
  if (key === 's' || key === 'S') putToSleep();
  if (key === 'p' || key === 'P') petHoot();
  if (key === 'l' || key === 'L') playWithHoot();
  if (key === 'g' || key === 'G') groomHoot();
  if (key === 't' || key === 'T') tellStory();
  if (key === ' ') letFly();
  if (key === 'r' || key === 'R') roam();
  if (keyCode === ESCAPE) releaseOwl();
  if (key === 'c' || key === 'C') {
    hoot.colorScheme = (hoot.colorScheme + 1) % 7;
  }
  if (key === '1') { scene = "house"; hoot.x = 300; hoot.y = 380; }
  if (key === '2') { scene = "forest"; hoot.x = random(200,750); hoot.y = 320; }
}

function mousePressed() {
  if (gameOver || win) { restartGame(); return; }
  let d = dist(mouseX, mouseY, hoot.x, hoot.y);
  if (d < hoot.size * 0.9) {
    happiness = min(100, happiness + 9);
    careLevel = min(100, careLevel + 3);
    addFeather(hoot.x, hoot.y);
    if (random() < 0.4) letFly();
    updateBars();
  } else {
    roam();
  }
}
</script>
