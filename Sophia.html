<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ SOPHIA — Construct in Space ✨</title>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
        
        body {
            margin: 0;
            background: #0a001f;
            color: #fff;
            font-family: 'Press Start 2P', system-ui;
            overflow: hidden;
        }
        
        canvas {
            display: block;
            border: 8px solid #ff00aa;
            border-image: linear-gradient(#00f3ff, #ff00aa) 1;
        }
        
        .ui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 0, 31, 0.85);
            padding: 15px 30px;
            border: 4px solid #00f3ff;
            border-radius: 8px;
            text-align: center;
            z-index: 100;
        }
        
        .title {
            font-size: 28px;
            margin: 0 0 10px 0;
            background: linear-gradient(90deg, #00f3ff, #ff00aa, #00f3ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px #00f3ff;
        }
        
        button {
            background: #ff00aa;
            color: white;
            border: 4px solid #00f3ff;
            padding: 12px 24px;
            font-family: 'Press Start 2P', system-ui;
            font-size: 14px;
            cursor: pointer;
            margin: 8px;
            transition: all 0.2s;
        }
        
        button:hover {
            background: #00f3ff;
            color: #0a001f;
            transform: scale(1.1);
        }
        
        .character-select {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
        }
        
        .char-card {
            background: rgba(255,255,255,0.1);
            border: 4px solid;
            padding: 15px;
            width: 160px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .char-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 30px currentColor;
        }
        
        .sofia { border-color: #00ffcc; }
        .achly { border-color: #ff3366; }
        
        .level {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 18px;
            background: rgba(0,0,0,0.6);
            padding: 8px 20px;
            border: 3px solid #ff00aa;
        }
        
        .creepy {
            animation: creepyShake 0.5s infinite;
        }
    </style>
</head>
<body>
    <div id="ui" class="ui">
        <h1 class="title">SOPHIA</h1>
        <p style="margin: 5px 0; font-size: 12px;">Construct in Space • 100 Levels</p>
        
        <div id="menu">
            <button onclick="startGame()">START BUILDING</button>
            <div class="character-select">
                <div onclick="selectCharacter('sofia')" class="char-card sofia">
                    <div style="font-size:22px; margin-bottom:8px;">🌈 SOFIA</div>
                    <div style="font-size:10px; line-height:1.3;">
                        Blue eyes<br>
                        Rainbow shirt<br>
                        Makes things<br>
                        BEAUTIFUL
                    </div>
                </div>
                <div onclick="selectCharacter('achly')" class="char-card achly">
                    <div style="font-size:22px; margin-bottom:8px;">💎 ACHLY</div>
                    <div style="font-size:10px; line-height:1.3;">
                        Black hair<br>
                        Diamond earring<br>
                        Destroys houses<br>
                        GETS MAD
                    </div>
                </div>
            </div>
        </div>
        
        <div id="game-ui" style="display:none;">
            <div style="display:flex; gap:15px; justify-content:center; margin-top:10px;">
                <button onclick="buildHouse()" style="background:#00ffcc; color:#0a001f;">BUILD HOUSE</button>
                <button onclick="destroyHouse()" style="background:#ff3366;">DESTROY</button>
            </div>
            <p style="margin:8px 0 0 0; font-size:11px;">Click on planet to place • Protect your houses!</p>
        </div>
    </div>
    
    <div id="level-display" class="level" style="display:none;">
        LEVEL <span id="level-num">1</span>
        <div id="houses-left" style="font-size:11px; margin-top:4px;">Houses: 0/5</div>
    </div>

    <script>
        let gameState = 'menu';
        let selectedCharacter = 'sofia';
        let level = 1;
        let houses = [];
        let stars = [];
        let planets = [];
        let particles = [];
        let achlyAnger = 0;
        let lastDestroyTime = 0;
        
        // Realistic Planet Types
        const PLANET_TYPES = ['rocky', 'gas', 'ice', 'lava', 'desert'];
        
        class House {
            constructor(x, y, isBeautiful = true) {
                this.x = x;
                this.y = y;
                this.isBeautiful = isBeautiful;
                this.health = isBeautiful ? 100 : 60;
                this.size = isBeautiful ? 28 : 22;
                this.color = isBeautiful ? 
                    [random(150,255), random(200,255), random(150,255)] : 
                    [random(80,120), random(40,80), random(40,80)];
                this.beautyLevel = isBeautiful ? random(2, 4) : 1;
            }
            
            draw() {
                push();
                translate(this.x, this.y);
                
                fill(this.color[0], this.color[1], this.color[2]);
                rect(-this.size/2, -this.size/2, this.size, this.size * 0.8);
                
                if (this.isBeautiful) {
                    fill(255, 200, 50);
                    triangle(-this.size/2 - 5, -this.size/2, 
                             this.size/2 + 5, -this.size/2, 
                             0, -this.size/2 - 18);
                    
                    for (let i = 0; i < this.beautyLevel; i++) {
                        stroke(255, 100 + i*40, 200);
                        strokeWeight(3);
                        arc(-8 + i*6, -this.size/2 - 5, 12, 12, 0, PI);
                    }
                    noStroke();
                } else {
                    fill(60);
                    triangle(-this.size/2, -this.size/2, 
                             this.size/2, -this.size/2, 
                             0, -this.size/2 - 12);
                }
                
                fill(255, 255, 200);
                rect(-8, -this.size/4, 6, 6);
                rect(4, -this.size/4, 6, 6);
                
                fill(40, 30, 20);
                rect(-4, this.size/8, 8, 12);
                
                if (achlyAnger > 40 && !this.isBeautiful) {
                    fill(255, 0, 0, 80);
                    ellipse(0, 0, this.size * 1.5);
                }
                
                pop();
            }
            
            update() {
                if (!this.isBeautiful && achlyAnger > 30) {
                    this.health -= 0.3;
                }
            }
        }
        
        class Particle {
            constructor(x, y, type = 'build') {
                this.x = x;
                this.y = y;
                this.vx = random(-3, 3);
                this.vy = random(-4, -1);
                this.life = type === 'build' ? 40 : 25;
                this.type = type;
                this.size = random(4, 9);
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.15;
                this.life--;
                this.size *= 0.96;
            }
            
            draw() {
                if (this.type === 'build') {
                    fill(0, 255, 200, this.life * 6);
                } else {
                    fill(255, 50, 50, this.life * 10);
                }
                noStroke();
                ellipse(this.x, this.y, this.size);
            }
        }
        
        // ==================== REALISTIC PLANET DRAWING ====================
        
        function drawRealisticPlanet(p) {
            const type = p.type || 'rocky';
            const cx = p.x;
            const cy = p.y;
            const r = p.size;
            
            // Base color
            let baseColor = p.color;
            
            // === LIGHTING: Create 3D sphere effect ===
            // Main body
            fill(baseColor[0], baseColor[1], baseColor[2]);
            ellipse(cx, cy, r * 2);
            
            // Light side (highlight)
            fill(255, 255, 255, 45);
            ellipse(cx - r * 0.25, cy - r * 0.3, r * 1.3);
            
            // Dark side (shadow)
            fill(0, 0, 0, 55);
            ellipse(cx + r * 0.35, cy + r * 0.25, r * 1.25);
            
            // === TYPE-SPECIFIC DETAILS ===
            
            if (type === 'rocky') {
                // Craters
                for (let i = 0; i < p.details.length; i++) {
                    let d = p.details[i];
                    fill(20, 15, 35, 180);
                    ellipse(cx + d.x, cy + d.y, d.size);
                    // Crater rim highlight
                    fill(255, 255, 255, 35);
                    ellipse(cx + d.x - 2, cy + d.y - 2, d.size * 0.6);
                }
                // Surface texture
                stroke(0, 0, 0, 40);
                strokeWeight(1.5);
                for (let i = 0; i < 5; i++) {
                    let angle = p.details[i % p.details.length].angle || random(TWO_PI);
                    let len = random(r * 0.3, r * 0.6);
                    line(cx + cos(angle) * r * 0.4, cy + sin(angle) * r * 0.4,
                         cx + cos(angle) * len, cy + sin(angle) * len);
                }
                noStroke();
            }
            
            else if (type === 'gas') {
                // Gas giant bands
                stroke(baseColor[0] * 0.6, baseColor[1] * 0.6, baseColor[2] * 0.6, 120);
                strokeWeight(4);
                for (let i = -2; i <= 2; i++) {
                    let yOffset = i * (r * 0.22);
                    arc(cx, cy + yOffset, r * 1.9, r * 0.55, PI * 0.1, PI * 0.9);
                }
                noStroke();
                
                // Big storm spot
                if (p.hasStorm) {
                    fill(200, 80, 40, 160);
                    ellipse(cx + r * 0.3, cy - r * 0.1, r * 0.45, r * 0.3);
                }
            }
            
            else if (type === 'ice') {
                // Icy sheen
                fill(220, 240, 255, 70);
                ellipse(cx - r * 0.2, cy - r * 0.25, r * 1.4);
                
                // Ice cracks
                stroke(255, 255, 255, 80);
                strokeWeight(1.5);
                for (let i = 0; i < 6; i++) {
                    let angle = (i * 1.1) % TWO_PI;
                    line(cx, cy, cx + cos(angle) * r * 0.85, cy + sin(angle) * r * 0.85);
                }
                noStroke();
            }
            
            else if (type === 'lava') {
                // Lava glow
                fill(255, 80, 30, 90);
                ellipse(cx, cy, r * 1.7);
                
                // Lava cracks
                stroke(255, 140, 0, 160);
                strokeWeight(2.5);
                for (let i = 0; i < 7; i++) {
                    let angle = p.details[i % p.details.length].angle || random(TWO_PI);
                    let len = random(r * 0.3, r * 0.75);
                    line(cx + cos(angle) * r * 0.3, cy + sin(angle) * r * 0.3,
                         cx + cos(angle) * len, cy + sin(angle) * len);
                }
                noStroke();
            }
            
            else if (type === 'desert') {
                // Sandy dunes
                stroke(255, 220, 150, 70);
                strokeWeight(3);
                for (let i = -1; i <= 1; i++) {
                    arc(cx, cy + i * 8, r * 1.6, r * 0.8, PI * 0.15, PI * 0.85);
                }
                noStroke();
            }
            
            // === ATMOSPHERE GLOW ===
            noFill();
            stroke(baseColor[0], baseColor[1], baseColor[2], 35);
            strokeWeight(r * 0.18);
            ellipse(cx, cy, r * 2.25);
            strokeWeight(1);
            noStroke();
            
            // === RINGS (for some planets) ===
            if (p.ring) {
                stroke(255, 255, 255, 75);
                strokeWeight(3);
                ellipse(cx, cy, r * 2.35, r * 0.55);
                
                // Ring shadow on planet
                fill(0, 0, 0, 60);
                ellipse(cx + 8, cy + 3, r * 1.95, r * 0.38);
                noStroke();
            }
            
            // === MOONS ===
            if (p.moons && p.moons.length > 0) {
                for (let moon of p.moons) {
                    let moonX = cx + cos(moon.angle) * (r * 1.6);
                    let moonY = cy + sin(moon.angle) * (r * 1.6);
                    
                    fill(230, 230, 240);
                    ellipse(moonX, moonY, moon.size);
                    
                    // Moon lighting
                    fill(255, 255, 255, 40);
                    ellipse(moonX - moon.size * 0.25, moonY - moon.size * 0.25, moon.size * 0.6);
                }
            }
        }
        
        function drawMainPlanet() {
            const cx = mainPlanet.x;
            const cy = mainPlanet.y;
            const r = mainPlanet.radius;
            
            // Deep space purple base
            fill(35, 25, 70);
            ellipse(cx, cy, r * 2);
            
            // Lighting
            fill(255, 255, 255, 30);
            ellipse(cx - r * 0.3, cy - r * 0.35, r * 1.5);
            
            fill(0, 0, 0, 50);
            ellipse(cx + r * 0.3, cy + r * 0.25, r * 1.45);
            
            // Surface craters and ridges
            stroke(60, 50, 90, 120);
            strokeWeight(2);
            for (let i = 0; i < 18; i++) {
                let angle = (i * 0.9) % TWO_PI;
                let dist = random(r * 0.4, r * 0.85);
                let x = cx + cos(angle) * dist;
                let y = cy + sin(angle) * dist * 0.85;
                let size = random(8, 22);
                fill(25, 20, 50, 160);
                ellipse(x, y, size);
            }
            noStroke();
            
            // Mountain ridges
            stroke(80, 70, 110, 90);
            strokeWeight(3);
            for (let i = 0; i < 5; i++) {
                let angle = i * 1.3;
                beginShape();
                for (let j = 0; j < 6; j++) {
                    let a = angle + j * 0.15;
                    let d = r * (0.55 + sin(j) * 0.15);
                    vertex(cx + cos(a) * d, cy + sin(a) * d * 0.85);
                }
                endShape();
            }
            noStroke();
            
            // Strong atmosphere layers
            noFill();
            stroke(120, 200, 255, 50);
            strokeWeight(18);
            ellipse(cx, cy, r * 2.22);
            
            stroke(180, 220, 255, 30);
            strokeWeight(32);
            ellipse(cx, cy, r * 2.35);
            strokeWeight(1);
            noStroke();
            
            // Horizon glow
            fill(100, 180, 255, 18);
            ellipse(cx, cy + r * 0.15, r * 2.05, r * 1.1);
        }
        
        // ==================== SETUP & DRAW ====================
        
        function setup() {
            createCanvas(900, 700);
            
            // Stars
            for (let i = 0; i < 220; i++) {
                stars.push({
                    x: random(width),
                    y: random(height),
                    size: random(1, 3.8),
                    brightness: random(160, 255)
                });
            }
            
            // === REALISTIC BACKGROUND PLANETS ===
            planets = [];
            for (let i = 0; i < 6; i++) {
                const type = PLANET_TYPES[floor(random(PLANET_TYPES.length))];
                const size = random(38, 82);
                
                let planet = {
                    x: random(90, width - 90),
                    y: random(70, height - 110),
                    size: size,
                    type: type,
                    ring: random() > 0.65,
                    hasStorm: type === 'gas' && random() > 0.5,
                    moons: [],
                    color: getPlanetColor(type),
                    details: []
                };
                
                // Generate craters / details
                const detailCount = type === 'rocky' ? 7 : (type === 'lava' ? 6 : 4);
                for (let j = 0; j < detailCount; j++) {
                    planet.details.push({
                        x: random(-size * 0.6, size * 0.6),
                        y: random(-size * 0.6, size * 0.6),
                        size: random(4, 12),
                        angle: random(TWO_PI)
                    });
                }
                
                // Add moons to some planets
                if (random() > 0.55) {
                    const moonCount = floor(random(1, 3));
                    for (let m = 0; m < moonCount; m++) {
                        planet.moons.push({
                            angle: random(TWO_PI),
                            size: random(5, 11),
                            speed: random(0.008, 0.018)
                        });
                    }
                }
                
                planets.push(planet);
            }
            
            // Main planet
            window.mainPlanet = {
                x: width/2,
                y: height/2 + 40,
                radius: 220
            };
        }
        
        function getPlanetColor(type) {
            if (type === 'rocky') return [random(90,140), random(80,130), random(110,160)];
            if (type === 'gas') return [random(140,200), random(130,190), random(160,220)];
            if (type === 'ice') return [random(180,230), random(200,240), random(230,255)];
            if (type === 'lava') return [random(130,180), random(40,90), random(30,70)];
            if (type === 'desert') return [random(200,240), random(170,210), random(100,150)];
            return [150, 150, 180];
        }
        
        function draw() {
            background(4, 0, 22);
            
            // Stars with twinkling
            for (let star of stars) {
                fill(star.brightness);
                noStroke();
                ellipse(star.x, star.y, star.size);
                if (frameCount % 35 < 6) {
                    fill(255, 255, 255, 70);
                    ellipse(star.x, star.y, star.size * 2.8);
                }
            }
            
            // Draw realistic background planets
            for (let p of planets) {
                // Update moon angles
                if (p.moons) {
                    for (let moon of p.moons) {
                        moon.angle += moon.speed;
                    }
                }
                drawRealisticPlanet(p);
            }
            
            // Draw beautiful main planet
            drawMainPlanet();
            
            // Draw houses
            for (let house of houses) {
                house.draw();
                house.update();
            }
            
            // Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) particles.splice(i, 1);
            }
            
            // Characters
            drawSofia();
            if (achlyAnger > 15 || selectedCharacter === 'achly') {
                drawAchly();
            }
            
            if (gameState === 'playing') {
                updateGame();
                drawUI();
            }
            
            if (achlyAnger > 55) {
                drawCreepyVignette();
            }
        }
        
        function drawSofia() {
            let x = mainPlanet.x - 140;
            let y = mainPlanet.y - 60;
            
            fill(255, 100, 200);
            rect(x - 12, y + 15, 24, 32);
            
            fill(255, 200, 50); rect(x - 11, y + 18, 22, 6);
            fill(100, 255, 150); rect(x - 11, y + 25, 22, 6);
            fill(100, 180, 255); rect(x - 11, y + 32, 22, 6);
            
            fill(255, 220, 185);
            ellipse(x, y, 26, 26);
            
            fill(30, 120, 255);
            ellipse(x - 6, y - 2, 6, 8);
            ellipse(x + 6, y - 2, 6, 8);
            fill(255);
            ellipse(x - 5, y - 3, 2, 3);
            ellipse(x + 7, y - 3, 2, 3);
            
            fill(80, 50, 30);
            arc(x, y - 2, 28, 28, PI, TWO_PI);
            
            fill(50, 255, 120);
            ellipse(x, y + 22, 8, 8);
            
            fill(30, 120, 220);
            rect(x - 10, y + 45, 20, 18);
            
            fill(0, 255, 200);
            textSize(11);
            textAlign(CENTER);
            text("SOFIA", x, y + 75);
        }
        
        function drawAchly() {
            let anger = min(achlyAnger / 100, 1);
            let x = mainPlanet.x + 150;
            let y = mainPlanet.y - 50 - anger * 20;
            
            fill(220, 30, 60);
            rect(x - 11, y + 18, 22, 30);
            
            fill(255, 210, 180);
            ellipse(x, y, 24, 24);
            
            fill(20);
            arc(x, y, 26, 28, PI, TWO_PI);
            rect(x - 13, y - 5, 26, 18);
            
            fill(255, 50, 50);
            rect(x - 8, y - 4, 5, 3);
            rect(x + 3, y - 4, 5, 3);
            
            fill(200, 230, 255);
            beginShape();
            vertex(x - 14, y + 8);
            vertex(x - 10, y + 14);
            vertex(x - 14, y + 20);
            vertex(x - 18, y + 14);
            endShape(CLOSE);
            
            fill(255, 140, 0);
            rect(x - 9, y + 46, 18, 16);
            
            fill(255, 80, 80);
            textSize(11);
            textAlign(CENTER);
            text("ACHLY", x, y + 75);
            
            if (anger > 0.4) {
                stroke(255, 0, 0, 100 + anger * 80);
                noFill();
                ellipse(x, y + 20, 70 + anger * 40);
                noStroke();
            }
        }
        
        function drawCreepyVignette() {
            for (let i = 0; i < 8; i++) {
                fill(30, 0, 0, 18);
                ellipse(width/2, height/2, width * 1.4 - i * 40, height * 1.4 - i * 40);
            }
            
            if (frameCount % 60 < 30) {
                fill(255, 0, 50, 120);
                textSize(14);
                textAlign(CENTER);
                text("SHE'S GETTING ANGRY...", width/2, 80);
            }
        }
        
        function updateGame() {
            for (let i = houses.length - 1; i >= 0; i--) {
                if (houses[i].health <= 0) {
                    for (let j = 0; j < 12; j++) {
                        particles.push(new Particle(houses[i].x, houses[i].y, 'destroy'));
                    }
                    houses.splice(i, 1);
                }
            }
            
            let now = millis();
            let destroyInterval = max(1800 - achlyAnger * 12, 450);
            
            if (now - lastDestroyTime > destroyInterval && houses.length > 0) {
                let targetIndex = floor(random(houses.length));
                let target = houses[targetIndex];
                
                if (selectedCharacter === 'achly' || random() < 0.7) {
                    target.health -= random(35, 70);
                    for (let j = 0; j < 8; j++) {
                        particles.push(new Particle(target.x, target.y, 'destroy'));
                    }
                }
                
                lastDestroyTime = now;
                achlyAnger = min(achlyAnger + 1.5, 100);
            }
            
            let beautifulHouses = houses.filter(h => h.isBeautiful).length;
            let requiredHouses = min(3 + Math.floor(level / 3), 12);
            
            document.getElementById('houses-left').innerHTML = 
                `Houses: ${beautifulHouses}/${requiredHouses}`;
            
            if (beautifulHouses >= requiredHouses) {
                levelComplete();
            }
            
            if (houses.length < requiredHouses * 0.3 && level > 1) {
                gameOver();
            }
        }
        
        function drawUI() {
            document.getElementById('level-num').innerHTML = level;
            
            if (achlyAnger > 25) {
                fill(255, 50, 50, 150);
                textSize(10);
                textAlign(LEFT);
                text("ACHLY ANGER: " + Math.floor(achlyAnger) + "%", 30, height - 30);
            }
        }
        
        function selectCharacter(char) {
            selectedCharacter = char;
            document.querySelectorAll('.char-card').forEach(el => el.style.boxShadow = 'none');
            let card = document.querySelector(char === 'sofia' ? '.sofia' : '.achly');
            if (card) card.style.boxShadow = '0 0 25px ' + (char === 'sofia' ? '#00ffcc' : '#ff3366');
        }
        
        function startGame() {
            gameState = 'playing';
            level = 1;
            houses = [];
            particles = [];
            achlyAnger = 0;
            
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('level-display').style.display = 'block';
            
            spawnInitialHouses();
        }
        
        function spawnInitialHouses() {
            houses = [];
            let count = min(2 + Math.floor(level / 4), 6);
            
            for (let i = 0; i < count; i++) {
                let angle = random(TWO_PI);
                let dist = random(60, mainPlanet.radius - 30);
                let x = mainPlanet.x + cos(angle) * dist;
                let y = mainPlanet.y + sin(angle) * dist * 0.6 + 30;
                
                let isBeautiful = selectedCharacter === 'sofia' || random() > 0.4;
                houses.push(new House(x, y, isBeautiful));
            }
        }
        
        function buildHouse() {
            if (gameState !== 'playing') return;
            
            let angle = random(TWO_PI);
            let dist = random(50, mainPlanet.radius - 25);
            let x = mainPlanet.x + cos(angle) * dist;
            let y = mainPlanet.y + sin(angle) * dist * 0.55 + 35;
            
            let house = new House(x, y, true);
            houses.push(house);
            
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(x, y, 'build'));
            }
            
            if (selectedCharacter === 'sofia') {
                achlyAnger = max(achlyAnger - 8, 0);
            }
        }
        
        function destroyHouse() {
            if (gameState !== 'playing' || houses.length === 0) return;
            
            let idx = floor(random(houses.length));
            let target = houses[idx];
            
            target.health -= 80;
            
            for (let i = 0; i < 10; i++) {
                particles.push(new Particle(target.x, target.y, 'destroy'));
            }
            
            achlyAnger = min(achlyAnger + 12, 100);
        }
        
        function mousePressed() {
            if (gameState !== 'playing') return;
            
            let d = dist(mouseX, mouseY, mainPlanet.x, mainPlanet.y);
            if (d < mainPlanet.radius - 10) {
                if (selectedCharacter === 'sofia') {
                    let house = new House(mouseX, mouseY, true);
                    houses.push(house);
                    for (let i = 0; i < 12; i++) {
                        particles.push(new Particle(mouseX, mouseY, 'build'));
                    }
                    achlyAnger = max(achlyAnger - 5, 0);
                } else {
                    for (let i = houses.length - 1; i >= 0; i--) {
                        if (dist(mouseX, mouseY, houses[i].x, houses[i].y) < 35) {
                            houses[i].health -= 90;
                            for (let j = 0; j < 8; j++) {
                                particles.push(new Particle(houses[i].x, houses[i].y, 'destroy'));
                            }
                            break;
                        }
                    }
                    achlyAnger = min(achlyAnger + 7, 100);
                }
            }
        }
        
        function levelComplete() {
            level++;
            achlyAnger = max(achlyAnger - 25, 0);
            
            if (level > 100) {
                winGame();
                return;
            }
            
            particles = [];
            spawnInitialHouses();
            
            if (level % 10 === 0) {
                achlyAnger += 15;
            }
        }
        
        function gameOver() {
            gameState = 'gameover';
            document.getElementById('game-ui').style.display = 'none';
            
            fill(255, 50, 50);
            textSize(32);
            textAlign(CENTER);
            text("ACHLY WINS...", width/2, height/2);
            textSize(16);
            text("The planet is in ruins...", width/2, height/2 + 50);
            
            setTimeout(() => {
                document.getElementById('menu').style.display = 'block';
                document.getElementById('level-display').style.display = 'none';
                gameState = 'menu';
            }, 2800);
        }
        
        function winGame() {
            gameState = 'win';
            document.getElementById('game-ui').style.display = 'none';
            
            fill(0, 255, 180);
            textSize(28);
            textAlign(CENTER);
            text("YOU WON THE PLANET!", width/2, height/2);
            textSize(16);
            text("You can build whatever you want now ✨", width/2, height/2 + 50);
            
            setTimeout(() => {
                document.getElementById('menu').style.display = 'block';
                document.getElementById('level-display').style.display = 'none';
                gameState = 'menu';
            }, 4000);
        }
        
        function keyPressed() {
            if (gameState === 'playing') {
                if (key === 'b' || key === 'B') buildHouse();
                if (key === 'd' || key === 'D') destroyHouse();
                if (key === 'r' || key === 'R') {
                    houses = [];
                    spawnInitialHouses();
                }
            }
            
            if (key === ' ' && gameState === 'menu') {
                startGame();
            }
        }
        
        setInterval(() => {
            if (gameState === 'playing') {
                achlyAnger = min(achlyAnger + 0.8, 100);
            }
        }, 2200);
    </script>
</body>
</html>
