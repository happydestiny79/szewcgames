<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Construct in Space ✨</title>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
        
        body {
            margin: 0;
            background: #0a001f;
            color: #fff;
            font-family: 'Press Start 2P', system-ui;
            overflow: hidden;
        }
        
        canvas {
            display: block;
            border: 8px solid #ff00aa;
            border-image: linear-gradient(#00f3ff, #ff00aa) 1;
        }
        
        .ui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 0, 31, 0.85);
            padding: 15px 30px;
            border: 4px solid #00f3ff;
            border-radius: 8px;
            text-align: center;
            z-index: 100;
        }
        
        .title {
            font-size: 28px;
            margin: 0 0 10px 0;
            background: linear-gradient(90deg, #00f3ff, #ff00aa, #00f3ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px #00f3ff;
        }
        
        button {
            background: #ff00aa;
            color: white;
            border: 4px solid #00f3ff;
            padding: 12px 24px;
            font-family: 'Press Start 2P', system-ui;
            font-size: 14px;
            cursor: pointer;
            margin: 8px;
            transition: all 0.2s;
        }
        
        button:hover {
            background: #00f3ff;
            color: #0a001f;
            transform: scale(1.1);
        }
        
        .character-select {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
        }
        
        .char-card {
            background: rgba(255,255,255,0.1);
            border: 4px solid;
            padding: 15px;
            width: 160px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .char-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 30px currentColor;
        }
        
        .sofia { border-color: #00ffcc; }
        .achly { border-color: #ff3366; }
        
        .level {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 18px;
            background: rgba(0,0,0,0.6);
            padding: 8px 20px;
            border: 3px solid #ff00aa;
        }
        
        .creepy {
            animation: creepyShake 0.5s infinite;
        }
    </style>
</head>
<body>
    <div id="ui" class="ui">
        <h1 class="title">CONSTRUCT IN SPACE</h1>
        <p style="margin: 5px 0; font-size: 12px;">100 Levels • Build vs Destroy</p>
        
        <div id="menu">
            <button onclick="startGame()">START BUILDING</button>
            <div class="character-select">
                <div onclick="selectCharacter('sofia')" class="char-card sofia">
                    <div style="font-size:22px; margin-bottom:8px;">🌈 SOFIA</div>
                    <div style="font-size:10px; line-height:1.3;">
                        Blue eyes<br>
                        Rainbow shirt<br>
                        Makes things<br>
                        BEAUTIFUL
                    </div>
                </div>
                <div onclick="selectCharacter('achly')" class="char-card achly">
                    <div style="font-size:22px; margin-bottom:8px;">💎 ACHLY</div>
                    <div style="font-size:10px; line-height:1.3;">
                        Black hair<br>
                        Diamond earring<br>
                        Destroys houses<br>
                        GETS MAD
                    </div>
                </div>
            </div>
        </div>
        
        <div id="game-ui" style="display:none;">
            <div style="display:flex; gap:15px; justify-content:center; margin-top:10px;">
                <button onclick="buildHouse()" style="background:#00ffcc; color:#0a001f;">BUILD HOUSE</button>
                <button onclick="destroyHouse()" style="background:#ff3366;">DESTROY</button>
            </div>
            <p style="margin:8px 0 0 0; font-size:11px;">Click on planet to place • Protect your houses!</p>
        </div>
    </div>
    
    <div id="level-display" class="level" style="display:none;">
        LEVEL <span id="level-num">1</span>
        <div id="houses-left" style="font-size:11px; margin-top:4px;">Houses: 0/5</div>
    </div>

    <script>
        let gameState = 'menu';
        let selectedCharacter = 'sofia';
        let level = 1;
        let houses = [];
        let stars = [];
        let planets = [];
        let particles = [];
        let achlyAnger = 0;
        let score = 0;
        let lastDestroyTime = 0;
        
        class House {
            constructor(x, y, isBeautiful = true) {
                this.x = x;
                this.y = y;
                this.isBeautiful = isBeautiful;
                this.health = isBeautiful ? 100 : 60;
                this.size = isBeautiful ? 28 : 22;
                this.color = isBeautiful ? 
                    [random(150,255), random(200,255), random(150,255)] : 
                    [random(80,120), random(40,80), random(40,80)];
                this.beautyLevel = isBeautiful ? random(2, 4) : 1;
            }
            
            draw() {
                push();
                translate(this.x, this.y);
                
                // Base
                fill(this.color[0], this.color[1], this.color[2]);
                rect(-this.size/2, -this.size/2, this.size, this.size * 0.8);
                
                // Roof
                if (this.isBeautiful) {
                    fill(255, 200, 50);
                    triangle(-this.size/2 - 5, -this.size/2, 
                             this.size/2 + 5, -this.size/2, 
                             0, -this.size/2 - 18);
                    
                    // Rainbow decorations
                    for (let i = 0; i < this.beautyLevel; i++) {
                        stroke(255, 100 + i*40, 200);
                        strokeWeight(3);
                        arc(-8 + i*6, -this.size/2 - 5, 12, 12, 0, PI);
                    }
                    noStroke();
                } else {
                    fill(60);
                    triangle(-this.size/2, -this.size/2, 
                             this.size/2, -this.size/2, 
                             0, -this.size/2 - 12);
                }
                
                // Windows
                fill(255, 255, 200);
                rect(-8, -this.size/4, 6, 6);
                rect(4, -this.size/4, 6, 6);
                
                // Door
                fill(40, 30, 20);
                rect(-4, this.size/8, 8, 12);
                
                // Creepy effect when Achly is mad
                if (achlyAnger > 40 && !this.isBeautiful) {
                    fill(255, 0, 0, 80);
                    ellipse(0, 0, this.size * 1.5);
                }
                
                pop();
            }
            
            update() {
                if (!this.isBeautiful && achlyAnger > 30) {
                    this.health -= 0.3;
                }
            }
        }
        
        class Particle {
            constructor(x, y, type = 'build') {
                this.x = x;
                this.y = y;
                this.vx = random(-3, 3);
                this.vy = random(-4, -1);
                this.life = type === 'build' ? 40 : 25;
                this.type = type;
                this.size = random(4, 9);
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.15;
                this.life--;
                this.size *= 0.96;
            }
            
            draw() {
                if (this.type === 'build') {
                    fill(0, 255, 200, this.life * 6);
                } else {
                    fill(255, 50, 50, this.life * 10);
                }
                noStroke();
                ellipse(this.x, this.y, this.size);
            }
        }
        
        function setup() {
            createCanvas(900, 700);
            
            // Generate stars
            for (let i = 0; i < 180; i++) {
                stars.push({
                    x: random(width),
                    y: random(height),
                    size: random(1, 3.5),
                    brightness: random(150, 255)
                });
            }
            
            // Generate planets in background
            for (let i = 0; i < 5; i++) {
                planets.push({
                    x: random(100, width - 100),
                    y: random(80, height - 120),
                    size: random(35, 75),
                    color: [random(80,180), random(60,160), random(120,220)],
                    ring: random() > 0.6
                });
            }
            
            // Main planet (play area)
            window.mainPlanet = {
                x: width/2,
                y: height/2 + 40,
                radius: 220
            };
        }
        
        function draw() {
            background(5, 0, 25);
            
            // Draw distant stars
            for (let star of stars) {
                fill(star.brightness);
                noStroke();
                ellipse(star.x, star.y, star.size);
                
                // Twinkle
                if (frameCount % 40 < 8) {
                    fill(255, 255, 255, 80);
                    ellipse(star.x, star.y, star.size * 2.5);
                }
            }
            
            // Draw background planets
            for (let p of planets) {
                fill(p.color[0], p.color[1], p.color[2], 180);
                ellipse(p.x, p.y, p.size);
                
                if (p.ring) {
                    stroke(255, 255, 255, 60);
                    noFill();
                    ellipse(p.x, p.y, p.size * 1.6, p.size * 0.4);
                    noStroke();
                }
            }
            
            // Draw main planet surface
            fill(40, 30, 80);
            ellipse(mainPlanet.x, mainPlanet.y, mainPlanet.radius * 2);
            
            // Planet atmosphere glow
            noFill();
            stroke(100, 200, 255, 40);
            strokeWeight(12);
            ellipse(mainPlanet.x, mainPlanet.y, mainPlanet.radius * 2.15);
            strokeWeight(1);
            
            // Ground details
            fill(60, 50, 100);
            arc(mainPlanet.x, mainPlanet.y + 60, mainPlanet.radius * 1.9, 140, PI, TWO_PI);
            
            // Draw houses
            for (let house of houses) {
                house.draw();
                house.update();
            }
            
            // Draw particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) particles.splice(i, 1);
            }
            
            // Draw characters
            drawSofia();
            if (achlyAnger > 15 || selectedCharacter === 'achly') {
                drawAchly();
            }
            
            // Game logic
            if (gameState === 'playing') {
                updateGame();
                drawUI();
            }
            
            // Creepy vignette when Achly is very mad
            if (achlyAnger > 55) {
                drawCreepyVignette();
            }
        }
        
        function drawSofia() {
            let x = mainPlanet.x - 140;
            let y = mainPlanet.y - 60;
            
            // Body - rainbow shirt
            fill(255, 100, 200);
            rect(x - 12, y + 15, 24, 32);
            
            // Rainbow stripes
            fill(255, 200, 50); rect(x - 11, y + 18, 22, 6);
            fill(100, 255, 150); rect(x - 11, y + 25, 22, 6);
            fill(100, 180, 255); rect(x - 11, y + 32, 22, 6);
            
            // Head
            fill(255, 220, 185);
            ellipse(x, y, 26, 26);
            
            // Blue eyes
            fill(30, 120, 255);
            ellipse(x - 6, y - 2, 6, 8);
            ellipse(x + 6, y - 2, 6, 8);
            fill(255);
            ellipse(x - 5, y - 3, 2, 3);
            ellipse(x + 7, y - 3, 2, 3);
            
            // Brown hair
            fill(80, 50, 30);
            arc(x, y - 2, 28, 28, PI, TWO_PI);
            
            // Green necklace
            fill(50, 255, 120);
            ellipse(x, y + 22, 8, 8);
            
            // Blue skirt
            fill(30, 120, 220);
            rect(x - 10, y + 45, 20, 18);
            
            // Label
            fill(0, 255, 200);
            textSize(11);
            textAlign(CENTER);
            text("SOFIA", x, y + 75);
        }
        
        function drawAchly() {
            let anger = min(achlyAnger / 100, 1);
            let x = mainPlanet.x + 150;
            let y = mainPlanet.y - 50 - anger * 20;
            
            // Red shirt
            fill(220, 30, 60);
            rect(x - 11, y + 18, 22, 30);
            
            // Head
            fill(255, 210, 180);
            ellipse(x, y, 24, 24);
            
            // Black hair
            fill(20);
            arc(x, y, 26, 28, PI, TWO_PI);
            rect(x - 13, y - 5, 26, 18);
            
            // Angry eyes
            fill(255, 50, 50);
            rect(x - 8, y - 4, 5, 3);
            rect(x + 3, y - 4, 5, 3);
            
            // Diamond earring
            fill(200, 230, 255);
            beginShape();
            vertex(x - 14, y + 8);
            vertex(x - 10, y + 14);
            vertex(x - 14, y + 20);
            vertex(x - 18, y + 14);
            endShape(CLOSE);
            
            // Orange skirt
            fill(255, 140, 0);
            rect(x - 9, y + 46, 18, 16);
            
            // Label
            fill(255, 80, 80);
            textSize(11);
            textAlign(CENTER);
            text("ACHLY", x, y + 75);
            
            // Anger aura
            if (anger > 0.4) {
                stroke(255, 0, 0, 100 + anger * 80);
                noFill();
                ellipse(x, y + 20, 70 + anger * 40);
                noStroke();
            }
        }
        
        function drawCreepyVignette() {
            for (let i = 0; i < 8; i++) {
                fill(30, 0, 0, 18);
                ellipse(width/2, height/2, width * 1.4 - i * 40, height * 1.4 - i * 40);
            }
            
            // Creepy text
            if (frameCount % 60 < 30) {
                fill(255, 0, 50, 120);
                textSize(14);
                textAlign(CENTER);
                text("SHE'S GETTING ANGRY...", width/2, 80);
            }
        }
        
        function updateGame() {
            // Remove dead houses
            for (let i = houses.length - 1; i >= 0; i--) {
                if (houses[i].health <= 0) {
                    // Death particles
                    for (let j = 0; j < 12; j++) {
                        particles.push(new Particle(houses[i].x, houses[i].y, 'destroy'));
                    }
                    houses.splice(i, 1);
                }
            }
            
            // Achly's destruction AI
            let now = millis();
            let destroyInterval = max(1800 - achlyAnger * 12, 450);
            
            if (now - lastDestroyTime > destroyInterval && houses.length > 0) {
                // Achly targets a random house
                let targetIndex = floor(random(houses.length));
                let target = houses[targetIndex];
                
                // Destroy or damage
                if (selectedCharacter === 'achly' || random() < 0.7) {
                    target.health -= random(35, 70);
                    
                    // Destruction particles
                    for (let j = 0; j < 8; j++) {
                        particles.push(new Particle(target.x, target.y, 'destroy'));
                    }
                }
                
                lastDestroyTime = now;
                achlyAnger = min(achlyAnger + 1.5, 100);
            }
            
            // Check win/lose conditions
            let beautifulHouses = houses.filter(h => h.isBeautiful).length;
            let requiredHouses = min(3 + Math.floor(level / 3), 12);
            
            document.getElementById('houses-left').innerHTML = 
                `Houses: ${beautifulHouses}/${requiredHouses}`;
            
            if (beautifulHouses >= requiredHouses) {
                // Level complete!
                levelComplete();
            }
            
            // Game over if too many houses destroyed
            if (houses.length < requiredHouses * 0.3 && level > 1) {
                gameOver();
            }
            
            // Increase difficulty
            if (achlyAnger > 70 && level < 100) {
                // Creepy mode intensifies
            }
        }
        
        function drawUI() {
            // Level display
            document.getElementById('level-num').innerHTML = level;
            
            // Anger meter (subtle)
            if (achlyAnger > 25) {
                fill(255, 50, 50, 150);
                textSize(10);
                textAlign(LEFT);
                text("ACHLY ANGER: " + Math.floor(achlyAnger) + "%", 30, height - 30);
            }
        }
        
        function selectCharacter(char) {
            selectedCharacter = char;
            
            // Highlight selection
            document.querySelectorAll('.char-card').forEach(el => {
                el.style.boxShadow = 'none';
            });
            
            let card = document.querySelector(char === 'sofia' ? '.sofia' : '.achly');
            if (card) card.style.boxShadow = '0 0 25px ' + (char === 'sofia' ? '#00ffcc' : '#ff3366');
        }
        
        function startGame() {
            gameState = 'playing';
            level = 1;
            houses = [];
            particles = [];
            achlyAnger = 0;
            score = 0;
            
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('level-display').style.display = 'block';
            
            // Spawn initial houses
            spawnInitialHouses();
        }
        
        function spawnInitialHouses() {
            houses = [];
            let count = min(2 + Math.floor(level / 4), 6);
            
            for (let i = 0; i < count; i++) {
                let angle = random(TWO_PI);
                let dist = random(60, mainPlanet.radius - 30);
                let x = mainPlanet.x + cos(angle) * dist;
                let y = mainPlanet.y + sin(angle) * dist * 0.6 + 30;
                
                let isBeautiful = selectedCharacter === 'sofia' || random() > 0.4;
                houses.push(new House(x, y, isBeautiful));
            }
        }
        
        function buildHouse() {
            if (gameState !== 'playing') return;
            
            // Place a beautiful house near center of planet
            let angle = random(TWO_PI);
            let dist = random(50, mainPlanet.radius - 25);
            let x = mainPlanet.x + cos(angle) * dist;
            let y = mainPlanet.y + sin(angle) * dist * 0.55 + 35;
            
            let house = new House(x, y, true);
            houses.push(house);
            
            // Beautiful particles
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(x, y, 'build'));
            }
            
            // Sofia improves things
            if (selectedCharacter === 'sofia') {
                achlyAnger = max(achlyAnger - 8, 0);
            }
        }
        
        function destroyHouse() {
            if (gameState !== 'playing' || houses.length === 0) return;
            
            // Achly destroys a random house
            let idx = floor(random(houses.length));
            let target = houses[idx];
            
            target.health -= 80;
            
            for (let i = 0; i < 10; i++) {
                particles.push(new Particle(target.x, target.y, 'destroy'));
            }
            
            achlyAnger = min(achlyAnger + 12, 100);
        }
        
        function mousePressed() {
            if (gameState !== 'playing') return;
            
            // Click to build on planet surface
            let d = dist(mouseX, mouseY, mainPlanet.x, mainPlanet.y);
            if (d < mainPlanet.radius - 10) {
                if (selectedCharacter === 'sofia') {
                    let house = new House(mouseX, mouseY, true);
                    houses.push(house);
                    
                    for (let i = 0; i < 12; i++) {
                        particles.push(new Particle(mouseX, mouseY, 'build'));
                    }
                    achlyAnger = max(achlyAnger - 5, 0);
                } else {
                    // Achly mode: click to destroy
                    for (let i = houses.length - 1; i >= 0; i--) {
                        if (dist(mouseX, mouseY, houses[i].x, houses[i].y) < 35) {
                            houses[i].health -= 90;
                            for (let j = 0; j < 8; j++) {
                                particles.push(new Particle(houses[i].x, houses[i].y, 'destroy'));
                            }
                            break;
                        }
                    }
                    achlyAnger = min(achlyAnger + 7, 100);
                }
            }
        }
        
        function levelComplete() {
            level++;
            achlyAnger = max(achlyAnger - 25, 0);
            
            if (level > 100) {
                winGame();
                return;
            }
            
            // Clear some particles
            particles = [];
            
            // Add more houses for next level
            spawnInitialHouses();
            
            // Show level up message
            fill(0, 255, 200);
            textSize(28);
            textAlign(CENTER);
            text("LEVEL " + level + "!", width/2, height/2 - 80);
            
            // Make it creepier every 10 levels
            if (level % 10 === 0) {
                achlyAnger += 15;
            }
        }
        
        function gameOver() {
            gameState = 'gameover';
            document.getElementById('game-ui').style.display = 'none';
            
            fill(255, 50, 50);
            textSize(32);
            textAlign(CENTER);
            text("ACHLY WINS...", width/2, height/2);
            
            textSize(16);
            text("The planet is in ruins...", width/2, height/2 + 50);
            
            setTimeout(() => {
                document.getElementById('menu').style.display = 'block';
                document.getElementById('level-display').style.display = 'none';
                gameState = 'menu';
            }, 2800);
        }
        
        function winGame() {
            gameState = 'win';
            document.getElementById('game-ui').style.display = 'none';
            
            fill(0, 255, 180);
            textSize(28);
            textAlign(CENTER);
            text("YOU WON THE PLANET!", width/2, height/2);
            textSize(16);
            text("You can build whatever you want now ✨", width/2, height/2 + 50);
            
            setTimeout(() => {
                document.getElementById('menu').style.display = 'block';
                document.getElementById('level-display').style.display = 'none';
                gameState = 'menu';
            }, 4000);
        }
        
        // Keyboard shortcuts
        function keyPressed() {
            if (gameState === 'playing') {
                if (key === 'b' || key === 'B') buildHouse();
                if (key === 'd' || key === 'D') destroyHouse();
                if (key === 'r' || key === 'R') {
                    houses = [];
                    spawnInitialHouses();
                }
            }
            
            if (key === ' ' && gameState === 'menu') {
                startGame();
            }
        }
        
        // Auto-increase anger over time (creepy progression)
        setInterval(() => {
            if (gameState === 'playing') {
                achlyAnger = min(achlyAnger + 0.8, 100);
            }
        }, 2200);
    </script>
</body>
</html>
