<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book Castle: Gabriel's Quest - Save the 3 Gold Books</title>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
  <style>
    body { margin: 0; background: #1a0f00; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: monospace; color: #ffcc00; }
    canvas { border: 4px solid #ffcc00; box-shadow: 0 0 20px #ffaa00; }
    .info { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 10px; border: 2px solid #ffcc00; max-width: 280px; }
    .info h3 { margin: 0 0 8px; color: #ffdd66; }
    .gold { color: #ffcc00; font-weight: bold; }
  </style>
</head>
<body>
  <div class="info">
    <h3>📚 GABRIEL &amp; THE BOOK CASTLE</h3>
    <p><strong>Save the 3 Gold Books!</strong></p>
    <p>Arrow Keys: Up / Down / Left / Right</p>
    <p>Z or Click: Book Sword Hit</p>
    <p>Collect the 3 glowing Gold Books</p>
    <p>Defeat Evil Gabe &amp; the monsters!</p>
    <p>Books Saved: <span id="books">0</span>/3 | Health: <span id="health">100</span></p>
    <p>Monsters: <span id="monsters">0</span></p>
  </div>
  <script>
    let player = { x: 200, y: 300, health: 100 };
    let enemies = [];
    let projectiles = [];
    let goldBooks = [];
    let particles = [];
    let score = 0;
    let gameOver = false;
    let level = 1;
    let evilGabe = null;

    function setup() {
      createCanvas(900, 600);
      spawnEnemies();
      spawnGoldBooks();
    }

    function spawnEnemies() {
      enemies = [];
      let count = 5 + level * 2;
      for (let i = 0; i < count; i++) {
        enemies.push({
          x: random(500, 850),
          y: random(100, 500),
          health: 30 + level * 8,
          type: random() > 0.5 ? 'monster' : 'bookbeast',
          vx: random(-1, 1),
          vy: random(-1, 1)
        });
      }
      // Evil Gabe as mini-boss
      if (level >= 2) {
        evilGabe = {
          x: 700, y: 300, health: 120, 
          robotArms: true
        };
      }
    }

    function spawnGoldBooks() {
      goldBooks = [];
      for (let i = 0; i < 3; i++) {
        goldBooks.push({
          x: random(100, 400),
          y: random(150, 450),
          collected: false
        });
      }
    }

    function draw() {
      // Book Castle background
      background(40, 25, 10);
      
      // Bookshelf walls
      fill(80, 50, 20);
      rect(0, 0, width, 80);
      rect(0, height - 60, width, 60);
      
      // Stacked books effect
      for (let i = 0; i < 12; i++) {
        fill(150 + random(-20,20), 100 + random(-30,30), 40);
        rect(20 + i * 75, 10, 60, 55);
        fill(200, 180, 100);
        rect(25 + i * 75, 15, 50, 8);
      }
      for (let i = 0; i < 12; i++) {
        fill(120, 80, 30);
        rect(20 + i * 75, height - 50, 60, 40);
      }
      
      // Castle floor
      fill(60, 40, 20);
      rect(0, 80, width, height - 140);
      
      // Book tile pattern
      stroke(90, 60, 25);
      strokeWeight(1);
      for (let x = 0; x < width; x += 80) {
        for (let y = 90; y < height - 70; y += 60) {
          rect(x, y, 80, 60);
        }
      }
      noStroke();

      // Draw gold books
      for (let book of goldBooks) {
        if (!book.collected) {
          fill(255, 215, 0);
          rect(book.x, book.y, 35, 45);
          fill(255, 240, 150);
          rect(book.x + 4, book.y + 5, 27, 8);
          // Glow
          fill(255, 220, 50, 80);
          ellipse(book.x + 17, book.y + 22, 50, 55);
        }
      }

      // Draw player (Gabriel - book wizard kid)
      push();
      translate(player.x, player.y);
      
      // Body
      fill(30, 60, 140);
      rect(-15, -30, 30, 45);
      // Head
      fill(255, 220, 180);
      ellipse(0, -45, 28, 28);
      // Book backpack
      fill(200, 180, 80);
      rect(-18, -10, 36, 25);
      fill(255, 215, 0);
      rect(-14, -6, 28, 17);
      
      // Eyes
      fill(0);
      ellipse(-6, -48, 5, 5);
      ellipse(6, -48, 5, 5);
      
      pop();

      // Draw Evil Gabe if present
      if (evilGabe && evilGabe.health > 0) {
        push();
        translate(evilGabe.x, evilGabe.y);
        fill(80, 20, 20);
        rect(-20, -35, 40, 55); // Body
        fill(40, 40, 40);
        rect(-22, -30, 18, 40); // Left robot arm
        rect(4, -30, 18, 40);   // Right robot arm
        fill(255, 220, 180);
        ellipse(0, -50, 26, 26); // Head
        fill(0, 200, 0);
        rect(-8, -55, 16, 6); // Evil eyes glow
        pop();
      }

      // Draw enemies (monsters & book beasts)
      for (let e of enemies) {
        if (e.health <= 0) continue;
        push();
        translate(e.x, e.y);
        
        if (e.type === 'monster') {
          fill(100, 180, 80);
          ellipse(0, 0, 28, 32);
          fill(0);
          ellipse(-8, -5, 6, 6);
          ellipse(8, -5, 6, 6);
          fill(200, 50, 50);
          rect(-12, 8, 24, 6); // mouth
        } else {
          // Book beast
          fill(150, 100, 50);
          rect(-14, -18, 28, 36);
          fill(255, 200, 50);
          rect(-10, -12, 20, 8);
          fill(0);
          ellipse(-5, 5, 4, 4);
          ellipse(5, 5, 4, 4);
        }
        pop();
      }

      // Draw projectiles (book blaster shots)
      for (let p of projectiles) {
        fill(255, 215, 0);
        ellipse(p.x, p.y, 12, 8);
        fill(255, 255, 200);
        ellipse(p.x, p.y, 6, 4);
      }

      // Particles for effects
      for (let pt of particles) {
        fill(pt.color || color(255, 220, 50, pt.alpha));
        ellipse(pt.x, pt.y, pt.size, pt.size);
      }

      // UI update
      document.getElementById('books').innerText = score;
      document.getElementById('health').innerText = player.health;
      document.getElementById('monsters').innerText = enemies.filter(e => e.health > 0).length;

      // Game logic
      if (!gameOver) {
        updateGame();
      } else {
        fill(255, 50, 50);
        textSize(48);
        textAlign(CENTER);
        text("GAME OVER", width/2, height/2);
        textSize(20);
        text("Press SPACE to restart", width/2, height/2 + 50);
      }
    }

    function updateGame() {
      // Player movement
      let speed = 4;
      if (keyIsDown(LEFT_ARROW)) player.x -= speed;
      if (keyIsDown(RIGHT_ARROW)) player.x += speed;
      if (keyIsDown(UP_ARROW)) player.y -= speed;
      if (keyIsDown(DOWN_ARROW)) player.y += speed;
      
      player.x = constrain(player.x, 30, width - 30);
      player.y = constrain(player.y, 100, height - 80);

      // Enemy AI
      for (let e of enemies) {
        if (e.health <= 0) continue;
        let dx = player.x - e.x;
        let dy = player.y - e.y;
        let dist = sqrt(dx*dx + dy*dy);
        if (dist > 5) {
          e.x += dx / dist * 1.2;
          e.y += dy / dist * 1.2;
        }
        // Simple collision with player
        if (dist < 25) {
          player.health -= 0.8;
          if (player.health <= 0) gameOver = true;
        }
      }

      // Evil Gabe AI
      if (evilGabe && evilGabe.health > 0) {
        let dx = player.x - evilGabe.x;
        let dy = player.y - evilGabe.y;
        let d = sqrt(dx*dx + dy*dy);
        evilGabe.x += dx / d * 0.8;
        evilGabe.y += dy / d * 0.8;
        if (d < 35) {
          player.health -= 1.5;
          if (player.health <= 0) gameOver = true;
        }
      }

      // Projectiles
      for (let i = projectiles.length - 1; i >= 0; i--) {
        let p = projectiles[i];
        p.x += p.vx;
        p.y += p.vy;
        
        // Hit enemies
        for (let e of enemies) {
          if (e.health > 0 && dist(p.x, p.y, e.x, e.y) < 18) {
            e.health -= 25;
            projectiles.splice(i, 1);
            createParticles(p.x, p.y, 8);
            break;
          }
        }
        
        // Hit Evil Gabe
        if (evilGabe && evilGabe.health > 0 && dist(p.x, p.y, evilGabe.x, evilGabe.y) < 22) {
          evilGabe.health -= 18;
          projectiles.splice(i, 1);
          createParticles(p.x, p.y, 12);
        }
        
        if (p.x < 0 || p.x > width || p.y < 0 || p.y > height) {
          projectiles.splice(i, 1);
        }
      }

      // Collect gold books
      for (let book of goldBooks) {
        if (!book.collected && dist(player.x, player.y, book.x, book.y) < 30) {
          book.collected = true;
          score++;
          createParticles(book.x, book.y, 20, [255, 215, 0]);
          if (score >= 3) {
            // Win condition
            fill(50, 255, 100);
            textSize(36);
            textAlign(CENTER);
            text("YOU SAVED THE GOLD BOOKS!", width/2, height/2);
            noLoop();
          }
        }
      }

      // Remove dead enemies
      enemies = enemies.filter(e => e.health > 0);

      // Spawn more if needed
      if (enemies.length < 3 && !gameOver) {
        enemies.push({
          x: random(600, 850),
          y: random(120, 480),
          health: 25 + level * 6,
          type: 'bookbeast',
          vx: 0, vy: 0
        });
      }

      // Particles
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].x += particles[i].vx || 0;
        particles[i].y += particles[i].vy || 0;
        particles[i].alpha = (particles[i].alpha || 200) - 12;
        if (particles[i].alpha <= 0) particles.splice(i, 1);
      }

      if (player.health <= 0) gameOver = true;
    }

    function createParticles(x, y, count, col) {
      for (let i = 0; i < count; i++) {
        particles.push({
          x: x + random(-10, 10),
          y: y + random(-10, 10),
          size: random(4, 9),
          alpha: 220,
          vx: random(-2, 2),
          vy: random(-2, 2),
          color: col ? color(col[0], col[1], col[2], 200) : null
        });
      }
    }

    function keyPressed() {
      if (gameOver && key === ' ') {
        // Restart
        player.health = 100;
        score = 0;
        gameOver = false;
        level = 1;
        evilGabe = null;
        projectiles = [];
        particles = [];
        spawnEnemies();
        spawnGoldBooks();
        loop();
        return;
      }
      
      if (key === 'z' || key === 'Z') {
        // Book Sword Hit
        for (let e of enemies) {
          if (dist(player.x, player.y, e.x, e.y) < 55) {
            e.health -= 40;
            createParticles(e.x, e.y, 6);
          }
        }
        if (evilGabe && dist(player.x, player.y, evilGabe.x, evilGabe.y) < 60) {
          evilGabe.health -= 30;
          createParticles(evilGabe.x, evilGabe.y, 10);
        }
      }
      
      if (key === 'x' || key === 'X') {
        // Book Blaster Shot
        let angle = atan2(mouseY - player.y, mouseX - player.x);
        projectiles.push({
          x: player.x,
          y: player.y,
          vx: cos(angle) * 7,
          vy: sin(angle) * 7
        });
        createParticles(player.x, player.y, 3);
      }
    }

    function mousePressed() {
      // Alternative shoot with mouse
      if (!gameOver) {
        let angle = atan2(mouseY - player.y, mouseX - player.x);
        projectiles.push({
          x: player.x,
          y: player.y,
          vx: cos(angle) * 7,
          vy: sin(angle) * 7
        });
      }
    }
  </script>
</body>
</html>
