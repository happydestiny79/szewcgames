<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Allyssa's Red Carpet ✨</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
  <style>
    body { font-family: 'Poppins', system_ui, sans-serif; }
    .heading { font-family: 'Playfair Display', Georgia, serif; }
    .game-container { box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4); }
  </style>
</head>
<body class="bg-zinc-950 text-white">
  <div class="max-w-2xl mx-auto">
    <div class="flex items-center justify-between px-6 pt-6 pb-4">
      <div>
        <h1 class="text-4xl heading font-bold tracking-tight">Allyssa's Red Carpet ✨</h1>
        <p class="text-purple-300 text-sm mt-1">Dress to impress • No villains • Pure fun</p>
      </div>
      <div class="text-right">
        <div class="text-xs text-zinc-400">Created for</div>
        <div class="font-semibold text-purple-400">Allyssa</div>
      </div>
    </div>

    <div class="game-container mx-4 rounded-3xl overflow-hidden border border-zinc-800 bg-zinc-900">
      <div id="game-container"></div>
    </div>

    <div class="px-6 py-4 text-center">
      <div class="flex justify-center gap-6 text-xs text-zinc-400">
        <div>👆 Tap buttons to change clothes</div>
        <div>✨ Get 5+ stars to win!</div>
      </div>
    </div>
  </div>

  <script>
    let gameState = 'dressup';
    let currentOutfit = { top: 0, bottom: 0, accessory: 0, hair: 0, special: 0 };
    let stars = 0;
    let prize = '';

    const outfits = {
      tops: ['Classic PJ Top', 'Sparkly PJ Top', 'Rainbow PJ Top', 'Heart PJ Top'],
      bottoms: ['Fuzzy PJ Pants', 'Star PJ Pants', 'Stripe PJ Pants', 'Polka PJ Shorts'],
      accessories: ['None', 'Golden Necklace', 'Sparkly Earrings', 'Cute Headband', 'Magic Bracelet'],
      hairs: ['Long Straight', 'Long Wavy', 'Long Curly', 'Long with Bows'],
      specials: ['None', 'Magic Slippers', 'Glowing Sash', 'Floating Tiara']
    };

    function setup() {
      let canvas = createCanvas(600, 720);
      canvas.parent('game-container');
    }

    function draw() {
      background(24, 24, 27);

      if (gameState === 'dressup') {
        drawDressUpScreen();
      } else if (gameState === 'secret') {
        drawSecretRoom();
      } else if (gameState === 'redcarpet') {
        drawRedCarpet();
      } else if (gameState === 'result') {
        drawResultScreen();
      }
    }

    function drawDressUpScreen() {
      fill(250);
      textSize(26);
      textAlign(CENTER);
      text('Dress Up Studio', width/2, 45);

      fill(200, 180, 255);
      textSize(13);
      text('Tap the colored buttons to change your look!', width/2, 68);

      drawCharacter(300, 310, 1.05);

      // Current outfit text
      fill(180);
      textSize(12);
      textAlign(LEFT);
      text('Top: ' + outfits.tops[currentOutfit.top], 60, 500);
      text('Bottom: ' + outfits.bottoms[currentOutfit.bottom], 60, 520);
      text('Accessory: ' + outfits.accessories[currentOutfit.accessory], 60, 540);
      text('Hair: ' + outfits.hairs[currentOutfit.hair], 320, 500);
      text('Special: ' + outfits.specials[currentOutfit.special], 320, 520);

      // BIG EASY BUTTONS
      drawBigButton(80, 570, '#7c3aed', '👕 TOP', () => { currentOutfit.top = (currentOutfit.top + 1) % outfits.tops.length; });
      drawBigButton(220, 570, '#db2777', '👖 BOTTOM', () => { currentOutfit.bottom = (currentOutfit.bottom + 1) % outfits.bottoms.length; });
      drawBigButton(360, 570, '#c026d3', '💎 ACCESSORY', () => { currentOutfit.accessory = (currentOutfit.accessory + 1) % outfits.accessories.length; });
      drawBigButton(500, 570, '#7c3aed', '💇 HAIR', () => { currentOutfit.hair = (currentOutfit.hair + 1) % outfits.hairs.length; });

      // Secret Room Button
      fill(129, 140, 248);
      rect(120, 620, 200, 36, 18);
      fill(255);
      textAlign(CENTER);
      textSize(14);
      text('🪄 Secret Room', 220, 644);

      // Red Carpet Button
      fill(190, 24, 49);
      rect(340, 620, 200, 36, 18);
      fill(255);
      textSize(14);
      text('🚶 Red Carpet!', 440, 644);
    }

    function drawBigButton(x, y, color, label, action) {
      fill(color);
      rect(x - 55, y, 110, 38, 12);
      fill(255);
      textAlign(CENTER);
      textSize(13);
      text(label, x, y + 25);
    }

    function drawCharacter(x, y, scale) {
      push();
      translate(x, y);
      scale(scale);

      // Shadow
      fill(0, 0, 0, 40);
      ellipse(0, 135, 85, 22);

      // Pajama Top
      let topColors = ['#c084fc', '#f472b6', '#fb923c', '#a78bfa'];
      fill(topColors[currentOutfit.top]);
      rect(-32, 15, 64, 78, 12);

      // Pajama Bottom
      let bottomColors = ['#7c3aed', '#e879f9', '#f59e0b', '#c026d3'];
      fill(bottomColors[currentOutfit.bottom]);
      rect(-30, 88, 60, 75, 8);

      // Head
      fill('#fcd9c0');
      ellipse(0, -8, 52, 56);

      // Long Hair
      let hairColors = ['#581c87', '#831843', '#713f12', '#4c1d95'];
      fill(hairColors[currentOutfit.hair]);
      ellipse(-3, 8, 58, 70);
      rect(-25, -28, 10, 65);
      rect(15, -28, 10, 65);

      // Face
      fill('#fcd9c0');
      ellipse(0, -5, 46, 50);

      // Eyes
      fill(50);
      ellipse(-11, -7, 7, 9);
      ellipse(11, -7, 7, 9);

      // Smile
      noFill();
      stroke(200, 120, 120);
      strokeWeight(2);
      arc(0, 10, 14, 9, 0, PI);
      noStroke();

      // Accessories
      if (currentOutfit.accessory === 1) {
        fill('#fbbf24');
        ellipse(0, 32, 12, 12);
      } else if (currentOutfit.accessory === 2) {
        fill('#f472b6');
        ellipse(-23, 8, 7, 7);
        ellipse(23, 8, 7, 7);
      } else if (currentOutfit.accessory === 3) {
        fill('#c026d3');
        rect(-20, -35, 40, 7, 3);
      } else if (currentOutfit.accessory === 4) {
        fill('#67e8f9');
        rect(-35, 65, 7, 18, 3);
      }

      // Special items
      if (currentOutfit.special === 1) {
        fill('#fbbf24');
        rect(-25, 158, 18, 10, 3);
        rect(7, 158, 18, 10, 3);
      } else if (currentOutfit.special === 2) {
        fill(255, 200, 50, 220);
        rect(-28, 78, 56, 10);
      } else if (currentOutfit.special === 3) {
        fill('#fef08c');
        triangle(-12, -42, 12, -42, 0, -54);
      }

      pop();
    }

    function drawSecretRoom() {
      background(30, 27, 75);
      
      fill(250);
      textSize(24);
      textAlign(CENTER);
      text('✨ Secret Room ✨', width/2, 50);
      
      fill(200, 180, 255);
      textSize(13);
      text('Special bonus items!', width/2, 75);

      // Bonus items
      drawSecretItem(150, 180, 'Floating Tiara', 3, '#fef08c');
      drawSecretItem(300, 180, 'Magic Slippers', 1, '#fbbf24');
      drawSecretItem(450, 180, 'Glowing Sash', 2, '#f472b6');

      drawCharacter(300, 360, 0.9);

      fill(129, 140, 248);
      rect(200, 580, 200, 36, 18);
      fill(255);
      textAlign(CENTER);
      textSize(14);
      text('← Back to Dress Up', 300, 604);
    }

    function drawSecretItem(x, y, name, specialIndex, color) {
      fill(63, 66, 90);
      rect(x - 50, y, 100, 65, 10);
      fill(color);
      textAlign(CENTER);
      textSize(11);
      text(name, x, y + 22);
      
      if (mouseIsPressed && dist(mouseX, mouseY, x, y + 32) < 35) {
        currentOutfit.special = specialIndex;
      }
    }

    function drawRedCarpet() {
      fill(120, 20, 30);
      rect(0, 0, width, height);

      fill(255, 220, 150, 50);
      ellipse(width/2, 260, 360, 360);

      fill(250);
      textSize(22);
      textAlign(CENTER);
      text('Red Carpet Time!', width/2, 55);

      fill(255, 200, 200);
      textSize(13);
      text('The judges are watching...', width/2, 78);

      drawCharacter(300, 310, 1.0);

      // Judges
      fill(70);
      rect(70, 450, 95, 55, 8);
      rect(255, 450, 95, 55, 8);
      rect(440, 450, 95, 55, 8);

      fill(255);
      textSize(11);
      text('Judge 1', 117, 480);
      text('Judge 2', 302, 480);
      text('Judge 3', 487, 480);

      // Big Judge Button
      fill(234, 179, 8);
      rect(180, 530, 240, 45, 22);
      fill(30);
      textAlign(CENTER);
      textSize(16);
      text('✨ Get Judged!', 300, 560);

      fill(100);
      rect(200, 600, 200, 32, 16);
      fill(255);
      textSize(13);
      text('← Back', 300, 621);
    }

    function calculateStars() {
      let score = 2;
      if (currentOutfit.hair === 2 || currentOutfit.hair === 3) score += 1;
      if (currentOutfit.accessory !== 0) score += 1;
      if (currentOutfit.special !== 0) score += 1.5;
      if (currentOutfit.top === 1 || currentOutfit.top === 2) score += 0.5;
      if (currentOutfit.special === 3) score += 1;
      return Math.min(6, Math.floor(score));
    }

    function drawResultScreen() {
      background(20, 20, 30);
      
      fill(250);
      textSize(26);
      textAlign(CENTER);
      text('The Results Are In!', width/2, 70);

      textSize(52);
      let displayStars = '';
      for (let i = 0; i < stars; i++) displayStars += '⭐';
      fill(251, 191, 36);
      text(displayStars, width/2, 160);

      fill(200);
      textSize(16);
      text('You got ' + stars + ' stars!', width/2, 195);

      if (stars >= 5) {
        fill(74, 222, 128);
        textSize(20);
        text('🏆 YOU WIN THE PRIZE! 🏆', width/2, 250);
        textSize(14);
        fill(180);
        text(prize, width/2, 285);
      } else if (stars >= 4) {
        fill(250, 204, 21);
        textSize(16);
        text('Great job! So close!', width/2, 250);
      } else {
        fill(248, 113, 113);
        textSize(15);
        text('Nice try! Try the secret room next time.', width/2, 250);
      }

      drawCharacter(300, 440, 0.75);

      fill(129, 140, 248);
      rect(180, 580, 240, 40, 20);
      fill(255);
      textAlign(CENTER);
      textSize(15);
      text('Play Again ✨', 300, 607);
    }

    function mousePressed() {
      if (gameState === 'dressup') {
        // Secret Room
        if (mouseY > 620 && mouseY < 656 && mouseX > 120 && mouseX < 320) {
          gameState = 'secret';
          return;
        }
        // Red Carpet
        if (mouseY > 620 && mouseY < 656 && mouseX > 340 && mouseX < 540) {
          gameState = 'redcarpet';
          return;
        }

        // Item buttons (row at y=570)
        if (mouseY > 570 && mouseY < 608) {
          if (mouseX > 25 && mouseX < 135) currentOutfit.top = (currentOutfit.top + 1) % outfits.tops.length;
          if (mouseX > 165 && mouseX < 275) currentOutfit.bottom = (currentOutfit.bottom + 1) % outfits.bottoms.length;
          if (mouseX > 305 && mouseX < 415) currentOutfit.accessory = (currentOutfit.accessory + 1) % outfits.accessories.length;
          if (mouseX > 445 && mouseX < 555) currentOutfit.hair = (currentOutfit.hair + 1) % outfits.hairs.length;
        }

      } else if (gameState === 'secret') {
        if (mouseY > 580 && mouseY < 616 && mouseX > 200 && mouseX < 400) {
          gameState = 'dressup';
        }
      } else if (gameState === 'redcarpet') {
        // Get Judged
        if (mouseY > 530 && mouseY < 575 && mouseX > 180 && mouseX < 420) {
          stars = calculateStars();
          if (stars >= 5) prize = 'Golden Trophy + Infinite Hugs!';
          else if (stars >= 4) prize = 'Shiny Star Badge!';
          else prize = 'Participation Sticker';
          gameState = 'result';
        }
        // Back
        if (mouseY > 600 && mouseY < 632 && mouseX > 200 && mouseX < 400) {
          gameState = 'dressup';
        }
      } else if (gameState === 'result') {
        if (mouseY > 580 && mouseY < 620 && mouseX > 180 && mouseX < 420) {
          gameState = 'dressup';
          stars = 0;
          currentOutfit = { top: 0, bottom: 0, accessory: 0, hair: 0, special: 0 };
        }
      }
    }

    function touchStarted() {
      mousePressed();
      return false;
    }
  </script>
</body>
</html>
