<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jammie • Minecraft Railroad Adventure</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #0a2f0a; }
    canvas { display: block; }
    .instructions {
      position: absolute; top: 10px; left: 10px; color: white; font-family: monospace;
      background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 6px; font-size: 14px;
    }
  </style>
</head>
<body>
<div class="instructions">
  JAMMIE vs SNAKE • Minecraft Adventure<br>
  ← → Move | SHIFT Jump | SPACE Water Blast | Click to Adopt Animal / Collect Food<br>
  Goal: 100 Points • Don't lose 10 hearts in fights!
</div>
<script>
p5.disableFriendlyErrors = true;

let player, enemy, platforms, particles, animals, foods, score, hearts, level;
let gameState = 'explore'; // explore, fight, win, lose
let bgOffset = 0;
let railroadX = 0;

function setup() {
  createCanvas(1100, 620);
  colorMode(HSB, 360, 100, 100, 100);
  pixelDensity(1);
  
  // Initialize player Jammie (Water Hero)
  player = {
    x: 200, y: 420, w: 32, h: 48,
    vx: 0, vy: 0,
    onGround: true,
    facing: 1,
    powerCooldown: 0,
    color: { body: '#2a9dff', cape: '#1e7acc', hair: '#0a3d2e', highlight: '#4ade80' }
  };
  
  // Initialize villain Snake (Fire)
  enemy = {
    x: 850, y: 420, w: 34, h: 50,
    vx: 0, vy: 0,
    health: 100,
    attackCooldown: 0,
    color: { body: '#4a1a1a', outfit: '#6b2d5c', hair: '#111111', eyes: '#ff2222' }
  };
  
  platforms = [
    {x: 0, y: 500, w: 1100, h: 120}, // ground
    {x: 150, y: 380, w: 120, h: 20}, // platform
    {x: 450, y: 320, w: 100, h: 20},
    {x: 750, y: 360, w: 140, h: 20}
  ];
  
  particles = [];
  animals = [];
  foods = [];
  score = 10;
  hearts = 10;
  level = 1;
  
  // Spawn some animals and food
  for (let i = 0; i < 5; i++) {
    animals.push({x: random(80, 1000), y: random(380, 470), type: random(['pig', 'cow', 'chicken'])});
  }
  for (let i = 0; i < 4; i++) {
    foods.push({x: random(100, 980), y: random(350, 480), eaten: false});
  }
  
  // House
  house = {x: 920, y: 280, w: 140, h: 220};
}

function draw() {
  background(20, 70, 35); // grassy green
  
  // Sky gradient
  for (let i = 0; i < 8; i++) {
    fill(200, 80, 95 - i*8, 60);
    rect(0, i*40, width, 40);
  }
  
  // Future field - flowers and trees
  drawEnvironment();
  
  // Railroad tracks
  drawRailroad();
  
  // House (can't enter during fight)
  drawHouse();
  
  // Platforms
  fill(60, 40, 30);
  for (let p of platforms) {
    rect(p.x, p.y, p.w, p.h);
    // Minecraft block style
    fill(70, 50, 35);
    rect(p.x, p.y, p.w, 8);
    fill(60, 40, 30);
  }
  
  // Draw animals
  for (let a of animals) {
    drawAnimal(a);
  }
  
  // Draw food
  for (let f of foods) {
    if (!f.eaten) drawFood(f);
  }
  
  // Update & draw player (Jammie)
  updatePlayer();
  drawJammie(player);
  
  // Update & draw enemy if fighting
  if (gameState === 'fight' || gameState === 'explore') {
    updateEnemy();
    drawSnake(enemy);
  }
  
  // Particles
  updateParticles();
  
  // HUD
  drawHUD();
  
  // Win / Lose overlays
  if (score >= 100) {
    gameState = 'win';
    fill(0, 0, 0, 70);
    rect(0, 0, width, height);
    fill(140, 90, 95);
    textSize(48);
    textAlign(CENTER);
    text("YOU WIN! 🌊", width/2, height/2 - 30);
    textSize(24);
    text("Jammie stopped Snake and saved the world!", width/2, height/2 + 20);
    text("Points: " + score, width/2, height/2 + 60);
    noLoop();
  }
  
  if (hearts <= 0) {
    gameState = 'lose';
    fill(0, 0, 0, 70);
    rect(0, 0, width, height);
    fill(0, 80, 70);
    textSize(48);
    textAlign(CENTER);
    text("GAME OVER", width/2, height/2);
    textSize(22);
    text("Snake took over... Try again!", width/2, height/2 + 40);
    noLoop();
  }
}

function drawEnvironment() {
  // Grass
  fill(100, 70, 45);
  rect(0, 480, width, 140);
  
  // Flowers
  for (let i = 0; i < 18; i++) {
    let fx = (i * 61 + sin(i) * 20) % width;
    let fy = 470 + sin(i * 0.8) * 12;
    fill((i % 3 === 0) ? color(340, 80, 90) : color(50, 70, 95));
    ellipse(fx, fy, 8, 8);
    fill(120, 60, 40);
    rect(fx - 1, fy + 4, 2, 10);
  }
  
  // Trees (Minecraft style)
  for (let i = 0; i < 4; i++) {
    let tx = 120 + i * 280;
    fill(30, 60, 35);
    rect(tx - 15, 280, 30, 200); // trunk
    fill(80, 65, 40);
    ellipse(tx, 260, 90, 90); // leaves
    ellipse(tx - 25, 280, 70, 70);
    ellipse(tx + 25, 280, 70, 70);
  }
}

function drawRailroad() {
  // Tracks
  stroke(40);
  strokeWeight(6);
  line(0, 530, width, 530);
  line(0, 555, width, 555);
  strokeWeight(3);
  for (let i = 0; i < width; i += 60) {
    line(i + railroadX % 60, 525, i + railroadX % 60, 560);
  }
  noStroke();
  // Minecart hint
  fill(80);
  rect(300 + sin(frameCount * 0.03) * 40, 510, 70, 35, 4);
  fill(200, 60, 30);
  textSize(12);
  text("🚂 Explore!", 310, 532);
}

function drawHouse() {
  // Simple Minecraft house
  fill(120, 50, 25);
  rect(house.x, house.y, house.w, house.h);
  fill(80, 40, 20);
  triangle(house.x - 10, house.y, house.x + house.w/2, house.y - 60, house.x + house.w + 10, house.y);
  fill(60, 30, 15);
  rect(house.x + 50, house.y + 100, 40, 120); // door
  
  // Sign
  fill(255);
  textSize(11);
  textAlign(CENTER);
  text("HOME", house.x + 70, house.y + 95);
}

function drawJammie(p) {
  push();
  translate(p.x, p.y);
  if (p.facing === -1) scale(-1, 1);
  
  // Blue cape (flowing)
  fill(210, 70, 85);
  beginShape();
  vertex(-8, 5);
  vertex(8, 5);
  vertex(18, 35);
  vertex(-18, 35);
  endShape(CLOSE);
  
  // Body (blue outfit)
  fill(200, 80, 75);
  rect(-12, 0, 24, 32, 3);
  
  // Head
  fill(35, 40, 85); // skin tone approx
  ellipse(0, -18, 22, 22);
  
  // Black hair
  fill(0);
  arc(0, -20, 26, 22, PI, TWO_PI);
  
  // Green highlights
  fill(140, 80, 70);
  rect(-10, -26, 20, 6, 2);
  
  // Brown eyes
  fill(30, 60, 40);
  ellipse(-5, -18, 4, 5);
  ellipse(5, -18, 4, 5);
  
  // Water power aura when attacking
  if (p.powerCooldown > 0) {
    noFill();
    stroke(180, 70, 95, 60);
    strokeWeight(3);
    ellipse(0, 0, 55, 55);
    noStroke();
  }
  pop();
}

function drawSnake(e) {
  push();
  translate(e.x, e.y);
  if (e.vx < 0) scale(-1, 1);
  
  // Purple black outfit
  fill(280, 60, 35);
  rect(-13, 2, 26, 34, 4);
  
  // Head
  fill(20);
  ellipse(0, -18, 24, 24);
  
  // Black hair
  fill(0);
  rect(-11, -28, 22, 12, 2);
  
  // Red eyes (evil)
  fill(0, 90, 95);
  ellipse(-6, -18, 5, 6);
  ellipse(6, -18, 5, 6);
  
  // Fire aura when attacking
  if (e.attackCooldown > 0) {
    for (let i = 0; i < 5; i++) {
      fill(20, 90, 95, 70);
      ellipse(random(-20, 20), random(-10, 30), 8, 12);
    }
  }
  pop();
}

function drawAnimal(a) {
  fill(200);
  if (a.type === 'pig') {
    ellipse(a.x, a.y, 22, 16);
    fill(220, 80, 75);
    ellipse(a.x + 10, a.y - 3, 6, 4); // snout
  } else if (a.type === 'cow') {
    fill(60, 30, 20);
    ellipse(a.x, a.y, 26, 18);
    fill(255);
    rect(a.x - 8, a.y - 6, 16, 8);
  } else {
    fill(240, 200, 60);
    ellipse(a.x, a.y, 16, 14);
  }
}

function drawFood(f) {
  fill(30, 80, 60);
  ellipse(f.x, f.y, 14, 14);
  fill(60, 90, 50);
  ellipse(f.x - 2, f.y - 2, 6, 6);
}

function updatePlayer() {
  // Gravity
  player.vy += 0.8;
  player.y += player.vy;
  player.x += player.vx;
  
  // Friction
  player.vx *= 0.85;
  
  // Ground / platform collision
  player.onGround = false;
  for (let p of platforms) {
    if (player.x + player.w/2 > p.x && player.x - player.w/2 < p.x + p.w &&
        player.y + player.h/2 > p.y && player.y + player.h/2 < p.y + 20) {
      player.y = p.y - player.h/2;
      player.vy = 0;
      player.onGround = true;
    }
  }
  
  // Keep in bounds
  player.x = constrain(player.x, 40, width - 60);
  
  // Power cooldown
  if (player.powerCooldown > 0) player.powerCooldown--;
  
  // Attack particles
  if (keyIsDown(32) && player.powerCooldown === 0) { // SPACE
    player.powerCooldown = 18;
    // Water blast
    for (let i = 0; i < 6; i++) {
      particles.push({
        x: player.x + player.facing * 25,
        y: player.y - 10,
        vx: player.facing * random(6, 10),
        vy: random(-2, 2),
        life: 25,
        type: 'water'
      });
    }
    
    // Check hit on enemy
    if (gameState === 'fight' && dist(player.x, player.y, enemy.x, enemy.y) < 180) {
      enemy.health -= 12;
      score += 3;
      createHitParticles(enemy.x, enemy.y, 'water');
    }
  }
  
  // Jump with SHIFT
  if (keyIsDown(16) && player.onGround) {
    player.vy = -13;
    player.onGround = false;
  }
  
  // Movement
  if (keyIsDown(LEFT_ARROW) || keyIsDown(65)) {
    player.vx = -5;
    player.facing = -1;
  }
  if (keyIsDown(RIGHT_ARROW) || keyIsDown(68)) {
    player.vx = 5;
    player.facing = 1;
  }
  
  // Collect food / adopt animals with mouse click handled in mousePressed
}

function updateEnemy() {
  if (gameState !== 'fight') return;
  
  enemy.attackCooldown = max(0, enemy.attackCooldown - 1);
  
  // Simple AI: move toward player and attack
  let dx = player.x - enemy.x;
  if (abs(dx) > 60) {
    enemy.vx = dx > 0 ? 2.2 : -2.2;
  } else {
    enemy.vx *= 0.7;
  }
  
  enemy.x += enemy.vx;
  enemy.y += enemy.vy;
  enemy.vy += 0.6;
  
  // Platform collision for enemy
  for (let p of platforms) {
    if (enemy.x > p.x && enemy.x < p.x + p.w && enemy.y > p.y - 30 && enemy.y < p.y) {
      enemy.y = p.y - 25;
      enemy.vy = 0;
    }
  }
  
  enemy.y = min(enemy.y, 470);
  
  // Fire attack
  if (enemy.attackCooldown === 0 && abs(dx) < 220) {
    enemy.attackCooldown = 45;
    for (let i = 0; i < 4; i++) {
      particles.push({
        x: enemy.x,
        y: enemy.y - 15,
        vx: (dx > 0 ? 1 : -1) * random(4, 8),
        vy: random(-1.5, 1.5),
        life: 30,
        type: 'fire'
      });
    }
    
    // Hit player
    if (dist(enemy.x, enemy.y, player.x, player.y) < 90) {
      hearts -= 1;
      createHitParticles(player.x, player.y, 'fire');
    }
  }
  
  // Enemy dies / defeated
  if (enemy.health <= 0) {
    score += 25;
    enemy.health = 100;
    enemy.x = random(700, 950);
    // Level up or progress
    if (level < 2) level = 2;
  }
}

function createHitParticles(x, y, type) {
  for (let i = 0; i < 12; i++) {
    particles.push({
      x: x + random(-15, 15),
      y: y + random(-20, 20),
      vx: random(-3, 3),
      vy: random(-4, 0),
      life: random(15, 28),
      type: type
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    p.vy += 0.15;
    
    if (p.type === 'water') {
      fill(200, 80, 90, p.life * 3);
      ellipse(p.x, p.y, 7, 7);
    } else if (p.type === 'fire') {
      fill(20, 90, 95, p.life * 3);
      ellipse(p.x, p.y, 8, 8);
    }
    
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawHUD() {
  textAlign(LEFT);
  fill(0, 0, 95);
  textSize(20);
  text("SCORE: " + score, 30, 45);
  
  // Hearts
  fill(0, 90, 85);
  text("HEARTS: " + hearts, 30, 75);
  for (let i = 0; i < hearts; i++) {
    fill(0, 90, 85);
    text("♥", 130 + i * 18, 75);
  }
  
  textSize(16);
  fill(200, 80, 90);
  text("LEVEL " + level + " • FIGHTING MODE", 30, 105);
  
  // Instructions
  textSize(13);
  fill(0, 0, 90);
  text("SPACE = Water Blast  |  SHIFT = Jump  |  Click animals/food to collect", 30, 580);
}

function mousePressed() {
  // Adopt animals or collect food
  for (let i = animals.length - 1; i >= 0; i--) {
    let a = animals[i];
    if (dist(mouseX, mouseY, a.x, a.y) < 25) {
      score += 8;
      animals.splice(i, 1);
      createHitParticles(a.x, a.y, 'water');
      // Spawn new animal occasionally
      if (random() < 0.6) animals.push({x: random(80, 1000), y: random(390, 470), type: random(['pig', 'cow', 'chicken'])});
      return;
    }
  }
  
  for (let i = foods.length - 1; i >= 0; i--) {
    let f = foods[i];
    if (!f.eaten && dist(mouseX, mouseY, f.x, f.y) < 18) {
      score += 5;
      f.eaten = true;
      foods.splice(i, 1);
      // Respawn food
      foods.push({x: random(100, 980), y: random(360, 480), eaten: false});
      return;
    }
  }
  
  // Toggle fight mode near enemy
  if (dist(mouseX, mouseY, enemy.x, enemy.y) < 80) {
    gameState = (gameState === 'fight') ? 'explore' : 'fight';
  }
}

function keyPressed() {
  if (key === 'f' || key === 'F') {
    gameState = (gameState === 'fight') ? 'explore' : 'fight';
  }
  if (key === 'r' || key === 'R') {
    // Reset
    score = 10;
    hearts = 10;
    level = 1;
    player.x = 200;
    player.y = 420;
    enemy.x = 850;
    enemy.health = 100;
    gameState = 'explore';
    loop();
  }
}

// Touch / mobile support
function touchStarted() {
  mousePressed();
}
</script>
</body>
</html>
